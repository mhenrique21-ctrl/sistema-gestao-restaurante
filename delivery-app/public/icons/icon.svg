<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fff8f0"/>
      <stop offset="100%" stop-color="#fdecd8"/>
    </linearGradient>
    <linearGradient id="steam1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#c9866a"/>
      <stop offset="100%" stop-color="#e8b99a"/>
    </linearGradient>
  </defs>

  <!-- Fundo creme -->
  <rect width="512" height="512" rx="90" fill="url(#bg)"/>

  <!-- Vapor S (estilizado igual à logo) -->
  <path d="M320 20 C380 20 410 55 390 95 C370 130 320 135 310 170 C300 205 340 225 370 215"
        stroke="url(#steam1)" stroke-width="28" fill="none"
        stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M320 20 C380 20 410 55 390 95 C370 130 320 135 310 170 C300 205 340 225 370 215"
        stroke="#e8b99a" stroke-width="14" fill="none"
        stroke-linecap="round" stroke-linejoin="round" opacity="0.5"/>

  <!-- CONFRARIA (pequeno, acima) -->
  <text x="185" y="178" font-family="Arial Black, Arial, sans-serif" font-weight="900"
        font-size="42" fill="#9b5e3c" letter-spacing="4" text-anchor="middle">CONFRARIA</text>

  <!-- CAFÉ (grande, destaque) -->
  <text x="256" y="300" font-family="Arial Black, Arial, sans-serif" font-weight="900"
        font-size="138" fill="#9b5e3c" letter-spacing="-2" text-anchor="middle">CAFÉ</text>

  <!-- Moto de entregador -->
  <!-- Roda traseira -->
  <circle cx="118" cy="415" r="38" stroke="#9b5e3c" stroke-width="14" fill="none"/>
  <circle cx="118" cy="415" r="12" fill="#9b5e3c"/>
  <!-- Roda dianteira -->
  <circle cx="368" cy="415" r="38" stroke="#9b5e3c" stroke-width="14" fill="none"/>
  <circle cx="368" cy="415" r="12" fill="#9b5e3c"/>
  <!-- Chassi / corpo -->
  <path d="M156 415 L200 375 L280 370 L330 415" stroke="#9b5e3c" stroke-width="14" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Carenagem superior -->
  <path d="M210 372 L240 335 L295 332 L318 375" stroke="#9b5e3c" stroke-width="12" fill="#fdecd8" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Guidão -->
  <path d="M300 338 L340 310 L365 320" stroke="#9b5e3c" stroke-width="12" fill="none" stroke-linecap="round"/>
  <!-- Banco / entregador (silhueta simples) -->
  <ellipse cx="232" cy="330" rx="32" ry="10" fill="#9b5e3c" opacity="0.5"/>
  <!-- Baú/caixa de entrega na garupa -->
  <rect x="148" y="352" width="46" height="36" rx="6" fill="#9b5e3c"/>
  <text x="171" y="375" font-family="Arial, sans-serif" font-size="18" font-weight="900" fill="#fff" text-anchor="middle">☕</text>
</svg>
