<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — Confraria Café</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

/* ── Tema escuro (padrão) ── */
:root {
  --bg: #0f172a; --surface: #1e293b; --border: #334155;
  --text: #f1f5f9; --muted: #94a3b8; --subtle: #64748b;
  --hover: #334155; --row-hover: #0f172a; --input-bg: #0f172a;
}
/* ── Tema claro ── */
body.light {
  --bg: #f1f5f9; --surface: #ffffff; --border: #e2e8f0;
  --text: #0f172a; --muted: #475569; --subtle: #64748b;
  --hover: #e2e8f0; --row-hover: #f8fafc; --input-bg: #f8fafc;
}

body { font-family: system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; transition: background .2s, color .2s; }

/* Sidebar */
#sidebar { width: 220px; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; }
#sidebar .logo { padding: 20px 16px; border-bottom: 1px solid var(--border); }
#sidebar .logo h1 { font-size: 1.1rem; font-weight: 800; }
#sidebar .logo p { font-size: .72rem; color: var(--subtle); margin-top: 2px; }
#sidebar nav { flex: 1; padding: 12px 8px; }
.nav-btn { width: 100%; text-align: left; padding: 10px 12px; background: none; border: none; color: var(--muted); border-radius: 8px; font-size: .85rem; cursor: pointer; display: flex; align-items: center; gap: 10px; transition: all .15s; }
.nav-btn:hover { background: var(--hover); color: var(--text); }
.nav-btn.active { background: #7c3aed; color: #fff; }
#sidebar .bottom { padding: 12px; border-top: 1px solid var(--border); font-size: .72rem; color: var(--subtle); }

/* Main */
#main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
#topbar { background: var(--surface); border-bottom: 1px solid var(--border); padding: 12px 24px; display: flex; align-items: center; justify-content: space-between; }
#topbar h2 { font-size: 1rem; font-weight: 700; }
#content { flex: 1; overflow-y: auto; padding: 24px; }

/* Cards */
.card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 20px; margin-bottom: 20px; }
.card h3 { font-size: .85rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .05em; margin-bottom: 16px; display: flex; align-items: center; justify-content: space-between; }

/* Table */
table { width: 100%; border-collapse: collapse; font-size: .82rem; }
th { text-align: left; padding: 8px 12px; color: var(--subtle); border-bottom: 1px solid var(--border); font-weight: 600; font-size: .75rem; text-transform: uppercase; }
td { padding: 10px 12px; border-bottom: 1px solid var(--border); color: var(--muted); vertical-align: middle; }
tr:hover td { background: var(--row-hover); }

/* Form */
.form-grid { display: grid; gap: 12px; }
.form-grid.cols-2 { grid-template-columns: 1fr 1fr; }
.form-grid.cols-3 { grid-template-columns: 1fr 1fr 1fr; }
label { display: block; font-size: .75rem; color: var(--subtle); font-weight: 600; margin-bottom: 4px; }
input, select, textarea { width: 100%; background: var(--input-bg); border: 1px solid var(--border); color: var(--text); border-radius: 8px; padding: 8px 12px; font-size: .85rem; outline: none; }
input:focus, select:focus, textarea:focus { border-color: #7c3aed; }
textarea { resize: vertical; min-height: 70px; }

/* Buttons */
.btn { padding: 8px 16px; border: none; border-radius: 8px; font-size: .82rem; font-weight: 600; cursor: pointer; transition: all .15s; }
.btn-primary { background: #7c3aed; color: white; }
.btn-primary:hover { background: #6d28d9; }
.btn-secondary { background: var(--hover); color: var(--text); }
.btn-secondary:hover { background: var(--border); }
.btn-danger { background: #dc2626; color: white; }
.btn-danger:hover { background: #b91c1c; }
.btn-sm { padding: 4px 10px; font-size: .75rem; }
.btn-success { background: #059669; color: white; }

/* Badge */
.badge { display: inline-block; padding: 2px 8px; border-radius: 999px; font-size: .72rem; font-weight: 700; }
.badge-green { background: #d1fae5; color: #065f46; }
.badge-red { background: #fee2e2; color: #991b1b; }
.badge-gray { background: var(--hover); color: var(--muted); }
.badge-blue { background: #dbeafe; color: #1e40af; }

/* Toast */
#toast { position: fixed; bottom: 24px; right: 24px; background: #059669; color: white; padding: 12px 20px; border-radius: 10px; font-size: .85rem; font-weight: 600; transform: translateY(80px); opacity: 0; transition: all .3s; z-index: 999; }
#toast.show { transform: translateY(0); opacity: 1; }
#toast.error { background: #dc2626; }

/* Modal */
.modal-bg { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.7); z-index: 100; align-items: center; justify-content: center; }
.modal-bg.open { display: flex; }
.modal { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 24px; width: 100%; max-width: 520px; max-height: 90vh; overflow-y: auto; }
.modal h2 { font-size: 1rem; font-weight: 700; margin-bottom: 20px; }

/* Search */
.search-bar { display: flex; gap: 10px; margin-bottom: 16px; }
.search-bar input { flex: 1; }

/* Price */
.price { font-weight: 700; color: #a78bfa; }

/* Toggle switch */
.toggle { width: 36px; height: 20px; background: var(--border); border-radius: 999px; border: none; cursor: pointer; position: relative; transition: background .2s; }
.toggle.on { background: #7c3aed; }
.toggle::after { content: ''; position: absolute; top: 2px; left: 2px; width: 16px; height: 16px; background: white; border-radius: 50%; transition: left .2s; }
.toggle.on::after { left: 18px; }

/* Theme button */
#theme-btn { background: none; border: 1px solid var(--border); color: var(--text); border-radius: 8px; padding: 5px 10px; font-size: .8rem; cursor: pointer; transition: all .15s; }
#theme-btn:hover { background: var(--hover); }
</style>
</head>
<body>

<div id="sidebar">
  <div class="logo">
    <h1>☕ Confraria Café</h1>
    <p>Painel Administrativo</p>
  </div>
  <nav>
    <button class="nav-btn active" onclick="showPage('dashboard',this)">📊 Dashboard</button>
    <button class="nav-btn" onclick="showPage('produtos',this)">🍽 Produtos</button>
    <button class="nav-btn" onclick="showPage('categorias',this)">📂 Categorias</button>
    <button class="nav-btn" onclick="showPage('clientes',this)">👥 Clientes</button>
    <button class="nav-btn" onclick="showPage('usuarios',this)">🔐 Usuários</button>
    <button class="nav-btn" onclick="showPage('pedidos',this)">📋 Pedidos</button>
    <button class="nav-btn" onclick="showPage('bairros',this)">📍 Bairros</button>
    <button class="nav-btn" onclick="showPage('configuracoes',this)">⚙️ Configurações</button>
    <button class="nav-btn" onclick="showPage('pagamentos',this)">💳 Pagamentos</button>
    <button class="nav-btn" onclick="showPage('adicionais',this)">➕ Adicionais</button>
    <button class="nav-btn" onclick="showPage('impressoras',this)">🖨 Impressoras</button>
  </nav>
  <div class="bottom" id="user-info">Carregando...</div>
</div>

<div id="main">
  <div id="topbar">
    <h2 id="page-title">Dashboard</h2>
    <div style="display:flex;gap:10px;align-items:center;">
      <span id="ws-dot" style="width:8px;height:8px;border-radius:50%;background:#ef4444;display:inline-block;"></span>
      <button id="theme-btn" onclick="toggleTheme()">🌙 Escuro</button>
      <button class="btn btn-secondary btn-sm" onclick="logout()">Sair</button>
    </div>
  </div>
  <div id="content"></div>
</div>

<div id="toast"></div>

<!-- Modal genérico -->
<div class="modal-bg" id="modal">
  <div class="modal">
    <h2 id="modal-title">Modal</h2>
    <div id="modal-body"></div>
    <div style="display:flex;gap:10px;justify-content:flex-end;margin-top:20px;">
      <button class="btn btn-secondary" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" id="modal-confirm" onclick="confirmModal()">Salvar</button>
    </div>
  </div>
</div>

<script>
// ── Auth ──────────────────────────────────────────────────────────
let TOKEN = localStorage.getItem('admin_token');
if (!TOKEN) {
  TOKEN = prompt('Token JWT admin:');
  if (TOKEN) localStorage.setItem('admin_token', TOKEN);
}

async function api(method, path, body) {
  const res = await fetch('/api' + path, {
    method,
    headers: { 'Content-Type': 'application/json', Authorization: 'Bearer ' + TOKEN },
    body: body ? JSON.stringify(body) : undefined,
  });
  const data = await res.json();
  if (!res.ok) throw new Error(data.error || 'Erro');
  return data;
}

function imagePickerHtml(url = '') {
  return `
    <div>
      <label>Imagem do produto</label>
      <div style="display:flex;align-items:center;gap:10px">
        <img id="f-image-preview" src="${url}" style="width:56px;height:56px;object-fit:cover;border-radius:8px;background:#0f172a;${url ? '' : 'display:none'}" />
        <input type="file" accept="image/*" id="f-image-file" onchange="handleImageUpload(this)" style="flex:1" />
        <span id="f-image-status" style="font-size:.75rem;color:#64748b"></span>
      </div>
      <input type="hidden" id="f-image" value="${url}" />
    </div>`;
}

async function handleImageUpload(inputEl) {
  const file = inputEl.files[0];
  if (!file) return;
  const statusEl = document.getElementById('f-image-status');
  statusEl.textContent = 'Enviando...';
  try {
    const fd = new FormData();
    fd.append('image', file);
    const res = await fetch('/api/menu/upload', { method: 'POST', headers: { Authorization: 'Bearer ' + TOKEN }, body: fd });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Erro ao enviar imagem');
    document.getElementById('f-image').value = data.url;
    const preview = document.getElementById('f-image-preview');
    preview.src = data.url;
    preview.style.display = '';
    statusEl.textContent = '✓ Enviada';
  } catch (err) {
    statusEl.textContent = '';
    toast(err.message, true);
  }
}

function toast(msg, err = false) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'show' + (err ? ' error' : '');
  setTimeout(() => el.className = '', 3000);
}

function toggleTheme() {
  const light = document.body.classList.toggle('light');
  localStorage.setItem('admin_theme', light ? 'light' : 'dark');
  document.getElementById('theme-btn').textContent = light ? '☀️ Claro' : '🌙 Escuro';
}
// Aplica tema salvo
(function() {
  const t = localStorage.getItem('admin_theme');
  if (t === 'light') {
    document.body.classList.add('light');
    document.addEventListener('DOMContentLoaded', () => {
      const btn = document.getElementById('theme-btn');
      if (btn) btn.textContent = '☀️ Claro';
    });
  }
})();

function logout() {
  localStorage.removeItem('admin_token');
  location.reload();
}

// ── Catálogo de Bairros e Taxas de Entrega (carregado da API) ─────
let NEIGHBORHOODS = [];
async function carregarBairrosCache() {
  try {
    NEIGHBORHOODS = await api('GET', '/neighborhoods?all=true');
  } catch (e) {
    NEIGHBORHOODS = [];
  }
}

function getTaxaEntrega(bairro) {
  const found = NEIGHBORHOODS.find(b => b.name === bairro);
  return found ? parseFloat(found.delivery_fee) : null;
}

function bairroSelectOptions(selected) {
  const zonas = {};
  for (const b of NEIGHBORHOODS) {
    if (!b.active) continue;
    (zonas[b.zone] = zonas[b.zone] || []).push(b);
  }
  return Object.entries(zonas).map(([zona, bairros]) => `
    <optgroup label="── ${zona} ──">
      ${bairros.map(b => `<option value="${b.name}" ${b.name === selected ? 'selected' : ''}>
        ${b.name} — R$ ${parseFloat(b.delivery_fee).toFixed(2).replace('.',',')}
      </option>`).join('')}
    </optgroup>`).join('');
}

function atualizarTaxaEntrega() {
  const sel = document.getElementById('cf-neigh');
  const badge = document.getElementById('taxa-badge');
  if (!sel || !badge) return;
  const taxa = getTaxaEntrega(sel.value);
  if (taxa !== null) {
    badge.textContent = '🛵 Taxa: R$ ' + taxa.toFixed(2).replace('.',',');
    badge.style.display = 'inline-block';
    badge.style.background = '#064e3b';
    badge.style.color = '#6ee7b7';
  } else {
    badge.textContent = '';
    badge.style.display = 'none';
  }
}

// ── WebSocket ─────────────────────────────────────────────────────
;(function wsConnect() {
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  const ws = new WebSocket(`${proto}://${location.host}/ws?token=${TOKEN}&station=retaguarda`);
  ws.onopen = () => document.getElementById('ws-dot').style.background = '#10b981';
  ws.onclose = () => { document.getElementById('ws-dot').style.background = '#ef4444'; setTimeout(wsConnect, 3000); };
  ws.onmessage = (e) => {
    const m = JSON.parse(e.data);
    if (m.type === 'order_update') {
      toast('🔔 Novo pedido chegou!');
      if (currentPage === 'pedidos') showPage('pedidos');
      if (currentPage === 'dashboard') showPage('dashboard');
    }
  };
})();

// ── Router ────────────────────────────────────────────────────────
let currentPage = 'dashboard';
let modalCallback = null;

function showPage(page, btn) {
  currentPage = page;
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');
  const titles = { dashboard:'Dashboard', produtos:'Produtos', categorias:'Categorias', clientes:'Clientes', usuarios:'Usuários', pedidos:'Pedidos', bairros:'Bairros', configuracoes:'Configurações', pagamentos:'Formas de Pagamento', adicionais:'Adicionais', impressoras:'Impressoras' };
  document.getElementById('page-title').textContent = titles[page] || page;
  const pages = { dashboard: pageDashboard, produtos: pageProdutos, categorias: pageCategorias, clientes: pageClientes, usuarios: pageUsuarios, pedidos: pagePedidos, bairros: pageBairros, configuracoes: pageConfiguracoes, pagamentos: pagePagamentos, adicionais: pageAdicionais, impressoras: pageImpressoras };
  pages[page]?.();
}

function openModal(title, body, cb) {
  document.getElementById('modal-title').textContent = title;
  document.getElementById('modal-body').innerHTML = body;
  document.getElementById('modal').classList.add('open');
  modalCallback = cb;
}
function closeModal() { document.getElementById('modal').classList.remove('open'); modalCallback = null; }
async function confirmModal() {
  try {
    await modalCallback?.();
  } catch(e) {
    toast('❌ ' + (e.message || 'Erro ao salvar'), true);
  }
}

// ── Dashboard ─────────────────────────────────────────────────────
async function pageDashboard() {
  document.getElementById('content').innerHTML = '<p style="color:#64748b">Carregando...</p>';
  let d;
  try {
    d = await api('GET', '/dashboard');
  } catch(e) {
    document.getElementById('content').innerHTML = `<div class="card"><p style="color:#ef4444">❌ Erro ao carregar dashboard: ${e.message}</p><button class="btn btn-primary" onclick="pageDashboard()">Tentar novamente</button></div>`;
    return;
  }
  const s = d.summary || {};
  document.getElementById('content').innerHTML = `
    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:20px">
      ${stat('📦', 'Pedidos hoje', s.total_orders)}
      ${stat('💰', 'Faturamento', 'R$ ' + parseFloat(s.revenue||0).toFixed(2).replace('.',','))}
      ${stat('✅', 'Receita paga', 'R$ ' + parseFloat(s.paid_revenue||0).toFixed(2).replace('.',','))}
      ${stat('❌', 'Cancelados', s.cancelled)}
    </div>
    <div class="card">
      <h3>Status dos pedidos</h3>
      <div style="display:flex;flex-wrap:wrap;gap:10px">
        ${(d.by_status||[]).map(x => `<div style="background:#0f172a;border:1px solid #334155;border-radius:8px;padding:10px 16px;text-align:center"><div style="font-size:1.4rem;font-weight:800">${x.count}</div><div style="font-size:.75rem;color:#64748b">${x.status.replace(/_/g,' ')}</div></div>`).join('')}
      </div>
    </div>
    <div class="card">
      <h3>🏆 Top produtos hoje</h3>
      <table>
        <tr><th>Produto</th><th>Qtde vendida</th><th>Receita</th></tr>
        ${(d.top_products||[]).map(p => `<tr><td>${p.name}</td><td>${p.qty_sold}</td><td class="price">R$ ${parseFloat(p.revenue||0).toFixed(2).replace('.',',')}</td></tr>`).join('') || '<tr><td colspan="3" style="color:#475569;text-align:center;padding:20px">Sem vendas hoje</td></tr>'}
      </table>
    </div>`;
}
function stat(icon, label, val) {
  return `<div class="card" style="margin:0"><div style="font-size:1.5rem">${icon}</div><div style="font-size:1.6rem;font-weight:800;margin:4px 0">${val}</div><div style="font-size:.75rem;color:#64748b">${label}</div></div>`;
}

// ── Produtos ──────────────────────────────────────────────────────
let produtos = [], categorias = [];
async function pageProdutos() {
  [produtos, categorias] = await Promise.all([
    api('GET', '/menu').then(cats => cats.flatMap(c => c.products.map(p => ({ ...p, category_name: c.name, category_id: c.id })))),
    api('GET', '/menu').then(cats => cats.map(c => ({ id: c.id, name: c.name }))),
  ]);
  renderProdutos();
}

let _prodFilter = '', _prodStatus = 'todos';
function renderProdutos(filter, status) {
  if (filter !== undefined) _prodFilter = filter;
  if (status !== undefined) _prodStatus = status;
  let list = produtos;
  if (_prodFilter) list = list.filter(p => p.name.toLowerCase().includes(_prodFilter.toLowerCase()));
  if (_prodStatus === 'ativos') list = list.filter(p => p.available);
  if (_prodStatus === 'inativos') list = list.filter(p => !p.available);
  const inativos = produtos.filter(p => !p.available).length;
  document.getElementById('content').innerHTML = `
    <div class="search-bar">
      <input placeholder="Buscar produto..." value="${_prodFilter}" oninput="renderProdutos(this.value)" />
      <div style="display:flex;gap:6px">
        <button class="btn btn-sm ${_prodStatus==='todos'?'btn-primary':'btn-secondary'}" onclick="renderProdutos(undefined,'todos')">Todos</button>
        <button class="btn btn-sm ${_prodStatus==='ativos'?'btn-primary':'btn-secondary'}" onclick="renderProdutos(undefined,'ativos')">✅ Ativos</button>
        <button class="btn btn-sm ${_prodStatus==='inativos'?'btn-danger':'btn-secondary'}" onclick="renderProdutos(undefined,'inativos')">🚫 Indisponíveis${inativos>0?' ('+inativos+')':''}</button>
      </div>
      <button class="btn btn-primary" onclick="modalNovoProduto()">+ Novo produto</button>
    </div>
    <div class="card">
      <h3>Produtos (${list.length})</h3>
      <table>
        <tr><th>Nome</th><th>Categoria</th><th>Preço</th><th>Status</th><th>Ações</th></tr>
        ${list.map(p => `
          <tr style="${!p.available ? 'opacity:0.6' : ''}">
            <td>${p.name}</td>
            <td><span class="badge badge-blue">${p.category_name}</span></td>
            <td class="price">R$ ${parseFloat(p.price).toFixed(2).replace('.',',')}</td>
            <td>
              <button onclick="toggleDisponivel('${p.id}', ${p.available})"
                style="padding:4px 10px;border-radius:8px;border:none;cursor:pointer;font-size:12px;font-weight:600;background:${p.available ? '#d1fae5' : '#fee2e2'};color:${p.available ? '#065f46' : '#991b1b'}">
                ${p.available ? '✅ Disponível' : '🚫 Indisponível'}
              </button>
            </td>
            <td style="display:flex;gap:6px">
              <button class="btn btn-secondary btn-sm" onclick="modalEditarProduto('${p.id}')" title="Editar">✏️</button>
              <button class="btn btn-secondary btn-sm" onclick="modalAdicionaisProduto('${p.id}')" title="Adicionais">🧩</button>
              <button class="btn btn-danger btn-sm" onclick="excluirProduto('${p.id}')" title="Excluir">🗑️</button>
            </td>
          </tr>`).join('')}
      </table>
    </div>`;
}

function modalNovoProduto() {
  const opts = categorias.map(c => `<option value="${c.id}">${c.name}</option>`).join('');
  openModal('Novo Produto', `
    <div class="form-grid">
      <div><label>Nome</label><input id="f-name" /></div>
      <div class="form-grid cols-2">
        <div><label>Preço (R$)</label><input id="f-price" type="number" step="0.01" /></div>
        <div><label>Categoria</label><select id="f-cat">${opts}</select></div>
      </div>
      <div><label>Descrição</label><textarea id="f-desc"></textarea></div>
      ${imagePickerHtml()}
      <div class="form-grid cols-2">
        <div><label>Preço promocional (R$, opcional)</label><input id="f-promo" type="number" step="0.01" /></div>
        <div style="display:flex;align-items:center;gap:8px;padding-top:20px">
          <button type="button" class="toggle" id="f-featured-toggle" onclick="this.classList.toggle('on')"></button>
          <label style="margin:0">Produto em destaque</label>
        </div>
      </div>
    </div>`, async () => {
    await api('POST', '/menu/products', {
      name: v('f-name'),
      price: parseFloat(v('f-price')),
      category_id: v('f-cat'),
      description: v('f-desc'),
      image_url: v('f-image') || undefined,
      promo_price: v('f-promo') ? parseFloat(v('f-promo')) : undefined,
      featured: document.getElementById('f-featured-toggle').classList.contains('on'),
    });
    toast('Produto criado!'); closeModal(); pageProdutos();
  });
}

function modalEditarProduto(id) {
  const p = produtos.find(x => x.id === id);
  if (!p) return;
  const opts = categorias.map(c => `<option value="${c.id}" ${c.id === p.category_id ? 'selected' : ''}>${c.name}</option>`).join('');
  openModal('Editar Produto', `
    <div class="form-grid">
      <div><label>Nome</label><input id="f-name" value="${p.name}" /></div>
      <div class="form-grid cols-2">
        <div><label>Preço (R$)</label><input id="f-price" type="number" step="0.01" value="${p.price}" /></div>
        <div><label>Categoria</label><select id="f-cat">${opts}</select></div>
      </div>

async function excluirProduto(id) {
  const p = produtos.find(x => x.id === id);
  if (!confirm(`Excluir o produto "${p?.name || ''}"? Essa ação não pode ser desfeita.`)) return;
  try {
    await api('DELETE', '/menu/products/' + id);
    toast('Produto excluído!'); pageProdutos();
  } catch (e) {
    toast('❌ ' + e.message, true);
  }
}

function modalAdicionaisProduto(id) {
  const p = produtos.find(x => x.id === id);

  openModal('Adicionais — ' + p.name, `<div id="addons-section"><p style="color:#64748b;font-size:.8rem">Carregando adicionais...</p></div>`, null);
  document.getElementById('modal-confirm').style.display = 'none';
  renderAddonsSection(id, () => modalAdicionaisProduto(id));
}

async function modalTemplateAddon(productId) {
  openModal('Adicionar Template de Grupo', `
    <p style="color:var(--muted);font-size:.82rem;margin-bottom:12px">Escolha um modelo pronto. Você poderá editar as opções depois.</p>
    <div style="display:grid;gap:8px">
      ${ADDON_TEMPLATES.map((t, i) => `
        <button type="button" onclick="aplicarTemplate('${productId}',${i})" style="text-align:left;background:var(--hover);border:1px solid var(--border);border-radius:8px;padding:10px 14px;cursor:pointer;color:var(--text)">
          <div style="font-weight:700">${t.name}</div>
          <div style="color:var(--muted);font-size:.76rem;margin-top:2px">${t.options.length > 0 ? t.options.map(o=>o.name).join(' · ') : 'Grupo vazio — adicione opções manualmente'}</div>
        </button>`).join('')}
    </div>`, null);
  document.getElementById('modal-confirm').style.display = 'none';
}

async function aplicarTemplate(productId, templateIndex) {
  const t = ADDON_TEMPLATES[templateIndex];
  closeModal();
  try {
    const group = await api('POST', `/menu/products/${productId}/addon-groups`, {
      name: t.name, min_select: t.min_select, max_select: t.max_select, required: t.required,
    });
    for (const op of t.options) {
      await api('POST', `/menu/addon-groups/${group.id}/options`, { name: op.name, price: op.price });
    }
    toast(`Grupo "${t.name}" adicionado!`);
    renderAddonsSection(productId);
  } catch(e) { toast('Erro: ' + e.message, true); }
}

const STATUS_COLOR = {
  aguardando_pagamento:'#92400e',
  pago:'#1e40af',
  confirmado:'#5b21b6',
  em_preparo:'#92400e',
  pronto:'#065f46',
  saiu_para_entrega:'#0369a1',
  entregue:'#374151',
  cancelado:'#991b1b'
};
let pedidosFiltro = 'todos';
let pedidosTimer = null;

async function pagePedidos() {
  clearInterval(pedidosTimer);
  document.getElementById('content').innerHTML = `
    <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;align-items:center">
      <div style="display:flex;gap:6px;flex-wrap:wrap;flex:1">
        ${['todos','aguardando_pagamento','pago','confirmado','em_preparo','pronto','saiu_para_entrega','entregue','cancelado'].map(s => `
          <button class="btn btn-sm" id="filtro-${s}" onclick="filtrarPedidos('${s}')"
            style="background:${s==='todos'?'#7c3aed':'#1e293b'};color:${s==='todos'?'#fff':'#94a3b8'};border:1px solid #334155">
            ${s==='todos'?'Todos':STATUS_LABEL[s]||s}
          </button>`).join('')}
      </div>
      <button class="btn btn-secondary btn-sm" onclick="carregarPedidos()">🔄 Atualizar</button>
    </div>
    <div id="pedidos-lista"><p style="color:#64748b">Carregando...</p></div>`;
  await carregarPedidos();
  pedidosTimer = setInterval(carregarPedidos, 30000);
}

async function carregarPedidos() {
  try {
    const qs = pedidosFiltro !== 'todos' ? `?status=${pedidosFiltro}&limit=100` : '?limit=100';
    const orders = await api('GET', '/orders' + qs);
    renderPedidos(orders);
  } catch(e) { toast('Erro ao carregar pedidos: ' + e.message, true); }
}

function filtrarPedidos(filtro) {
  pedidosFiltro = filtro;
  document.querySelectorAll('[id^="filtro-"]').forEach(b => {
    const isActive = b.id === 'filtro-' + filtro;
    b.style.background = isActive ? '#7c3aed' : '#1e293b';
    b.style.color = isActive ? '#fff' : '#94a3b8';
  });
  carregarPedidos();
}

function renderPedidos(orders) {
  if (!orders.length) {
    document.getElementById('pedidos-lista').innerHTML = `<div class="card" style="text-align:center;color:var(--muted);padding:40px">Nenhum pedido encontrado</div>`;
    return;
  }

  // Ordenar por data/hora mais recente primeiro
  const sorted = [...orders].sort((a, b) => new Date(b.created_at) - new Date(a.created_at));

  // Agrupar por data
  const groups = {};
  for (const o of sorted) {
    const dt = new Date(o.created_at);
    const key = dt.toISOString().slice(0, 10); // YYYY-MM-DD
    if (!groups[key]) groups[key] = [];
    groups[key].push(o);
  }

  const hoje = new Date().toISOString().slice(0, 10);
  const ontem = new Date(Date.now() - 86400000).toISOString().slice(0, 10);

  function labelData(key) {
    if (key === hoje) return '📅 Hoje';
    if (key === ontem) return '📅 Ontem';
    return '📅 ' + new Date(key + 'T12:00:00').toLocaleDateString('pt-BR', {weekday:'long', day:'2-digit', month:'long'});
  }

  document.getElementById('pedidos-lista').innerHTML = Object.keys(groups)
    .sort((a, b) => b.localeCompare(a))
    .map(dateKey => {
      const dayOrders = groups[dateKey];
      const cardsHtml = dayOrders.map(o => {
        const cor = STATUS_COLOR[o.status] || '#334155';
        const hora = new Date(o.created_at).toLocaleTimeString('pt-BR', {hour:'2-digit',minute:'2-digit'});
        const data = new Date(o.created_at).toLocaleDateString('pt-BR', {day:'2-digit',month:'2-digit'});
    const num = o.order_number || o.id.slice(-4);
    const addr = o.delivery_address ? (typeof o.delivery_address === 'string' ? o.delivery_address : `${o.delivery_address.street||''}, ${o.delivery_address.number||''} — ${o.delivery_address.neighborhood||''}`) : '';
    return `
    <div style="background:var(--surface);border:1px solid var(--border);border-left:5px solid ${cor};border-radius:12px;padding:16px;margin-bottom:12px;box-shadow:0 1px 4px rgba(0,0,0,.15)">
      <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px">
        <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">
          <span style="font-family:monospace;font-weight:900;font-size:1.15rem;color:var(--text)">#${num}</span>
          <span style="background:${cor};color:#fff;padding:3px 12px;border-radius:999px;font-size:.75rem;font-weight:700;letter-spacing:.03em">${STATUS_LABEL[o.status]||o.status}</span>
          <span style="color:var(--muted);font-size:.8rem">${data} às ${hora}</span>
          <span style="font-size:.85rem;color:var(--text)">${o.delivery_type === 'retirada' ? '🏪 Retirada' : '🛵 Entrega'}</span>
        </div>
        <div style="display:flex;align-items:center;gap:8px">
          <span style="font-weight:900;color:#7c3aed;font-size:1.1rem">R$ ${parseFloat(o.total||0).toFixed(2).replace('.',',')}</span>
          <span style="color:var(--muted);font-size:.8rem;background:var(--hover);padding:2px 8px;border-radius:6px">${o.payment_method||'-'}</span>
        </div>
      </div>
      <div style="display:flex;gap:20px;margin-top:10px;font-size:.85rem;flex-wrap:wrap;align-items:center">
        <div><span style="color:var(--muted)">Cliente: </span><strong style="color:var(--text)">${o.customer_name||'—'}</strong></div>
        ${o.customer_phone ? `<div style="color:var(--muted)">📱 <span style="color:var(--text)">${o.customer_phone}</span></div>` : ''}
        ${addr ? `<div style="color:var(--muted)">📍 <span style="color:var(--text)">${addr}</span></div>` : ''}
      </div>
      <div style="display:flex;gap:8px;margin-top:12px;flex-wrap:wrap">
        <button class="btn btn-secondary btn-sm" onclick="verPedido('${o.id}')">👁 Ver itens</button>
        ${o.status !== 'em_preparo' && o.status !== 'pronto' && o.status !== 'saiu_para_entrega' && o.status !== 'entregue' && o.status !== 'cancelado' ? `<button class="btn btn-sm" style="background:#f59e0b;color:#fff;border:none" onclick="avancarStatus('${o.id}','em_preparo')">👨‍🍳 Em Preparo</button>` : ''}
        ${o.status === 'em_preparo' ? `<button class="btn btn-sm" style="background:#8b5cf6;color:#fff;border:none" onclick="avancarStatus('${o.id}','pronto')">✅ Pedido Pronto</button>` : ''}
        ${o.status === 'em_preparo' || o.status === 'pronto' ? `<button class="btn btn-sm" style="background:#0ea5e9;color:#fff;border:none" onclick="avancarStatus('${o.id}','saiu_para_entrega')">🛵 A Caminho</button>` : ''}
        ${o.status === 'saiu_para_entrega' ? `<button class="btn btn-success btn-sm" onclick="avancarStatus('${o.id}','entregue')">🎉 Entregue</button>` : ''}
        ${o.status !== 'cancelado' && o.status !== 'entregue' ? `<button class="btn btn-danger btn-sm" onclick="cancelarPedido('${o.id}')">✕ Cancelar</button>` : ''}
      </div>
    </div>`;
      }).join('');

      return `
        <div style="margin-bottom:24px">
          <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px">
            <span style="font-size:.95rem;font-weight:800;color:var(--text)">${labelData(dateKey)}</span>
            <span style="background:var(--hover);color:var(--muted);font-size:.75rem;padding:2px 10px;border-radius:999px">${dayOrders.length} pedido${dayOrders.length > 1 ? 's' : ''}</span>
          </div>
          ${cardsHtml}
        </div>`;
    }).join('');
}

async function verPedido(id) {
  const o = await api('GET', '/orders/' + id);
  const items = o.items || [];
  const num = o.order_number || id.slice(-4);
  openModal(`Pedido #${num}`, `
    <div style="font-size:.85rem;display:grid;gap:10px">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
        <div><span style="color:var(--muted)">Cliente:</span> <strong style="color:var(--text)">${o.customer_name||'—'}</strong></div>
        <div><span style="color:var(--muted)">WhatsApp:</span> <span style="color:var(--text)">${o.customer_phone||'—'}</span></div>
        <div><span style="color:var(--muted)">Tipo:</span> <span style="color:var(--text)">${o.delivery_type === 'retirada' ? '🏪 Retirada' : '🛵 Entrega'}</span></div>
        <div><span style="color:var(--muted)">Pagamento:</span> <span style="color:var(--text)">${o.payment_method||'—'}</span></div>
        ${o.delivery_address ? `<div style="grid-column:1/-1"><span style="color:var(--muted)">Endereço:</span> <span style="color:var(--text)">${typeof o.delivery_address === 'string' ? o.delivery_address : JSON.stringify(o.delivery_address)}</span></div>` : ''}
      </div>
      <hr style="border-color:var(--border)">
      <strong style="color:var(--text)">Itens do pedido</strong>
      ${items.map(i => `
        <div style="display:flex;justify-content:space-between;padding:10px;background:var(--hover);border-radius:8px;gap:8px">
          <div>
            <span style="font-weight:700;color:var(--text)">${i.quantity}x</span> <span style="color:var(--text)">${i.product_name||i.name||'—'}</span>
            ${(i.addons||[]).map(a => `<div style="color:var(--muted);font-size:.75rem;margin-left:8px">➕ ${a.name}</div>`).join('')}
            ${i.notes ? `<div style="color:var(--muted);font-size:.75rem;margin-top:2px">📝 ${i.notes}</div>` : ''}
          </div>
          <span class="price" style="white-space:nowrap">R$ ${parseFloat((i.unit_price||i.price||0)*i.quantity).toFixed(2).replace('.',',')}</span>
        </div>`).join('') || `<p style="color:var(--muted)">Sem itens registrados</p>`}
      <hr style="border-color:var(--border)">
      <div style="display:flex;justify-content:space-between;font-weight:800;font-size:1rem;color:var(--text)">
        <span>Total</span>
        <span class="price">R$ ${parseFloat(o.total||0).toFixed(2).replace('.',',')}</span>
      </div>
      ${o.notes ? `<div style="background:var(--hover);border-radius:8px;padding:10px;color:var(--text)"><strong>Obs:</strong> ${o.notes}</div>` : ''}
    </div>`, null);
  document.getElementById('modal-confirm').style.display = 'none';
}

async function avancarStatus(id, status) {
  const r = await api('PATCH', '/orders/' + id + '/status', { status });
  toast('Status atualizado!'); carregarPedidos();
  if (r && r.whatsapp_link) {
    if (confirm('Enviar mensagem WhatsApp para o cliente?')) {
      window.open(r.whatsapp_link, '_blank');
    }
  }
}
async function cancelarPedido(id) {
  if (!confirm('Cancelar este pedido?')) return;
  const r = await api('PATCH', '/orders/' + id + '/status', { status: 'cancelado' });
  toast('Pedido cancelado'); carregarPedidos();
  if (r && r.whatsapp_link) {
    if (confirm('Avisar o cliente via WhatsApp?')) {
      window.open(r.whatsapp_link, '_blank');
    }
  }
}

async function pagePagamentos() {
  document.getElementById('content').innerHTML = `
    <div style="display:flex;justify-content:flex-end;margin-bottom:16px">
      <button class="btn btn-primary" onclick="modalNovoPagamento()">+ Nova forma</button>
    </div>
    <div class="card" id="pay-table"><p style="color:#64748b">Carregando...</p></div>`;
  try {
    const methods = await api('GET', '/payment-methods');
    renderPagamentos(methods);
  } catch(e) {
    document.getElementById('pay-table').innerHTML = '<p style="color:#ef4444">Erro ao carregar formas de pagamento.</p>';
  }
}

function renderPagamentos(methods) {
  document.getElementById('pay-table').innerHTML = `
    <h3>Formas de Pagamento</h3>
    <table>
      <tr><th>Ordem</th><th>Nome</th><th>Descrição</th><th>Chave PIX</th><th>Troco</th><th>Status</th><th>Ações</th></tr>
      ${methods.map(m => `
        <tr>
          <td style="color:#94a3b8">${m.sort_order}</td>
          <td style="font-weight:600">${m.name}</td>
          <td style="color:#64748b">${m.description || '—'}</td>
          <td style="font-size:.8rem">${m.pix_key || '—'}</td>
          <td>${m.requires_change ? '<span class="badge badge-blue">Sim</span>' : '—'}</td>

          <td>
            <button class="btn btn-sm" onclick='modalEditarPagamento(${JSON.stringify(m)})'>✏️ Editar</button>
            <button class="btn btn-sm btn-danger" onclick="togglePagamento('${m.id}',${m.active})" style="margin-left:4px">${m.active ? 'Desativar' : 'Ativar'}</button>
            <button class="btn btn-sm btn-danger" onclick="deletarPagamento('${m.id}')" style="margin-left:4px">🗑</button>
          </td>
        </tr>`).join('')}
    </table>`;
}

function modalNovoPagamento() {
  openModal('Nova Forma de Pagamento', `
    <div class="form-grid">
      <div><label>Nome</label><input id="pm-name" placeholder="Ex: PIX, Dinheiro..." /></div>
      <div><label>Descrição</label><input id="pm-desc" placeholder="Ex: Pagamento via PIX" /></div>
      <div><label>Chave PIX <small style="color:#94a3b8">(opcional)</small></label><input id="pm-pix" placeholder="email, CPF ou chave aleatória" /></div>
      <div><label>Ordem de exibição</label><input id="pm-order" type="number" value="0" /></div>
      <div style="grid-column:1/-1;display:flex;align-items:center;gap:8px">
        <input type="checkbox" id="pm-change" style="width:18px;height:18px" />
        <label for="pm-change" style="margin:0">Requer informar troco</label>
      </div>
    </div>`, async () => {
    await api('POST', '/payment-methods', {
      name: v('pm-name'), description: v('pm-desc'), pix_key: v('pm-pix') || null,
      sort_order: parseInt(v('pm-order')) || 0,
      requires_change: document.getElementById('pm-change').checked
    });
    toast('Forma de pagamento criada!'); closeModal(); pagePagamentos();
  });
}

function modalEditarPagamento(m) {
  openModal('Editar Forma de Pagamento', `
    <div class="form-grid">
      <div><label>Nome</label><input id="epm-name" value="${m.name}" /></div>
      <div><label>Descrição</label><input id="epm-desc" value="${m.description || ''}" /></div>
      <div><label>Chave PIX</label><input id="epm-pix" value="${m.pix_key || ''}" /></div>
      <div><label>Ordem de exibição</label><input id="epm-order" type="number" value="${m.sort_order}" /></div>
      <div style="grid-column:1/-1;display:flex;align-items:center;gap:8px">
        <input type="checkbox" id="epm-change" style="width:18px;height:18px" ${m.requires_change ? 'checked' : ''} />
        <label for="epm-change" style="margin:0">Requer informar troco</label>
      </div>
    </div>`, async () => {
    await api('PATCH', `/payment-methods/${m.id}`, {
      name: v('epm-name'), description: v('epm-desc'), pix_key: v('epm-pix') || null,
      sort_order: parseInt(v('epm-order')) || 0,
      requires_change: document.getElementById('epm-change').checked
    });
    toast('Forma de pagamento atualizada!'); closeModal(); pagePagamentos();
  });
}

async function togglePagamento(id, active) {
  await api('PATCH', `/payment-methods/${id}`, { active: !active });
  toast(active ? 'Desativado' : 'Ativado'); pagePagamentos();
}

async function deletarPagamento(id) {
  if (!confirm('Excluir esta forma de pagamento?')) return;
  await api('DELETE', `/payment-methods/${id}`);
  toast('Excluído!'); pagePagamentos();
}

async function modalNovoAdicional() {
  openModal('Novo Adicional', `

async function modalEditarAdicional(id, nome, preco, available) {

      <div><label>Nome</label><input id="f-ad-nome" class="input" value="${nome}" /></div>
      <div><label>Preço (R$)</label><input id="f-ad-preco" class="input" type="number" step="0.01" value="${preco}" min="0"/></div>

async function deletarAdicional(id) {

}

      <div style="font-size:.83rem;color:#94a3b8;line-height:1.8">
        <p><strong style="color:#f1f5f9">Via rede (TCP)</strong> — Conecte a impressora no roteador e use <code style="background:#0f172a;padding:1px 6px;border-radius:4px">tcp://IP:9100</code></p>
        <p><strong style="color:#f1f5f9">Via USB no Windows</strong> — Use <code style="background:#0f172a;padding:1px 6px;border-radius:4px">printer:NomeDaImpressora</code></p>
        <p><strong style="color:#f1f5f9">Via USB no Linux</strong> — Use <code style="background:#0f172a;padding:1px 6px;border-radius:4px">/dev/usb/lp0</code></p>
        <p style="margin-top:8px;color:#64748b">Sem impressora configurada, os tickets são apenas exibidos no terminal do servidor.</p>
      </div>
    </div>`;
}

function salvarImpressoras() {
  localStorage.setItem('p_bebidas', v('p-bebidas'));
  localStorage.setItem('p_comida', v('p-comida'));
  localStorage.setItem('p_montagem', v('p-montagem'));
  toast('Configurações salvas! Adicione ao .env do servidor:');
  alert(`Adicione ao arquivo .env do delivery-backend:\n\nPRINTER_BEBIDAS=${v('p-bebidas')}\nPRINTER_COMIDA_QUENTE=${v('p-comida')}\nPRINTER_MONTAGEM=${v('p-montagem')}`);
}

// ── Bairros ───────────────────────────────────────────────────────
async function pageBairros() {
  await carregarBairrosCache();
  document.getElementById('content').innerHTML = `
    <div style="display:flex;justify-content:flex-end;margin-bottom:16px">
      <button class="btn btn-primary" onclick="modalNovoBairro()">+ Novo bairro</button>
    </div>
    <div class="card">
      <h3>Bairros e taxas de entrega (${NEIGHBORHOODS.length})</h3>
      <table>
        <tr><th>Zona</th><th>Bairro</th><th>Taxa</th><th>Ativo</th><th>Ações</th></tr>
        ${NEIGHBORHOODS.map(b => `
          <tr>
            <td><span class="badge badge-blue">${b.zone}</span></td>
            <td style="font-weight:600">${b.name}</td>
            <td class="price">R$ ${parseFloat(b.delivery_fee).toFixed(2).replace('.',',')}</td>
            <td><button class="toggle ${b.active ? 'on' : ''}" onclick="toggleBairroAtivo('${b.id}', ${b.active})"></button></td>
            <td><button class="btn btn-secondary btn-sm" onclick="modalEditarBairro('${b.id}')">✏️</button></td>
          </tr>`).join('') || '<tr><td colspan="5" style="text-align:center;color:#475569;padding:20px">Nenhum bairro cadastrado</td></tr>'}
      </table>
    </div>`;
}

function bairroForm(b = {}) {
  return `
    <div class="form-grid">
      <div><label>Zona</label><input id="b-zone" value="${b.zone || ''}" placeholder="Ex: CENTRAL" /></div>
      <div><label>Nome do bairro</label><input id="b-name" value="${b.name || ''}" /></div>
      <div><label>Taxa de entrega (R$)</label><input id="b-fee" type="number" step="0.01" value="${b.delivery_fee ?? ''}" /></div>
    </div>`;
}

function modalNovoBairro() {
  openModal('Novo Bairro', bairroForm(), async () => {
    await api('POST', '/neighborhoods', { zone: v('b-zone') || 'GERAL', name: v('b-name'), delivery_fee: parseFloat(v('b-fee')) });
    toast('Bairro criado!'); closeModal(); pageBairros();
  });
}

function modalEditarBairro(id) {
  const b = NEIGHBORHOODS.find(x => x.id === id);
  if (!b) return;
  openModal('Editar Bairro', bairroForm(b), async () => {
    await api('PATCH', '/neighborhoods/' + id, { zone: v('b-zone') || 'GERAL', name: v('b-name'), delivery_fee: parseFloat(v('b-fee')) });
    toast('Bairro atualizado!'); closeModal(); pageBairros();
  });
}

async function toggleBairroAtivo(id, current) {
  await api('PATCH', '/neighborhoods/' + id, { active: !current });
  toast(current ? 'Bairro desativado' : 'Bairro ativado');
  pageBairros();
}

// ── Configurações ─────────────────────────────────────────────────
function cfgImageHtml(idPrefix, label, url, folder, previewStyle) {
  return `
    <div>
      <label>${label}</label>
      <div style="display:flex;align-items:center;gap:10px">
        <img id="${idPrefix}-preview" src="${url || ''}" style="${previewStyle};object-fit:cover;border-radius:8px;background:#0f172a;${url ? '' : 'display:none'}" />
        <input type="file" accept="image/*" id="${idPrefix}-file" onchange="handleCfgImageUpload(this,'${idPrefix}','${folder}')" style="flex:1" />
        <span id="${idPrefix}-status" style="font-size:.75rem;color:#64748b"></span>
      </div>
      <input type="hidden" id="${idPrefix}" value="${url || ''}" />
    </div>`;
}

async function handleCfgImageUpload(inputEl, idPrefix, folder) {
  const file = inputEl.files[0];
  if (!file) return;
  const statusEl = document.getElementById(`${idPrefix}-status`);
  statusEl.textContent = 'Enviando...';
  try {
    const fd = new FormData();
    fd.append('image', file);
    fd.append('folder', folder);
    const res = await fetch('/api/menu/upload', { method: 'POST', headers: { Authorization: 'Bearer ' + TOKEN }, body: fd });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Erro ao enviar imagem');
    document.getElementById(idPrefix).value = data.url;
    const preview = document.getElementById(`${idPrefix}-preview`);
    preview.src = data.url;
    preview.style.display = '';
    statusEl.textContent = '✓ Enviada';
  } catch (err) {
    statusEl.textContent = '';
    toast(err.message, true);
  }
}

async function pageConfiguracoes() {
  const s = await api('GET', '/settings');
  document.getElementById('content').innerHTML = `
    <div class="card">
      <h3>Dados da loja</h3>
      <div class="form-grid">
        <div><label>Nome da loja</label><input id="cfg-name" value="${s.store_name || ''}" /></div>
        <div>
          <label>WhatsApp da loja (com DDD, só números)</label>
          <input id="cfg-wa" value="${s.store_whatsapp_number || ''}" placeholder="Ex: 96999990000" />
          <p style="color:#64748b;font-size:.75rem;margin-top:4px">Para onde os pedidos do app são enviados automaticamente ao serem finalizados.</p>
        </div>
        <div><label>Chave PIX</label><input id="cfg-pix" value="${s.pix_key || ''}" placeholder="email, telefone, CPF/CNPJ ou chave aleatória" /></div>
      </div>
    </div>
    <div class="card" style="margin-top:16px">
      <h3>Aparência do app do cliente</h3>
      <div class="form-grid">
        ${cfgImageHtml('cfg-logo', 'Logo', s.logo_url, 'logo', 'width:56px;height:56px')}
        ${cfgImageHtml('cfg-banner', 'Foto de capa (banner)', s.banner_image_url, 'banner', 'width:160px;height:56px')}
        <div>
          <label>Cor principal do app</label>
          <div style="display:flex;align-items:center;gap:10px">
            <input type="color" id="cfg-color" value="${s.primary_color || '#7c3aed'}" style="width:48px;height:38px;padding:2px;background:none" />
            <input id="cfg-color-hex" value="${s.primary_color || '#7c3aed'}" oninput="document.getElementById('cfg-color').value=this.value" style="flex:1" />
          </div>
          <p style="color:#64748b;font-size:.75rem;margin-top:4px">Usada nos botões, destaques e ícones do app do cliente.</p>
        </div>
      </div>
    </div>
    <div style="margin-top:16px">
      <button class="btn btn-primary" onclick="salvarConfiguracoes()">💾 Salvar configurações</button>
    </div>`;
  document.getElementById('cfg-color').addEventListener('input', (e) => document.getElementById('cfg-color-hex').value = e.target.value);
}

async function salvarConfiguracoes() {
  await api('PATCH', '/settings', {
    store_name: v('cfg-name'),
    store_whatsapp_number: v('cfg-wa').replace(/\D/g, ''),
    pix_key: v('cfg-pix'),
    logo_url: v('cfg-logo'),
    banner_image_url: v('cfg-banner'),
    primary_color: v('cfg-color'),
  });
  toast('Configurações salvas!');
}

// ── Helpers ───────────────────────────────────────────────────────
function v(id) { return document.getElementById(id)?.value || ''; }

// ── Init ──────────────────────────────────────────────────────────
api('GET', '/auth/me').then(u => {
  document.getElementById('user-info').textContent = `${u.name} · ${u.role}`;
}).catch(() => {});

carregarBairrosCache().then(() => showPage('dashboard'));
</script>
