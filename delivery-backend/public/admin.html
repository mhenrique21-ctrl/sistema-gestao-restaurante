<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — Confraria Café</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

/* ── Tema escuro (padrão) ── */
:root {
  --bg: #0f172a; --surface: #1e293b; --border: #334155;
  --text: #f1f5f9; --muted: #94a3b8; --subtle: #64748b;
  --hover: #334155; --row-hover: #0f172a; --input-bg: #0f172a;
}
/* ── Tema claro ── */
body.light {
  --bg: #f1f5f9; --surface: #ffffff; --border: #e2e8f0;
  --text: #0f172a; --muted: #475569; --subtle: #64748b;
  --hover: #e2e8f0; --row-hover: #f8fafc; --input-bg: #f8fafc;
}

body { font-family: system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; transition: background .2s, color .2s; }

/* Sidebar */
#sidebar { width: 220px; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; }
#sidebar .logo { padding: 20px 16px; border-bottom: 1px solid var(--border); }
#sidebar .logo h1 { font-size: 1.1rem; font-weight: 800; }
#sidebar .logo p { font-size: .72rem; color: var(--subtle); margin-top: 2px; }
#sidebar nav { flex: 1; padding: 12px 8px; }
.nav-btn { width: 100%; text-align: left; padding: 10px 12px; background: none; border: none; color: var(--muted); border-radius: 8px; font-size: .85rem; cursor: pointer; display: flex; align-items: center; gap: 10px; transition: all .15s; }
.nav-btn:hover { background: var(--hover); color: var(--text); }
.nav-btn.active { background: #7c3aed; color: #fff; }
#sidebar .bottom { padding: 12px; border-top: 1px solid var(--border); font-size: .72rem; color: var(--subtle); }

/* Main */
#main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
#topbar { background: var(--surface); border-bottom: 1px solid var(--border); padding: 12px 24px; display: flex; align-items: center; justify-content: space-between; }
#topbar h2 { font-size: 1rem; font-weight: 700; }
#content { flex: 1; overflow-y: auto; padding: 24px; }

/* Cards */
.card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 20px; margin-bottom: 20px; }
.card h3 { font-size: .85rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .05em; margin-bottom: 16px; display: flex; align-items: center; justify-content: space-between; }

/* Table */
table { width: 100%; border-collapse: collapse; font-size: .82rem; }
th { text-align: left; padding: 8px 12px; color: var(--subtle); border-bottom: 1px solid var(--border); font-weight: 600; font-size: .75rem; text-transform: uppercase; }
td { padding: 10px 12px; border-bottom: 1px solid var(--border); color: var(--muted); vertical-align: middle; }
tr:hover td { background: var(--row-hover); }

/* Form */
.form-grid { display: grid; gap: 12px; }
.form-grid.cols-2 { grid-template-columns: 1fr 1fr; }
.form-grid.cols-3 { grid-template-columns: 1fr 1fr 1fr; }
label { display: block; font-size: .75rem; color: var(--subtle); font-weight: 600; margin-bottom: 4px; }
input, select, textarea { width: 100%; background: var(--input-bg); border: 1px solid var(--border); color: var(--text); border-radius: 8px; padding: 8px 12px; font-size: .85rem; outline: none; }
input:focus, select:focus, textarea:focus { border-color: #7c3aed; }
textarea { resize: vertical; min-height: 70px; }

/* Buttons */
.btn { padding: 8px 16px; border: none; border-radius: 8px; font-size: .82rem; font-weight: 600; cursor: pointer; transition: all .15s; }
.btn-primary { background: #7c3aed; color: white; }
.btn-primary:hover { background: #6d28d9; }
.btn-secondary { background: var(--hover); color: var(--text); }
.btn-secondary:hover { background: var(--border); }
.btn-danger { background: #dc2626; color: white; }
.btn-danger:hover { background: #b91c1c; }
.btn-sm { padding: 4px 10px; font-size: .75rem; }
.btn-success { background: #059669; color: white; }

/* Badge */
.badge { display: inline-block; padding: 2px 8px; border-radius: 999px; font-size: .72rem; font-weight: 700; }
.badge-green { background: #d1fae5; color: #065f46; }
.badge-red { background: #fee2e2; color: #991b1b; }
.badge-gray { background: var(--hover); color: var(--muted); }
.badge-blue { background: #dbeafe; color: #1e40af; }

/* Toast */
#toast { position: fixed; bottom: 24px; right: 24px; background: #059669; color: white; padding: 12px 20px; border-radius: 10px; font-size: .85rem; font-weight: 600; transform: translateY(80px); opacity: 0; transition: all .3s; z-index: 999; }
#toast.show { transform: translateY(0); opacity: 1; }
#toast.error { background: #dc2626; }

/* Modal */
.modal-bg { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.7); z-index: 100; align-items: center; justify-content: center; }
.modal-bg.open { display: flex; }
.modal { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 24px; width: 100%; max-width: 520px; max-height: 90vh; overflow-y: auto; }
.modal h2 { font-size: 1rem; font-weight: 700; margin-bottom: 20px; }

/* Search */
.search-bar { display: flex; gap: 10px; margin-bottom: 16px; }
.search-bar input { flex: 1; }

/* Price */
.price { font-weight: 700; color: #a78bfa; }

/* Toggle switch */
.toggle { width: 36px; height: 20px; background: var(--border); border-radius: 999px; border: none; cursor: pointer; position: relative; transition: background .2s; }
.toggle.on { background: #7c3aed; }
.toggle::after { content: ''; position: absolute; top: 2px; left: 2px; width: 16px; height: 16px; background: white; border-radius: 50%; transition: left .2s; }
.toggle.on::after { left: 18px; }

/* Theme button */
#theme-btn { background: none; border: 1px solid var(--border); color: var(--text); border-radius: 8px; padding: 5px 10px; font-size: .8rem; cursor: pointer; transition: all .15s; }
#theme-btn:hover { background: var(--hover); }

/* Hamburger */
#hamburger { display: none; background: none; border: none; color: var(--text); font-size: 1.4rem; cursor: pointer; padding: 4px 8px; line-height: 1; }

/* Sidebar overlay (mobile) */
#sidebar-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.5); z-index: 199; }

/* ── Mobile ── */
@media (max-width: 768px) {
  body { flex-direction: column; }

  #hamburger { display: block; }

  #sidebar {
    position: fixed; top: 0; left: -240px; height: 100vh; width: 240px;
    z-index: 200; transition: left .25s ease; overflow-y: auto;
  }
  #sidebar.open { left: 0; }
  #sidebar-overlay.open { display: block; }

  #main { width: 100%; }

  #topbar { padding: 10px 16px; }
  #topbar h2 { font-size: .9rem; }

  #content { padding: 12px; }

  .card { padding: 14px; }

  /* Tables scroll horizontally */
  .table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }

  /* Form grids drop to 1 col */
  .form-grid.cols-2,
  .form-grid.cols-3 { grid-template-columns: 1fr; }

  /* Modal full-width */
  .modal { max-width: 100%; margin: 12px; border-radius: 12px; }

  /* Toast at bottom-center */
  #toast { bottom: 16px; right: 16px; left: 16px; text-align: center; }

  /* Pedidos cards — stack buttons */
  .pedido-actions { display: flex; flex-wrap: wrap; gap: 6px; }
}
</style>
</head>
<body>

<div id="sidebar">
  <div class="logo">
    <h1>☕ Confraria Café</h1>
    <p>Painel Administrativo</p>
  </div>
  <nav>
    <button class="nav-btn" onclick="showPage('dashboard',this)">📊 Dashboard</button>
    <button class="nav-btn" onclick="showPage('produtos',this)">🍽 Produtos</button>
    <button class="nav-btn" onclick="showPage('categorias',this)">📂 Categorias</button>
    <button class="nav-btn" onclick="showPage('clientes',this)">👥 Clientes</button>
    <button class="nav-btn" onclick="showPage('usuarios',this)">🔐 Usuários</button>
    <button class="nav-btn active" onclick="showPage('pedidos',this)">📋 Pedidos</button>
    <button class="nav-btn" onclick="showPage('bairros',this)">📍 Bairros</button>
    <button class="nav-btn" onclick="showPage('configuracoes',this)">⚙️ Configurações</button>
    <button class="nav-btn" onclick="showPage('pagamentos',this)">💳 Pagamentos</button>
    <button class="nav-btn" onclick="showPage('adicionais',this)">➕ Adicionais</button>
    <button class="nav-btn" onclick="showPage('impressoras',this)">🖨 Impressoras</button>
  </nav>
  <div class="bottom" id="user-info">Carregando...</div>
</div>

<div id="sidebar-overlay" onclick="closeSidebar()"></div>

<div id="main">
  <div id="topbar">
    <div style="display:flex;align-items:center;gap:10px;">
      <button id="hamburger" onclick="toggleSidebar()">☰</button>
      <h2 id="page-title">Dashboard</h2>
    </div>
    <div style="display:flex;gap:10px;align-items:center;">
      <span id="ws-dot" style="width:8px;height:8px;border-radius:50%;background:#ef4444;display:inline-block;"></span>
      <button id="theme-btn" onclick="toggleTheme()">🌙 Escuro</button>
      <button class="btn btn-secondary btn-sm" onclick="logout()">Sair</button>
    </div>
  </div>
  <div id="content"></div>
</div>

<div id="toast"></div>

<!-- Modal genérico -->
<div class="modal-bg" id="modal">
  <div class="modal">
    <h2 id="modal-title">Modal</h2>
    <div id="modal-body"></div>
    <div style="display:flex;gap:10px;justify-content:flex-end;margin-top:20px;">
      <button class="btn btn-secondary" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" id="modal-confirm" onclick="confirmModal()">Salvar</button>
    </div>
  </div>
</div>

<script>
// ── Auth ──────────────────────────────────────────────────────────
let TOKEN = localStorage.getItem('admin_token');

async function showLoginScreen() {
  document.body.innerHTML = `
    <div style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:#0f172a;font-family:system-ui,sans-serif;">
      <div style="background:#1e293b;border:1px solid #334155;border-radius:16px;padding:40px;width:100%;max-width:380px;text-align:center;">
        <div style="font-size:2.5rem;margin-bottom:8px;">☕</div>
        <h1 style="color:#f1f5f9;font-size:1.3rem;font-weight:800;margin-bottom:4px;">Confraria Café</h1>
        <p style="color:#64748b;font-size:.8rem;margin-bottom:28px;">Painel Administrativo</p>
        <div style="text-align:left;margin-bottom:14px;">
          <label style="color:#94a3b8;font-size:.75rem;font-weight:600;display:block;margin-bottom:4px;">E-mail</label>
          <input id="login-email" type="email" placeholder="admin@confrariacafe.com"
            style="width:100%;background:#0f172a;border:1px solid #334155;color:#f1f5f9;border-radius:8px;padding:10px 14px;font-size:.9rem;outline:none;" />
        </div>
        <div style="text-align:left;margin-bottom:20px;">
          <label style="color:#94a3b8;font-size:.75rem;font-weight:600;display:block;margin-bottom:4px;">Senha</label>
          <input id="login-senha" type="password" placeholder="••••••••"
            style="width:100%;background:#0f172a;border:1px solid #334155;color:#f1f5f9;border-radius:8px;padding:10px 14px;font-size:.9rem;outline:none;" />
        </div>
        <div id="login-erro" style="color:#f87171;font-size:.8rem;margin-bottom:12px;display:none;"></div>
        <button id="login-btn" onclick="doLogin()"
          style="width:100%;background:#7c3aed;color:#fff;border:none;border-radius:8px;padding:12px;font-size:.95rem;font-weight:700;cursor:pointer;">
          Entrar
        </button>
      </div>
    </div>`;
  document.getElementById('login-senha').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
}

async function doLogin() {
  const email = document.getElementById('login-email').value.trim();
  const senha = document.getElementById('login-senha').value;
  const erro = document.getElementById('login-erro');
  const btn = document.getElementById('login-btn');
  if (!email || !senha) { erro.textContent = 'Preencha e-mail e senha'; erro.style.display='block'; return; }
  btn.textContent = 'Entrando...'; btn.disabled = true;
  try {
    const res = await fetch('/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password: senha }),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Credenciais inválidas');
    if (data.user && data.user.role !== 'admin') throw new Error('Acesso restrito a administradores');
    TOKEN = data.token;
    localStorage.setItem('admin_token', TOKEN);
    location.reload();
  } catch (err) {
    erro.textContent = err.message;
    erro.style.display = 'block';
    btn.textContent = 'Entrar';
    btn.disabled = false;
  }
}

if (!TOKEN) { showLoginScreen(); }

async function api(method, path, body) {
  const res = await fetch('/api' + path, {
    method,
    headers: { 'Content-Type': 'application/json', Authorization: 'Bearer ' + TOKEN },
    body: body ? JSON.stringify(body) : undefined,
  });
  const data = await res.json();
  if (!res.ok) throw new Error(data.error || 'Erro');
  return data;
}

function imagePickerHtml(url = '') {
  return `
    <div>
      <label>Imagem do produto</label>
      <div style="display:flex;align-items:center;gap:10px">
        <img id="f-image-preview" src="${url}" style="width:56px;height:56px;object-fit:cover;border-radius:8px;background:#0f172a;${url ? '' : 'display:none'}" />
        <input type="file" accept="image/*" id="f-image-file" onchange="handleImageUpload(this)" style="flex:1" />
        <span id="f-image-status" style="font-size:.75rem;color:#64748b"></span>
      </div>
      <input type="hidden" id="f-image" value="${url}" />
    </div>`;
}

async function handleImageUpload(inputEl) {
  const file = inputEl.files[0];
  if (!file) return;
  const statusEl = document.getElementById('f-image-status');
  statusEl.textContent = 'Enviando...';
  try {
    const fd = new FormData();
    fd.append('image', file);
    const res = await fetch('/api/menu/upload', { method: 'POST', headers: { Authorization: 'Bearer ' + TOKEN }, body: fd });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Erro ao enviar imagem');
    document.getElementById('f-image').value = data.url;
    const preview = document.getElementById('f-image-preview');
    preview.src = data.url;
    preview.style.display = '';
    statusEl.textContent = '✓ Enviada';
  } catch (err) {
    statusEl.textContent = '';
    toast(err.message, true);
  }
}

function toast(msg, err = false) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'show' + (err ? ' error' : '');
  setTimeout(() => el.className = '', 3000);
}

function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('sidebar-overlay').classList.toggle('open');
}
function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebar-overlay').classList.remove('open');
}

function toggleTheme() {
  const light = document.body.classList.toggle('light');
  localStorage.setItem('admin_theme', light ? 'light' : 'dark');
  document.getElementById('theme-btn').textContent = light ? '☀️ Claro' : '🌙 Escuro';
}
// Aplica tema salvo
(function() {
  const t = localStorage.getItem('admin_theme');
  if (t === 'light') {
    document.body.classList.add('light');
    document.addEventListener('DOMContentLoaded', () => {
      const btn = document.getElementById('theme-btn');
      if (btn) btn.textContent = '☀️ Claro';
    });
  }
})();

function logout() {
  localStorage.removeItem('admin_token');
  location.reload();
}

// ── Catálogo de Bairros e Taxas de Entrega (carregado da API) ─────
let NEIGHBORHOODS = [];
async function carregarBairrosCache() {
  try {
    NEIGHBORHOODS = await api('GET', '/neighborhoods?all=true');
  } catch (e) {
    NEIGHBORHOODS = [];
  }
}

function getTaxaEntrega(bairro) {
  const found = NEIGHBORHOODS.find(b => b.name === bairro);
  return found ? parseFloat(found.delivery_fee) : null;
}

function bairroSelectOptions(selected) {
  const zonas = {};
  for (const b of NEIGHBORHOODS) {
    if (!b.active) continue;
    (zonas[b.zone] = zonas[b.zone] || []).push(b);
  }
  return Object.entries(zonas).map(([zona, bairros]) => `
    <optgroup label="── ${zona} ──">
      ${bairros.map(b => `<option value="${b.name}" ${b.name === selected ? 'selected' : ''}>
        ${b.name} — R$ ${parseFloat(b.delivery_fee).toFixed(2).replace('.',',')}
      </option>`).join('')}
    </optgroup>`).join('');
}

function atualizarTaxaEntrega() {
  const sel = document.getElementById('cf-neigh');
  const badge = document.getElementById('taxa-badge');
  if (!sel || !badge) return;
  const taxa = getTaxaEntrega(sel.value);
  if (taxa !== null) {
    badge.textContent = '🛵 Taxa: R$ ' + taxa.toFixed(2).replace('.',',');
    badge.style.display = 'inline-block';
    badge.style.background = '#064e3b';
    badge.style.color = '#6ee7b7';
  } else {
    badge.textContent = '';
    badge.style.display = 'none';
  }
}

// ── Som de notificação (beep via Web Audio API) ───────────────────
function tocarSomPedido() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    [0, 0.18, 0.36].forEach(t => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.type = 'sine'; osc.frequency.value = 880;
      gain.gain.setValueAtTime(0.4, ctx.currentTime + t);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + t + 0.15);
      osc.start(ctx.currentTime + t);
      osc.stop(ctx.currentTime + t + 0.15);
    });
  } catch(e) {}
}

// ── Banner de novo pedido ─────────────────────────────────────────
let _bannerTimer = null;
function mostrarBannerNovoPedido(num, waLinkCliente, waLinkAdmin) {
  let banner = document.getElementById('novo-pedido-banner');
  if (!banner) {
    banner = document.createElement('div');
    banner.id = 'novo-pedido-banner';
    document.body.appendChild(banner);
  }
  const waBtn = waLinkCliente
    ? `<a href="${waLinkCliente}" target="_blank" style="background:#25D366;color:#fff;border:none;border-radius:6px;padding:6px 14px;font-size:.85rem;font-weight:700;text-decoration:none;white-space:nowrap">📲 Cliente</a>`
    : '';
  const waAdminBtn = waLinkAdmin
    ? `<a href="${waLinkAdmin}" target="_blank" style="background:#128C7E;color:#fff;border:none;border-radius:6px;padding:6px 14px;font-size:.85rem;font-weight:700;text-decoration:none;white-space:nowrap">📲 Admin</a>`
    : '';
  banner.style = 'position:fixed;top:0;left:0;right:0;z-index:9999;background:#10b981;color:#fff;font-family:system-ui,sans-serif;font-size:1rem;font-weight:700;padding:12px 16px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;box-shadow:0 4px 16px rgba(0,0,0,.3)';
  banner.innerHTML = `
    <span style="flex:1;cursor:pointer" onclick="document.querySelectorAll('.nav-btn').forEach(b=>{if(b.textContent.includes('Pedidos'))b.click()});document.getElementById('novo-pedido-banner').remove()">
      🔔 ${num ? `Novo pedido #${num} chegou!` : 'Novo pedido chegou!'}
    </span>
    ${waBtn}
    ${waAdminBtn}
    <button onclick="document.getElementById('novo-pedido-banner').remove()" style="background:rgba(0,0,0,.2);border:none;color:#fff;border-radius:6px;padding:5px 12px;font-size:.85rem;cursor:pointer">✕</button>`;
  if (_bannerTimer) clearTimeout(_bannerTimer);
  _bannerTimer = setTimeout(() => banner?.remove(), 30000);
}

// ── WebSocket ─────────────────────────────────────────────────────
;(function wsConnect() {
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  const ws = new WebSocket(`${proto}://${location.host}/ws?token=${TOKEN}&station=retaguarda`);
  ws.onopen = () => document.getElementById('ws-dot').style.background = '#10b981';
  ws.onclose = () => { document.getElementById('ws-dot').style.background = '#ef4444'; setTimeout(wsConnect, 3000); };
  ws.onmessage = (e) => {
    const m = JSON.parse(e.data);
    if (m.type === 'order_update') {
      if (m.event === 'new_order') {
        tocarSomPedido();
        // Gera links no frontend com os dados do pedido recebido
        const o = m.order || {};
        const num = o.order_number;
        const phoneClean = (o.customer_phone || '').replace(/\D/g,'');
        const msgAdmin = `🔔 *Novo Pedido #${num}*\n👤 ${o.customer_name||''}\n📱 ${o.customer_phone||''}\n💰 ${o.item_count||''} item(s)`;
        const waCliente = phoneClean ? `https://wa.me/55${phoneClean}?text=${encodeURIComponent('Olá ' + (o.customer_name||'') + '! Seu pedido #' + num + ' foi recebido pela Confraria Café ☕')}` : null;
        const waAdmin = m.whatsapp_link_admin || null;
        mostrarBannerNovoPedido(num, waCliente, waAdmin);
        if (Notification.permission === 'granted') {
          new Notification('🔔 Novo pedido!', { body: `Pedido #${num} de ${o.customer_name||'cliente'}`, icon: '/api/logo' });
        }
      }
      if (currentPage === 'pedidos') carregarPedidos();
      if (currentPage === 'dashboard') showPage('dashboard');
    }
  };
})();

// Pedir permissão para notificações do navegador
if ('Notification' in window && Notification.permission === 'default') {
  Notification.requestPermission();
}

// ── Router ────────────────────────────────────────────────────────
let currentPage = 'dashboard';
let modalCallback = null;

function showPage(page, btn) {
  currentPage = page;
  closeSidebar();
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');
  const titles = { dashboard:'Dashboard', produtos:'Produtos', categorias:'Categorias', clientes:'Clientes', usuarios:'Usuários', pedidos:'Pedidos', bairros:'Bairros', configuracoes:'Configurações', pagamentos:'Formas de Pagamento', adicionais:'Adicionais', impressoras:'Impressoras' };
  document.getElementById('page-title').textContent = titles[page] || page;
  const pages = { dashboard: pageDashboard, produtos: pageProdutos, categorias: pageCategorias, clientes: pageClientes, usuarios: pageUsuarios, pedidos: pagePedidos, bairros: pageBairros, configuracoes: pageConfiguracoes, pagamentos: pagePagamentos, adicionais: pageAdicionais, impressoras: pageImpressoras };
  pages[page]?.();
}

function openModal(title, body, cb) {
  document.getElementById('modal-title').textContent = title;
  document.getElementById('modal-body').innerHTML = body;
  document.getElementById('modal').classList.add('open');
  modalCallback = cb;
}
function closeModal() { document.getElementById('modal').classList.remove('open'); modalCallback = null; }
async function confirmModal() {
  try {
    await modalCallback?.();
  } catch(e) {
    toast('❌ ' + (e.message || 'Erro ao salvar'), true);
  }
}

      ${stat('📦', 'Pedidos hoje', s.total_orders)}
      ${stat('💰', 'Faturamento', 'R$ ' + parseFloat(s.revenue||0).toFixed(2).replace('.',','))}
      ${stat('✅', 'Receita paga', 'R$ ' + parseFloat(s.paid_revenue||0).toFixed(2).replace('.',','))}
      ${stat('❌', 'Cancelados', s.cancelled)}

    <div class="card">
      <h3>🏆 Top produtos hoje</h3>
      <table>

        ${(d.top_products||[]).map(p => `<tr><td>${p.name}</td><td>${p.qty_sold}</td><td class="price">R$ ${parseFloat(p.revenue||0).toFixed(2).replace('.',',')}</td></tr>`).join('') || '<tr><td colspan="3" style="color:#475569;text-align:center;padding:20px">Sem vendas hoje</td></tr>'}
      </table>

}
function stat(icon, label, val) {
  return `<div class="card" style="margin:0"><div style="font-size:1.5rem">${icon}</div><div style="font-size:1.6rem;font-weight:800;margin:4px 0">${val}</div><div style="font-size:.75rem;color:#64748b">${label}</div></div>`;
}

// ── Produtos ──────────────────────────────────────────────────────
let produtos = [], categorias = [];
async function pageProdutos() {
  [produtos, categorias] = await Promise.all([
    api('GET', '/menu').then(cats => cats.flatMap(c => c.products.map(p => ({ ...p, category_name: c.name, category_id: c.id })))),
    api('GET', '/menu').then(cats => cats.map(c => ({ id: c.id, name: c.name }))),
  ]);
  renderProdutos();
}

let _prodFilter = '', _prodStatus = 'todos';
function renderProdutos(filter, status) {
  if (filter !== undefined) _prodFilter = filter;
  if (status !== undefined) _prodStatus = status;
  let list = produtos;
  if (_prodFilter) list = list.filter(p => p.name.toLowerCase().includes(_prodFilter.toLowerCase()));
  if (_prodStatus === 'ativos') list = list.filter(p => p.available);
  if (_prodStatus === 'inativos') list = list.filter(p => !p.available);
  const inativos = produtos.filter(p => !p.available).length;
  document.getElementById('content').innerHTML = `
    <div class="search-bar">
      <input placeholder="Buscar produto..." value="${_prodFilter}" oninput="renderProdutos(this.value)" />
      <div style="display:flex;gap:6px">
        <button class="btn btn-sm ${_prodStatus==='todos'?'btn-primary':'btn-secondary'}" onclick="renderProdutos(undefined,'todos')">Todos</button>
        <button class="btn btn-sm ${_prodStatus==='ativos'?'btn-primary':'btn-secondary'}" onclick="renderProdutos(undefined,'ativos')">✅ Ativos</button>
        <button class="btn btn-sm ${_prodStatus==='inativos'?'btn-danger':'btn-secondary'}" onclick="renderProdutos(undefined,'inativos')">🚫 Indisponíveis${inativos>0?' ('+inativos+')':''}</button>
      </div>
      <button class="btn btn-primary" onclick="modalNovoProduto()">+ Novo produto</button>
    </div>
    <div class="card">
      <h3>Produtos (${list.length})</h3>
      <table>
        <tr><th>Nome</th><th>Categoria</th><th>Preço</th><th>Status</th><th>Ações</th></tr>
        ${list.map(p => `
          <tr style="${!p.available ? 'opacity:0.6' : ''}">
            <td>${p.name}</td>
            <td><span class="badge badge-blue">${p.category_name}</span></td>
            <td class="price">R$ ${parseFloat(p.price).toFixed(2).replace('.',',')}</td>
            <td>
              <button onclick="toggleDisponivel('${p.id}', ${p.available})"
                style="padding:4px 10px;border-radius:8px;border:none;cursor:pointer;font-size:12px;font-weight:600;background:${p.available ? '#d1fae5' : '#fee2e2'};color:${p.available ? '#065f46' : '#991b1b'}">
                ${p.available ? '✅ Disponível' : '🚫 Indisponível'}
              </button>
            </td>
            <td style="display:flex;gap:6px">
              <button class="btn btn-secondary btn-sm" onclick="modalEditarProduto('${p.id}')" title="Editar">✏️</button>
              <button class="btn btn-secondary btn-sm" onclick="modalAdicionaisProduto('${p.id}')" title="Adicionais">🧩</button>
              <button class="btn btn-danger btn-sm" onclick="excluirProduto('${p.id}')" title="Excluir">🗑️</button>
            </td>
          </tr>`).join('')}
      </table>
    </div>`;
}

function modalNovoProduto() {
  const opts = categorias.map(c => `<option value="${c.id}">${c.name}</option>`).join('');
  openModal('Novo Produto', `
    <div class="form-grid">
      <div><label>Nome</label><input id="f-name" /></div>
      <div class="form-grid cols-2">
        <div><label>Preço (R$)</label><input id="f-price" type="number" step="0.01" /></div>
        <div><label>Categoria</label><select id="f-cat">${opts}</select></div>
      </div>
      <div><label>Descrição</label><textarea id="f-desc"></textarea></div>
      ${imagePickerHtml()}
      <div class="form-grid cols-2">
        <div><label>Preço promocional (R$, opcional)</label><input id="f-promo" type="number" step="0.01" /></div>
        <div style="display:flex;align-items:center;gap:8px;padding-top:20px">
          <button type="button" class="toggle" id="f-featured-toggle" onclick="this.classList.toggle('on')"></button>
          <label style="margin:0">Produto em destaque</label>
        </div>
      </div>
    </div>`, async () => {
    await api('POST', '/menu/products', {
      name: v('f-name'),
      price: parseFloat(v('f-price')),
      category_id: v('f-cat'),
      description: v('f-desc'),
      image_url: v('f-image') || undefined,
      promo_price: v('f-promo') ? parseFloat(v('f-promo')) : undefined,
      featured: document.getElementById('f-featured-toggle').classList.contains('on'),
    });
    toast('Produto criado!'); closeModal(); pageProdutos();
  });
}

function modalEditarProduto(id) {
  const p = produtos.find(x => x.id === id);
  if (!p) return;
  const opts = categorias.map(c => `<option value="${c.id}" ${c.id === p.category_id ? 'selected' : ''}>${c.name}</option>`).join('');
  openModal('Editar Produto', `
    <div class="form-grid">
      <div><label>Nome</label><input id="f-name" value="${p.name}" /></div>
      <div class="form-grid cols-2">
        <div><label>Preço (R$)</label><input id="f-price" type="number" step="0.01" value="${p.price}" /></div>
        <div><label>Categoria</label><select id="f-cat">${opts}</select></div>
      </div>
      <div><label>Descrição</label><textarea id="f-desc">${p.description || ''}</textarea></div>
      ${imagePickerHtml(p.image_url || '')}
      <div class="form-grid cols-2">
        <div><label>Preço promocional (R$, opcional)</label><input id="f-promo" type="number" step="0.01" value="${p.promo_price ?? ''}" /></div>
        <div style="display:flex;align-items:center;gap:8px;padding-top:20px">
          <button type="button" class="toggle ${p.featured ? 'on' : ''}" id="f-featured-toggle" onclick="this.classList.toggle('on')"></button>
          <label style="margin:0">Produto em destaque</label>
        </div>
      </div>
      <hr style="border-color:#334155">
      <div id="addons-section"><p style="color:#64748b;font-size:.8rem">Carregando adicionais...</p></div>
    </div>`, async () => {
    await api('PATCH', '/menu/products/' + id, {
      name: v('f-name'),
      price: parseFloat(v('f-price')),
      category_id: v('f-cat'),
      description: v('f-desc'),
      image_url: v('f-image'),
      promo_price: v('f-promo') ? parseFloat(v('f-promo')) : null,
      featured: document.getElementById('f-featured-toggle').classList.contains('on'),
    });
    toast('Produto atualizado!'); closeModal(); pageProdutos();
  });
  renderAddonsSection(id, () => modalEditarProduto(id));
}

async function excluirProduto(id) {
  const p = produtos.find(x => x.id === id);
  if (!confirm(`Excluir o produto "${p?.name || ''}"? Essa ação não pode ser desfeita.`)) return;
  try {
    await api('DELETE', '/menu/products/' + id);
    toast('Produto excluído!'); pageProdutos();
  } catch (e) {
    toast('❌ ' + e.message, true);
  }
}

function modalAdicionaisProduto(id) {
  const p = produtos.find(x => x.id === id);
  if (!p) return;
  openModal('Adicionais — ' + p.name, `<div id="addons-section"><p style="color:#64748b;font-size:.8rem">Carregando adicionais...</p></div>`, null);
  document.getElementById('modal-confirm').style.display = 'none';
  renderAddonsSection(id, () => modalAdicionaisProduto(id));
}

async function modalTemplateAddon(productId) {
  openModal('Adicionar Template de Grupo', `
    <p style="color:var(--muted);font-size:.82rem;margin-bottom:12px">Escolha um modelo pronto. Você poderá editar as opções depois.</p>
    <div style="display:grid;gap:8px">
      ${ADDON_TEMPLATES.map((t, i) => `
        <button type="button" onclick="aplicarTemplate('${productId}',${i})" style="text-align:left;background:var(--hover);border:1px solid var(--border);border-radius:8px;padding:10px 14px;cursor:pointer;color:var(--text)">
          <div style="font-weight:700">${t.name}</div>
          <div style="color:var(--muted);font-size:.76rem;margin-top:2px">${t.options.length > 0 ? t.options.map(o=>o.name).join(' · ') : 'Grupo vazio — adicione opções manualmente'}</div>
        </button>`).join('')}
    </div>`, null);
  document.getElementById('modal-confirm').style.display = 'none';
}

async function aplicarTemplate(productId, templateIndex) {
  const t = ADDON_TEMPLATES[templateIndex];
  closeModal();
  try {
    const group = await api('POST', `/menu/products/${productId}/addon-groups`, {
      name: t.name, min_select: t.min_select, max_select: t.max_select, required: t.required,
    });
    for (const op of t.options) {
      await api('POST', `/menu/addon-groups/${group.id}/options`, { name: op.name, price: op.price });
    }
    toast(`Grupo "${t.name}" adicionado!`);
    renderAddonsSection(productId);
  } catch(e) { toast('Erro: ' + e.message, true); }
}

  pago:'#1e40af',
  confirmado:'#5b21b6',
  pronto:'#065f46',
  saiu_para_entrega:'#0369a1',

async function carregarPedidos() {

function filtrarPedidos(filtro) {
  pedidosFiltro = filtro;
  document.querySelectorAll('[id^="filtro-"]').forEach(b => {
    const isActive = b.id === 'filtro-' + filtro;
    b.style.background = isActive ? '#7c3aed' : '#1e293b';
    b.style.color = isActive ? '#fff' : '#94a3b8';
  });
  carregarPedidos();
}

function renderPedidos(orders) {
  if (!orders.length) {
    document.getElementById('pedidos-lista').innerHTML = `<div class="card" style="text-align:center;color:var(--muted);padding:40px">Nenhum pedido encontrado</div>`;
    return;
  }

  // Ordenar por data/hora mais recente primeiro
  const sorted = [...orders].sort((a, b) => new Date(b.created_at) - new Date(a.created_at));

  // Agrupar por data
  const groups = {};
  for (const o of sorted) {
    const dt = new Date(o.created_at);
    const key = dt.toLocaleDateString('sv-SE', {timeZone:'America/Sao_Paulo'}); // YYYY-MM-DD
    if (!groups[key]) groups[key] = [];
    groups[key].push(o);
  }

  const hoje = new Date().toLocaleDateString('sv-SE', {timeZone:'America/Sao_Paulo'});
  const ontem = new Date(Date.now() - 86400000).toLocaleDateString('sv-SE', {timeZone:'America/Sao_Paulo'});

  function labelData(key) {
    if (key === hoje) return '📅 Hoje';
    if (key === ontem) return '📅 Ontem';
    return '📅 ' + new Date(key + 'T12:00:00').toLocaleDateString('pt-BR', {weekday:'long', day:'2-digit', month:'long'});
  }

  document.getElementById('pedidos-lista').innerHTML = Object.keys(groups)
    .sort((a, b) => b.localeCompare(a))
    .map(dateKey => {
      const dayOrders = groups[dateKey];
      const cardsHtml = dayOrders.map(o => {
        const cor = STATUS_COLOR[o.status] || '#334155';
        const hora = new Date(o.created_at).toLocaleTimeString('pt-BR', {hour:'2-digit',minute:'2-digit',timeZone:'America/Sao_Paulo'});
        const data = new Date(o.created_at).toLocaleDateString('pt-BR', {day:'2-digit',month:'2-digit',timeZone:'America/Sao_Paulo'});
    const num = o.order_number || o.id.slice(-4);
    const addr = o.delivery_address ? (typeof o.delivery_address === 'string' ? o.delivery_address : `${o.delivery_address.street||''}, ${o.delivery_address.number||''} — ${o.delivery_address.neighborhood||''}`) : '';
    return `
    <div style="background:var(--surface);border:1px solid var(--border);border-left:5px solid ${cor};border-radius:12px;padding:16px;margin-bottom:12px;box-shadow:0 1px 4px rgba(0,0,0,.15)">
      <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px">
        <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">
          <span style="font-family:monospace;font-weight:900;font-size:1.15rem;color:var(--text)">#${num}</span>
          <span style="background:${cor};color:#fff;padding:3px 12px;border-radius:999px;font-size:.75rem;font-weight:700;letter-spacing:.03em">${STATUS_LABEL[o.status]||o.status}</span>
          <span style="color:var(--muted);font-size:.8rem">${data} às ${hora}</span>
          <span id="timer-${o.id}" style="font-size:.78rem;font-weight:700;padding:2px 8px;border-radius:6px;background:#1e3a5f;color:#60a5fa" data-since="${o.created_at}" data-status="${o.status}">⏱ --:--</span>
          <span style="font-size:.85rem;color:var(--text)">${o.delivery_type === 'retirada' ? '🏪 Retirada' : '🛵 Entrega'}</span>
        </div>
        <div style="display:flex;align-items:center;gap:8px">
          <span style="font-weight:900;color:#7c3aed;font-size:1.1rem">R$ ${parseFloat(o.total||0).toFixed(2).replace('.',',')}</span>
          <span style="color:var(--muted);font-size:.8rem;background:var(--hover);padding:2px 8px;border-radius:6px">${o.payment_method||'-'}</span>
        </div>
      </div>
      <div style="display:flex;gap:20px;margin-top:10px;font-size:.85rem;flex-wrap:wrap;align-items:center">
        <div><span style="color:var(--muted)">Cliente: </span><strong style="color:var(--text)">${o.customer_name||'—'}</strong></div>
        ${o.customer_phone ? `<div style="color:var(--muted)">📱 <span style="color:var(--text)">${o.customer_phone}</span></div>` : ''}
        ${addr ? `<div style="color:var(--muted);display:flex;align-items:center;gap:6px">📍 <span style="color:var(--text)">${addr}</span><button onclick="copiarEndereco('${addr.replace(/'/g,"\\'")}')" style="background:none;border:1px solid var(--border);border-radius:6px;padding:1px 6px;font-size:.7rem;color:var(--muted);cursor:pointer" title="Copiar endereço">📋</button></div>` : ''}
        ${o.delivery_fee > 0 ? `<div style="color:var(--muted)">🛵 Taxa: <span style="color:#f59e0b;font-weight:700">R$ ${parseFloat(o.delivery_fee).toFixed(2).replace('.',',')}</span></div>` : (o.delivery_type === 'retirada' ? '' : `<div style="color:#10b981;font-size:.8rem;font-weight:600">🛵 Sem taxa</div>`)}
      </div>
      <div style="display:flex;gap:8px;margin-top:12px;flex-wrap:wrap">
        <button class="btn btn-secondary btn-sm" onclick="verPedido('${o.id}')">👁 Ver itens</button>
        <button class="btn btn-secondary btn-sm" onclick="imprimirPedido('${o.id}')">🖨 Imprimir</button>
        ${o.customer_phone && (o.status==='aguardando_pagamento'||o.status==='pago') ? `<button class="btn btn-sm" style="background:#25D366;color:#fff;border:none" onclick="confirmarEEnviarWA('${o.id}')">📲 Confirmar + WA</button>` : ''}
        ${o.customer_phone && o.status!=='aguardando_pagamento' && o.status!=='pago' && o.status!=='cancelado' && o.status!=='entregue' ? `<button class="btn btn-sm" style="background:#25D366;color:#fff;border:none" onclick="reenviarWA('${o.id}')">📲 WA</button>` : ''}

        <button class="btn btn-secondary btn-sm" onclick="editarPedido('${o.id}','${(o.customer_phone||'').replace(/'/g,'')}','${o.delivery_type}')">✏️ Editar</button>

      </div>
    </div>`;
      }).join('');

      return `

// ── Cronômetros dos pedidos ────────────────────────────────────────
const TIMER_STOP_STATUSES = ['entregue', 'cancelado'];
let _timerInterval = null;
function startOrderTimers() {
  if (_timerInterval) clearInterval(_timerInterval);
  function tick() {
    document.querySelectorAll('[id^="timer-"]').forEach(el => {
      const status = el.dataset.status;
      if (TIMER_STOP_STATUSES.includes(status)) {
        el.textContent = status === 'entregue' ? '✅ Entregue' : '✕ Cancelado';
        el.style.background = status === 'entregue' ? '#14532d' : '#450a0a';
        el.style.color = status === 'entregue' ? '#86efac' : '#fca5a5';
        return;
      }
      const since = new Date(el.dataset.since);
      const diff = Math.floor((Date.now() - since) / 1000);
      const h = Math.floor(diff / 3600);
      const m = Math.floor((diff % 3600) / 60);
      const s = diff % 60;
      const txt = h > 0 ? `${h}h ${String(m).padStart(2,'0')}m` : `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
      el.textContent = `⏱ ${txt}`;
      // Cor por urgência
      if (diff > 3600) { el.style.background='#450a0a'; el.style.color='#fca5a5'; } // >60min vermelho
      else if (diff > 1800) { el.style.background='#431407'; el.style.color='#fdba74'; } // >30min laranja
      else if (diff > 900) { el.style.background='#422006'; el.style.color='#fde68a'; } // >15min amarelo
      else { el.style.background='#1e3a5f'; el.style.color='#60a5fa'; } // azul normal
    });
  }
  tick();
  _timerInterval = setInterval(tick, 1000);
}

function montarMsgWA(o) {
  const num = o.order_number || o.id?.slice(-4) || '?';
  const nome = (o.customer_name || 'Cliente').split(' ')[0];
  const items = (o.items || []).map(i => {
    const sub = parseFloat((i.unit_price||i.price||0)*i.quantity).toFixed(2).replace('.',',');
    const addons = (i.addons||[]).map(a => `   ➕ ${a.name}`).join('\n');
    const obs = i.notes ? `\n   📝 ${i.notes}` : '';
    return `• ${i.quantity}x ${i.product_name||i.name} — R$ ${sub}${addons?'\n'+addons:''}${obs}`;
  }).join('\n');
  const addr = o.delivery_address ? (typeof o.delivery_address==='string' ? o.delivery_address : `${o.delivery_address.street||''}, ${o.delivery_address.number||''} - ${o.delivery_address.neighborhood||''}`) : '';
  const tipo = o.delivery_type==='retirada' ? '🏪 Retirada na loja' : `🛵 Entrega${addr?'\n📍 '+addr:''}`;
  const taxa = o.delivery_fee>0 ? `\n🛵 Taxa entrega: R$ ${parseFloat(o.delivery_fee).toFixed(2).replace('.',',')}` : '';
  const desc = o.discount_amount>0 ? `\n🎟 Desconto: -R$ ${parseFloat(o.discount_amount).toFixed(2).replace('.',',')}` : '';
  const obsGeral = o.notes ? `\n\n📝 *Obs:* ${o.notes}` : '';
  const subtotal = (o.items||[]).reduce((s,i)=>s+parseFloat((i.unit_price||i.price||0)*i.quantity),0);
  const linhaSubtotal = taxa || desc ? `\nSubtotal: R$ ${subtotal.toFixed(2).replace('.',',')}` : '';
  return `☕ *Confraria Café*\n` +
    `📍 Av Almirante Barroso, 746 - Centro\n` +
    `📞 96 97400-7410\n` +
    `─────────────────\n` +
    `✅ *Pedido #${num} confirmado!*\n\n` +
    `Olá ${nome}! Seu pedido foi recebido e já estamos preparando ☕\n\n` +
    `*🛒 Itens:*\n${items}${obsGeral}\n\n` +
    `${tipo}${linhaSubtotal}${taxa}${desc}\n` +
    `─────────────────\n` +
    `💰 *Total: R$ ${parseFloat(o.total||0).toFixed(2).replace('.',',')}*\n` +
    `💳 Pagamento: ${o.payment_method||''}\n\n` +
    `Em breve ficará pronto! 🎉`;
}

async function confirmarEEnviarWA(id) {
  try {
    const o = await api('GET', '/orders/' + id);
    const phone = (o.customer_phone || '').replace(/\D/g, '');
    if (!phone) { toast('Cliente sem telefone', true); return; }
    if (o.status === 'aguardando_pagamento' || o.status === 'pago') {
      await api('PATCH', '/orders/' + id + '/status', { status: 'confirmado' });
      carregarPedidos();
    }
    const url = 'https://wa.me/55' + phone + '?text=' + encodeURIComponent(montarMsgWA(o));
    toastWhatsApp('✅ Pedido confirmado! Toque para avisar o cliente:', url);
  } catch(e) { toast('Erro: ' + e.message, true); }
}

async function reenviarWA(id) {

function copiarEndereco(addr) {
  navigator.clipboard.writeText(addr).then(() => toast('Endereço copiado!')).catch(() => {
    const el = document.createElement('textarea');
    el.value = addr;
    document.body.appendChild(el);
    el.select();
    document.execCommand('copy');
    document.body.removeChild(el);
    toast('Endereço copiado!');
  });
}

async function getLogoDataUrl() {
  try {
    const res = await fetch('/api/logo');
    if (!res.ok) return null;
    const blob = await res.blob();
    return new Promise(resolve => {
      const reader = new FileReader();
      reader.onload = () => resolve(reader.result);
      reader.onerror = () => resolve(null);
      reader.readAsDataURL(blob);
    });
  } catch { return null; }
}

            <th style="padding:12px 16px;text-align:right;font-size:.78rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.05em">Preço</th>

          </tr>
        </thead>

          <tr style="border-top:1px solid var(--border);${i%2===1?'background:var(--hover)':''}">
            <td style="padding:12px 16px;color:var(--text);font-weight:600">${p.name}</td>

async function modalNovoAdicional() {
  openModal('Novo Adicional', `
    <div style="display:grid;gap:12px">
      <div><label>Nome</label><input id="f-ad-nome" class="input" placeholder="ex: Queijo Mussarela" /></div>
      <div><label>Preço (R$)</label><input id="f-ad-preco" class="input" type="number" step="0.01" value="0" min="0"/></div>
    </div>`, async () => {
    const nome = document.getElementById('f-ad-nome').value.trim();
    if (!nome) { toast('Informe o nome', true); throw new Error(); }
    if (!_adicionaisCatId) { toast('Categoria Adicionais não encontrada', true); throw new Error(); }
    await api('POST', '/menu/products', { name: nome, price: +document.getElementById('f-ad-preco').value, category_id: _adicionaisCatId, available: true });
    toast('Adicional criado!'); pageAdicionais();
  });
}

async function modalEditarAdicional(id, nome, preco, available) {
  openModal('Editar Adicional', `
    <div style="display:grid;gap:12px">
      <div><label>Nome</label><input id="f-ad-nome" class="input" value="${nome}" /></div>
      <div><label>Preço (R$)</label><input id="f-ad-preco" class="input" type="number" step="0.01" value="${preco}" min="0"/></div>
      <label style="display:flex;align-items:center;gap:8px;cursor:pointer"><input id="f-ad-active" type="checkbox" ${available?'checked':''}/> Ativo</label>
    </div>`, async () => {
    await api('PATCH', `/menu/products/${id}`, { name: document.getElementById('f-ad-nome').value.trim(), price: +document.getElementById('f-ad-preco').value, available: document.getElementById('f-ad-active').checked });
    toast('Adicional atualizado!'); pageAdicionais();
  });
}

async function deletarAdicional(id) {
  if (!confirm('Remover este adicional?')) return;
  await api('DELETE', '/menu/products/' + id);
  toast('Adicional removido!'); pageAdicionais();
}

// ── Configurações ─────────────────────────────────────────────────
function cfgImageHtml(idPrefix, label, url, folder, previewStyle) {
  return `
    <div>
      <label>${label}</label>
      <div style="display:flex;align-items:center;gap:10px">
        <img id="${idPrefix}-preview" src="${url || ''}" style="${previewStyle};object-fit:cover;border-radius:8px;background:#0f172a;${url ? '' : 'display:none'}" />
        <input type="file" accept="image/*" id="${idPrefix}-file" onchange="handleCfgImageUpload(this,'${idPrefix}','${folder}')" style="flex:1" />
        <span id="${idPrefix}-status" style="font-size:.75rem;color:#64748b"></span>
      </div>
      <input type="hidden" id="${idPrefix}" value="${url || ''}" />
    </div>`;
}

async function handleCfgImageUpload(inputEl, idPrefix, folder) {
  const file = inputEl.files[0];
  if (!file) return;
  const statusEl = document.getElementById(`${idPrefix}-status`);
  statusEl.textContent = 'Enviando...';
  try {
    const fd = new FormData();
    fd.append('image', file);
    fd.append('folder', folder);
    const res = await fetch('/api/menu/upload', { method: 'POST', headers: { Authorization: 'Bearer ' + TOKEN }, body: fd });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Erro ao enviar imagem');
    document.getElementById(idPrefix).value = data.url;
    const preview = document.getElementById(`${idPrefix}-preview`);
    preview.src = data.url;
    preview.style.display = '';
    statusEl.textContent = '✓ Enviada';
  } catch (err) {
    statusEl.textContent = '';
    toast(err.message, true);
  }
}

async function pageConfiguracoes() {

          </div>
          <p style="color:#64748b;font-size:.75rem;margin-top:4px">Usada nos botões, destaques e ícones do app do cliente.</p>

      <h3>🕐 Horários de Funcionamento</h3>
      <div style="font-size:.8rem;color:var(--muted);margin-bottom:14px">Define quando a loja aparece aberta para os clientes no app.</div>

        <tr><th>Dia</th><th>Aberto</th><th>Abertura</th><th>Fechamento</th></tr>
        ${(['Segunda','Terça','Quarta','Quinta','Sexta','Sábado','Domingo']).map((dia, i) => {
          const key = `hs_${i}`;
          const h = (s.business_hours || {})[i] || {};
          return `<tr>
            <td style="font-weight:600;color:var(--text)">${dia}</td>
            <td><button type="button" class="toggle ${h.open ? 'on' : ''}" id="${key}_open" onclick="this.classList.toggle('on')"></button></td>
            <td><input type="time" id="${key}_from" value="${h.from||'08:00'}" style="width:110px" /></td>
            <td><input type="time" id="${key}_to" value="${h.to||'22:00'}" style="width:110px" /></td>

    <div class="card" style="margin-top:16px">
      <h3>📅 Datas Especiais e Feriados</h3>
      <div style="font-size:.8rem;color:var(--muted);margin-bottom:14px">Defina horários diferentes ou feche a loja em datas específicas.</div>
      <div id="special-dates-list">
        ${((s.special_dates || [])).map((d, i) => `
          <div id="sd-${i}" style="display:grid;grid-template-columns:1fr 1fr 1fr 1fr auto;gap:8px;align-items:end;margin-bottom:10px">
            <div><label>Data</label><input type="date" id="sd_date_${i}" value="${d.date||''}" /></div>
            <div><label>Descrição</label><input id="sd_desc_${i}" value="${d.desc||''}" placeholder="Ex: Natal" /></div>

    <div style="margin-top:16px">

let _sdCount = 0;
function addSpecialDate() {
  const list = document.getElementById('special-dates-list');
  const i = 'new_' + (_sdCount++);
  const div = document.createElement('div');
  div.id = `sd-${i}`;
  div.style = 'display:grid;grid-template-columns:1fr 1fr 1fr 1fr auto;gap:8px;align-items:end;margin-bottom:10px';
  div.innerHTML = `
    <div><label>Data</label><input type="date" id="sd_date_${i}" /></div>
    <div><label>Descrição</label><input id="sd_desc_${i}" placeholder="Ex: Feriado" /></div>
    <div><label>Abertura</label><input type="time" id="sd_from_${i}" /></div>
    <div><label>Fechamento</label><input type="time" id="sd_to_${i}" /></div>
    <div><label>Fechado</label><button type="button" class="toggle" id="sd_closed_${i}" onclick="this.classList.toggle('on')" title="Fechar loja nessa data"></button></div>`;
  list.appendChild(div);
}

async function salvarConfiguracoes() {
  // Horários de funcionamento
  const business_hours = {};
  for (let i = 0; i < 7; i++) {
    const key = `hs_${i}`;
    business_hours[i] = {
      open: document.getElementById(`${key}_open`)?.classList.contains('on') || false,
      from: document.getElementById(`${key}_from`)?.value || '08:00',
      to: document.getElementById(`${key}_to`)?.value || '22:00',
    };
  }
  // Datas especiais
  const special_dates = [];
  document.querySelectorAll('[id^="sd-"]').forEach(row => {
    const i = row.id.replace('sd-', '');
    const date = document.getElementById(`sd_date_${i}`)?.value;
    if (!date) return;
    special_dates.push({
      date,
      desc: document.getElementById(`sd_desc_${i}`)?.value || '',
      from: document.getElementById(`sd_from_${i}`)?.value || '',
      to: document.getElementById(`sd_to_${i}`)?.value || '',
      closed: document.getElementById(`sd_closed_${i}`)?.classList.contains('on') || false,
    });
  });

  await api('PATCH', '/settings', {
    store_name: v('cfg-name'),
    store_whatsapp_number: v('cfg-wa').replace(/\D/g, ''),
    pix_key: v('cfg-pix'),
    logo_url: v('cfg-logo'),
    banner_image_url: v('cfg-banner'),
    primary_color: v('cfg-color'),
    business_hours,
    special_dates,
  });
  toast('Configurações salvas!');
}
