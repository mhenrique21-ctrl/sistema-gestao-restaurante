<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#7c3aed">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Admin Confraria">
<link rel="icon" type="image/png" href="/admin-icon.png">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<link rel="apple-touch-icon" href="/admin-icon.png">
<title>Admin — Confraria Café</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

/* ── Tema escuro (padrão) ── */
:root {
  --bg: #0f172a; --surface: #1e293b; --border: #334155;
  --text: #f1f5f9; --muted: #94a3b8; --subtle: #64748b;
  --hover: #334155; --row-hover: #0f172a; --input-bg: #0f172a;
}
/* ── Tema claro ── */
body.light {
  --bg: #f1f5f9; --surface: #ffffff; --border: #e2e8f0;
  --text: #0f172a; --muted: #475569; --subtle: #64748b;
  --hover: #e2e8f0; --row-hover: #f8fafc; --input-bg: #f8fafc;
}

body { font-family: system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; transition: background .2s, color .2s; }

/* Sidebar */
html.embed-mode #sidebar, html.embed-mode #topbar { display: none !important; }
html.embed-mode #content { padding: 12px; }
html.embed-mode .pedido-cards-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 12px; }
html.embed-mode .pedido-card {
  aspect-ratio: 1 / 1; margin-bottom: 0 !important; padding: 14px !important; display: flex; flex-direction: column;
  justify-content: flex-start; overflow: hidden; gap: 8px;
}
/* Esconde infos secundárias (data/hora, tipo de entrega, telefone, taxa) pra caber tudo sem rolagem */
html.embed-mode .pedido-card-secondary { display: none !important; }
html.embed-mode .pedido-card-header { gap: 6px !important; font-size: .74rem; }
html.embed-mode .pedido-card-header span { font-size: .74rem !important; padding: 2px 8px !important; }
html.embed-mode .pedido-card-header span[style*="1.15rem"] { font-size: .95rem !important; }
html.embed-mode .pedido-card-header span[style*="1.1rem"] { font-size: .9rem !important; }
html.embed-mode .pedido-card-meta { gap: 8px !important; margin-top: 0 !important; font-size: .78rem; }
html.embed-mode .pedido-card-addr { min-width: 0; flex: 1 1 100%; }
html.embed-mode .pedido-card-addr-text { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 220px; display: inline-block; vertical-align: bottom; }
html.embed-mode .pedido-card-actions { gap: 6px !important; margin-top: 0 !important; }
html.embed-mode .pedido-card .btn-sm { font-size: .74rem; padding: 5px 9px; line-height: 1.2; }
#sidebar { width: 220px; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; }
#sidebar .logo { padding: 20px 16px; border-bottom: 1px solid var(--border); }
#sidebar .logo h1 { font-size: 1.1rem; font-weight: 800; }
#sidebar .logo p { font-size: .72rem; color: var(--subtle); margin-top: 2px; }
#sidebar nav { flex: 1; padding: 12px 8px; }
.nav-btn { width: 100%; text-align: left; padding: 10px 12px; background: none; border: none; color: var(--muted); border-radius: 8px; font-size: .85rem; cursor: pointer; display: flex; align-items: center; gap: 10px; transition: all .15s; }
.nav-btn:hover { background: var(--hover); color: var(--text); }
.nav-btn.active { background: #7c3aed; color: #fff; }
#sidebar .bottom { padding: 12px; border-top: 1px solid var(--border); font-size: .72rem; color: var(--subtle); }

/* Main */
#main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
#topbar { background: var(--surface); border-bottom: 1px solid var(--border); padding: 12px 24px; display: flex; align-items: center; justify-content: space-between; }
#topbar h2 { font-size: 1rem; font-weight: 700; }
#content { flex: 1; overflow-y: auto; padding: 24px; }

/* Cards */
.card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 20px; margin-bottom: 20px; }
.card h3 { font-size: .85rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .05em; margin-bottom: 16px; display: flex; align-items: center; justify-content: space-between; }

/* Table */
table { width: 100%; border-collapse: collapse; font-size: .82rem; }
th { text-align: left; padding: 8px 12px; color: var(--subtle); border-bottom: 1px solid var(--border); font-weight: 600; font-size: .75rem; text-transform: uppercase; }
td { padding: 10px 12px; border-bottom: 1px solid var(--border); color: var(--muted); vertical-align: middle; }
tr:hover td { background: var(--row-hover); }

/* Form */
.form-grid { display: grid; gap: 12px; }
.form-grid.cols-2 { grid-template-columns: 1fr 1fr; }
.form-grid.cols-3 { grid-template-columns: 1fr 1fr 1fr; }
label { display: block; font-size: .75rem; color: var(--subtle); font-weight: 600; margin-bottom: 4px; }
input, select, textarea { width: 100%; background: var(--input-bg); border: 1px solid var(--border); color: var(--text); border-radius: 8px; padding: 8px 12px; font-size: .85rem; outline: none; }
input:focus, select:focus, textarea:focus { border-color: #7c3aed; }
textarea { resize: vertical; min-height: 70px; }

/* Buttons */
.btn { padding: 8px 16px; border: none; border-radius: 8px; font-size: .82rem; font-weight: 600; cursor: pointer; transition: all .15s; }
.btn-primary { background: #7c3aed; color: white; }
.btn-primary:hover { background: #6d28d9; }
.btn-secondary { background: var(--hover); color: var(--text); }
.btn-secondary:hover { background: var(--border); }
.btn-danger { background: #dc2626; color: white; }
.btn-danger:hover { background: #b91c1c; }
.btn-sm { padding: 4px 10px; font-size: .75rem; }
.btn-success { background: #059669; color: white; }

/* Badge */
.badge { display: inline-block; padding: 2px 8px; border-radius: 999px; font-size: .72rem; font-weight: 700; }
.badge-green { background: #d1fae5; color: #065f46; }
.badge-red { background: #fee2e2; color: #991b1b; }
.badge-gray { background: var(--hover); color: var(--muted); }
.badge-blue { background: #dbeafe; color: #1e40af; }

/* Toast */
#toast { position: fixed; bottom: 24px; right: 24px; background: #059669; color: white; padding: 12px 20px; border-radius: 10px; font-size: .85rem; font-weight: 600; transform: translateY(80px); opacity: 0; transition: all .3s; z-index: 999; }
#toast.show { transform: translateY(0); opacity: 1; }
#toast.error { background: #dc2626; }

/* Modal */
.modal-bg { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.7); z-index: 100; align-items: center; justify-content: center; }
.modal-bg.open { display: flex; }
.modal { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; width: 100%; max-width: 520px; max-height: 90vh; display: flex; flex-direction: column; overflow: hidden; }
.modal-scroll { flex: 1; overflow-y: auto; padding: 24px 24px 0; }
.modal-footer { padding: 16px 24px; border-top: 1px solid var(--border); display: flex; gap: 10px; justify-content: flex-end; flex-shrink: 0; background: var(--surface); }
.modal h2 { font-size: 1rem; font-weight: 700; margin-bottom: 20px; }

/* Search */
.search-bar { display: flex; gap: 10px; margin-bottom: 16px; }
.search-bar input { flex: 1; }

/* Price */
.price { font-weight: 700; color: #a78bfa; }

/* Toggle switch */
.toggle { width: 36px; height: 20px; background: var(--border); border-radius: 999px; border: none; cursor: pointer; position: relative; transition: background .2s; }
.toggle.on { background: #7c3aed; }
.toggle::after { content: ''; position: absolute; top: 2px; left: 2px; width: 16px; height: 16px; background: white; border-radius: 50%; transition: left .2s; }
.toggle.on::after { left: 18px; }

/* Theme button */
#theme-btn { background: none; border: 1px solid var(--border); color: var(--text); border-radius: 8px; padding: 5px 10px; font-size: .8rem; cursor: pointer; transition: all .15s; }
#theme-btn:hover { background: var(--hover); }

/* Hamburger */
#hamburger { display: none; background: none; border: none; color: var(--text); font-size: 1.4rem; cursor: pointer; padding: 4px 8px; line-height: 1; }

/* Sidebar overlay (mobile) */
#sidebar-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.5); z-index: 199; }

/* ── Mobile ── */
@media (max-width: 768px) {
  body { flex-direction: column; height: 100vh; overflow: hidden; }

  #hamburger { display: block; }

  #sidebar {
    position: fixed; top: 0; left: -240px; height: 100vh; width: 240px;
    z-index: 200; transition: left .25s ease; overflow-y: auto;
  }
  #sidebar.open { left: 0; }
  #sidebar-overlay.open { display: block; }

  #main { width: 100%; }

  #topbar { padding: 10px 16px; }
  #topbar h2 { font-size: .9rem; }

  #content { padding: 12px; }

  .card { padding: 14px; }

  /* Tables scroll horizontally */
  .table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }

  /* Form grids drop to 1 col */
  .form-grid.cols-2,
  .form-grid.cols-3 { grid-template-columns: 1fr; }

  /* Modal full-width */
  .modal { max-width: 100%; margin: 12px; border-radius: 12px; }

  /* Toast at bottom-center */
  #toast { bottom: 16px; right: 16px; left: 16px; text-align: center; }

  /* Pedidos cards — stack buttons */
  .pedido-actions { display: flex; flex-wrap: wrap; gap: 6px; }
}
</style>
</head>
<body>
<script>
  if (new URLSearchParams(location.search).get('embed')) {
    document.documentElement.classList.add('embed-mode');
  }
</script>

<div id="sidebar">
  <div class="logo">
    <h1>☕ Confraria Café</h1>
    <p>Painel Administrativo</p>
  </div>
  <nav id="sidebar-nav">
    <button class="nav-btn" data-page="dashboard" onclick="showPage('dashboard',this)">📊 Dashboard</button>
    <button class="nav-btn" data-page="pedidos" onclick="showPage('pedidos',this)">📋 Pedidos</button>
    <button class="nav-btn" data-page="produtos" onclick="showPage('produtos',this)">🍽 Produtos</button>
    <button class="nav-btn" data-page="categorias" onclick="showPage('categorias',this)">📂 Categorias</button>
    <button class="nav-btn" data-page="clientes" onclick="showPage('clientes',this)">👥 Clientes</button>
    <button class="nav-btn" data-page="usuarios" onclick="showPage('usuarios',this)">🔐 Usuários</button>
    <button class="nav-btn" data-page="bairros" onclick="showPage('bairros',this)">📍 Bairros</button>
    <button class="nav-btn" data-page="configuracoes" onclick="showPage('configuracoes',this)">⚙️ Configurações</button>

    <button class="nav-btn" data-page="financeiro" onclick="showPage('financeiro',this)">💰 Financeiro</button>

<div id="sidebar-overlay" onclick="closeSidebar()"></div>

<div id="main">
  <div id="topbar">
    <div style="display:flex;align-items:center;gap:10px;">
      <button id="hamburger" onclick="toggleSidebar()">☰</button>
      <h2 id="page-title">Dashboard</h2>
    </div>
    <div style="display:flex;gap:10px;align-items:center;">
      <span id="ws-dot" style="width:8px;height:8px;border-radius:50%;background:#ef4444;display:inline-block;"></span>
      <button id="theme-btn" onclick="toggleTheme()">🌙 Escuro</button>
      <button class="btn btn-secondary btn-sm" onclick="logout()">Sair</button>

  <div id="content"></div>
</div>

<div id="toast"></div>

<!-- Modal genérico -->
<div class="modal-bg" id="modal">
  <div class="modal">
    <div class="modal-scroll">
      <h2 id="modal-title">Modal</h2>
      <div id="modal-body"></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" id="modal-confirm" onclick="confirmModal()">💾 Salvar</button>
    </div>
  </div>
</div>

<script>
// ── Auth ──────────────────────────────────────────────────────────
let TOKEN = localStorage.getItem('admin_token');

// Perfil do usuário logado
let CURRENT_USER = null;

function parseJwt(token) {
  try { return JSON.parse(atob(token.split('.')[1])); } catch { return null; }
}

function canAccess(page) {
  if (!CURRENT_USER) return false;
  if (CURRENT_USER.role === 'admin') return true;
  return (CURRENT_USER.permissions || []).includes(page);
}

async function showLoginScreen() {
  document.body.innerHTML = `
    <div style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:#0f172a;font-family:system-ui,sans-serif;">
      <div style="background:#1e293b;border:1px solid #334155;border-radius:16px;padding:40px;width:100%;max-width:380px;text-align:center;margin:16px;">
        <div style="font-size:2.5rem;margin-bottom:8px;">☕</div>
        <h1 style="color:#f1f5f9;font-size:1.3rem;font-weight:800;margin-bottom:4px;">Confraria Café</h1>
        <p style="color:#64748b;font-size:.8rem;margin-bottom:28px;">Painel Administrativo</p>
        <div style="text-align:left;margin-bottom:14px;">
          <label style="color:#94a3b8;font-size:.75rem;font-weight:600;display:block;margin-bottom:4px;">Nome</label>
          <input id="login-nome" type="text" placeholder="Seu nome de usuário"
            style="width:100%;background:#0f172a;border:1px solid #334155;color:#f1f5f9;border-radius:8px;padding:10px 14px;font-size:.9rem;outline:none;" />
        </div>
        <div style="text-align:left;margin-bottom:20px;">
          <label style="color:#94a3b8;font-size:.75rem;font-weight:600;display:block;margin-bottom:4px;">Senha</label>
          <input id="login-senha" type="password" placeholder="••••••••"
            style="width:100%;background:#0f172a;border:1px solid #334155;color:#f1f5f9;border-radius:8px;padding:10px 14px;font-size:.9rem;outline:none;" />
        </div>
        <div id="login-erro" style="color:#f87171;font-size:.8rem;margin-bottom:12px;display:none;"></div>
        <button id="login-btn" onclick="doLogin()"
          style="width:100%;background:#7c3aed;color:#fff;border:none;border-radius:8px;padding:12px;font-size:.95rem;font-weight:700;cursor:pointer;">
          Entrar
        </button>
      </div>
    </div>`;
  document.getElementById('login-senha').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
}

async function doLogin() {
  const nome = document.getElementById('login-nome').value.trim();
  const senha = document.getElementById('login-senha').value;
  const erro = document.getElementById('login-erro');
  const btn = document.getElementById('login-btn');
  if (!nome || !senha) { erro.textContent = 'Preencha nome e senha'; erro.style.display='block'; return; }
  btn.textContent = 'Entrando...'; btn.disabled = true;
  try {
    const res = await fetch('/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name: nome, password: senha }),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Credenciais inválidas');
    if (!['admin','operador'].includes(data.user?.role)) throw new Error('Acesso não autorizado');
    TOKEN = data.token;
    localStorage.setItem('admin_token', TOKEN);
    location.reload();
  } catch (err) {
    erro.textContent = err.message;
    erro.style.display = 'block';
    btn.textContent = 'Entrar';
    btn.disabled = false;
  }
}

if (!TOKEN) { showLoginScreen(); }
else { CURRENT_USER = parseJwt(TOKEN); }

async function api(method, path, body) {
  const res = await fetch('/api' + path, {
    method,
    headers: { 'Content-Type': 'application/json', Authorization: 'Bearer ' + TOKEN },
    body: body ? JSON.stringify(body) : undefined,
  });
  const data = await res.json();
  if (!res.ok) throw new Error(data.error || 'Erro');
  return data;
}

function imagePickerHtml(url = '') {
  return `
    <div>
      <label>Imagem do produto</label>
      <div style="display:flex;align-items:center;gap:10px">
        <img id="f-image-preview" src="${url}" style="width:56px;height:56px;object-fit:cover;border-radius:8px;background:#0f172a;${url ? '' : 'display:none'}" />
        <input type="file" accept="image/*" id="f-image-file" onchange="handleImageUpload(this)" style="flex:1" />
        <span id="f-image-status" style="font-size:.75rem;color:#64748b"></span>
      </div>
      <input type="hidden" id="f-image" value="${url}" />
    </div>`;
}

async function handleImageUpload(inputEl) {
  const file = inputEl.files[0];
  if (!file) return;
  const statusEl = document.getElementById('f-image-status');
  statusEl.textContent = 'Enviando...';
  try {
    const fd = new FormData();
    fd.append('image', file);
    const res = await fetch('/api/menu/upload', { method: 'POST', headers: { Authorization: 'Bearer ' + TOKEN }, body: fd });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Erro ao enviar imagem');
    document.getElementById('f-image').value = data.url;
    const preview = document.getElementById('f-image-preview');
    preview.src = data.url;
    preview.style.display = '';
    statusEl.textContent = '✓ Enviada';
  } catch (err) {
    statusEl.textContent = '';
    toast(err.message, true);
  }
}

function toast(msg, err = false) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'show' + (err ? ' error' : '');
  setTimeout(() => el.className = '', 3000);
}

function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('sidebar-overlay').classList.toggle('open');
}
function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebar-overlay').classList.remove('open');
}

function toggleTheme() {
  const light = document.body.classList.toggle('light');
  localStorage.setItem('admin_theme', light ? 'light' : 'dark');
  document.getElementById('theme-btn').textContent = light ? '☀️ Claro' : '🌙 Escuro';
}
// Aplica tema salvo
(function() {
  const t = localStorage.getItem('admin_theme');
  if (t === 'light') {
    document.body.classList.add('light');
    document.addEventListener('DOMContentLoaded', () => {
      const btn = document.getElementById('theme-btn');
      if (btn) btn.textContent = '☀️ Claro';
    });
  }
})();

function logout() {
  localStorage.removeItem('admin_token');
  location.reload();
}

// ── Catálogo de Bairros e Taxas de Entrega (carregado da API) ─────
let NEIGHBORHOODS = [];
async function carregarBairrosCache() {
  try {
    NEIGHBORHOODS = await api('GET', '/neighborhoods?all=true');
  } catch (e) {
    NEIGHBORHOODS = [];
  }
}

function getTaxaEntrega(bairro) {
  const found = NEIGHBORHOODS.find(b => b.name === bairro);
  return found ? parseFloat(found.delivery_fee) : null;
}

function bairroSelectOptions(selected) {
  const zonas = {};
  for (const b of NEIGHBORHOODS) {
    if (!b.active) continue;
    (zonas[b.zone] = zonas[b.zone] || []).push(b);
  }
  return Object.entries(zonas).map(([zona, bairros]) => `
    <optgroup label="── ${zona} ──">
      ${bairros.map(b => `<option value="${b.name}" ${b.name === selected ? 'selected' : ''}>
        ${b.name} — R$ ${parseFloat(b.delivery_fee).toFixed(2).replace('.',',')}
      </option>`).join('')}
    </optgroup>`).join('');
}

function atualizarTaxaEntrega() {
  const sel = document.getElementById('cf-neigh');
  const badge = document.getElementById('taxa-badge');
  if (!sel || !badge) return;
  const taxa = getTaxaEntrega(sel.value);
  if (taxa !== null) {
    badge.textContent = '🛵 Taxa: R$ ' + taxa.toFixed(2).replace('.',',');
    badge.style.display = 'inline-block';
    badge.style.background = '#064e3b';
    badge.style.color = '#6ee7b7';
  } else {
    badge.textContent = '';
    badge.style.display = 'none';
  }
}

// ── Som de notificação (beep via Web Audio API) ───────────────────
function tocarSomPedido() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    [0, 0.18, 0.36].forEach(t => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.type = 'sine'; osc.frequency.value = 880;
      gain.gain.setValueAtTime(0.4, ctx.currentTime + t);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + t + 0.15);
      osc.start(ctx.currentTime + t);
      osc.stop(ctx.currentTime + t + 0.15);
    });
  } catch(e) {}
}

// ── Banner de novo pedido ─────────────────────────────────────────
let _bannerTimer = null;
function mostrarBannerNovoPedido(num, waLinkCliente, waLinkAdmin) {
  let banner = document.getElementById('novo-pedido-banner');
  if (!banner) {
    banner = document.createElement('div');
    banner.id = 'novo-pedido-banner';
    document.body.appendChild(banner);
  }
  const waBtn = waLinkCliente
    ? `<a href="${waLinkCliente}" target="_blank" style="background:#25D366;color:#fff;border:none;border-radius:6px;padding:6px 14px;font-size:.85rem;font-weight:700;text-decoration:none;white-space:nowrap">📲 Cliente</a>`
    : '';
  const waAdminBtn = waLinkAdmin

;(function wsConnect() {
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  const ws = new WebSocket(`${proto}://${location.host}/ws?token=${TOKEN}&station=retaguarda`);
  ws.onopen = () => document.getElementById('ws-dot').style.background = '#10b981';
  ws.onclose = () => { document.getElementById('ws-dot').style.background = '#ef4444'; setTimeout(wsConnect, 3000); };
  ws.onmessage = (e) => {
    const m = JSON.parse(e.data);
    if (m.type === 'order_update') {
      if (m.event === 'new_order') {
        tocarSomPedido();
        // Gera links no frontend com os dados do pedido recebido
        const o = m.order || {};
        const num = o.order_number;
        const phoneClean = (o.customer_phone || '').replace(/\D/g,'');
        const msgAdmin = `🔔 *Novo Pedido #${num}*\n👤 ${o.customer_name||''}\n📱 ${o.customer_phone||''}\n💰 ${o.item_count||''} item(s)`;
        const waCliente = phoneClean ? `https://wa.me/55${phoneClean}?text=${encodeURIComponent('Olá ' + (o.customer_name||'') + '! Seu pedido #' + num + ' foi recebido pela Confraria Café ☕')}` : null;
        const waAdmin = m.whatsapp_link_admin || null;
        mostrarBannerNovoPedido(num, waCliente, waAdmin);
        if (Notification.permission === 'granted') {
          new Notification('🔔 Novo pedido!', { body: `Pedido #${num} de ${o.customer_name||'cliente'}`, icon: '/api/logo' });
        }
      }
      if (currentPage === 'pedidos') carregarPedidos();
      if (currentPage === 'dashboard') showPage('dashboard');
    }
  };
})();

let currentPage = 'dashboard';
let modalCallback = null;

function showPage(page, btn) {
  if (page !== 'pedidos') { clearInterval(pedidosTimer); pedidosTimer = null; }
  currentPage = page;
  closeSidebar();
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');
  const titles = { dashboard:'Dashboard', produtos:'Produtos', categorias:'Categorias', clientes:'Clientes', usuarios:'Usuários', pedidos:'Pedidos', bairros:'Bairros', configuracoes:'Configurações', pagamentos:'Formas de Pagamento', adicionais:'Adicionais', promocoes:'Promoções', impressoras:'Impressoras', templates:'Templates', financeiro:'Financeiro', comandas:'Comandas', arquivo:'Arquivo' };
  document.getElementById('page-title').textContent = titles[page] || page;
  const pages = { dashboard: pageDashboard, produtos: pageProdutos, categorias: pageCategorias, clientes: pageClientes, usuarios: pageUsuarios, pedidos: pagePedidos, bairros: pageBairros, configuracoes: pageConfiguracoes, pagamentos: pagePagamentos, adicionais: pageAdicionais, promocoes: pagePromocoes, impressoras: pageImpressoras, templates: pageTemplates, financeiro: pageFinanceiro, comandas: pageComandas, arquivo: pageArquivo };
  pages[page]?.();
}

function openModal(title, body, cb, opts = {}) {
  document.getElementById('modal-title').textContent = title;
  document.getElementById('modal-body').innerHTML = body;
  const btn = document.getElementById('modal-confirm');
  btn.style.display = cb ? '' : 'none';
  if (opts.confirmLabel) btn.textContent = opts.confirmLabel;
  else btn.textContent = 'Salvar';
  if (opts.confirmStyle) Object.assign(btn.style, opts.confirmStyle instanceof Object ? opts.confirmStyle : {});
  else { btn.style.background = ''; btn.style.color = ''; btn.style.border = ''; }
  document.getElementById('modal').classList.add('open');
  modalCallback = cb;
}
function closeModal() { document.getElementById('modal').classList.remove('open'); modalCallback = null; }
async function confirmModal() {
  try {
    await modalCallback?.();
  } catch(e) {
    toast('❌ ' + (e.message || 'Erro ao salvar'), true);
  }
}

let produtos = [], categorias = [];
async function pageProdutos() {
  [produtos, categorias] = await Promise.all([

let _prodFilter = '', _prodStatus = 'todos', _prodCat = '', _prodPrecoMin = '', _prodPrecoMax = '';
function renderProdutos(filter, status) {
  if (filter !== undefined) _prodFilter = filter;
  if (status !== undefined) _prodStatus = status;
  const catEl = document.getElementById('filtro-cat');
  const precoMinEl = document.getElementById('filtro-preco-min');
  const precoMaxEl = document.getElementById('filtro-preco-max');
  if (catEl) _prodCat = catEl.value;
  if (precoMinEl) _prodPrecoMin = precoMinEl.value;
  if (precoMaxEl) _prodPrecoMax = precoMaxEl.value;
  let list = produtos;
  if (_prodFilter) list = list.filter(p => p.name.toLowerCase().includes(_prodFilter.toLowerCase()));
  if (_prodStatus === 'ativos') list = list.filter(p => p.available);
  if (_prodStatus === 'inativos') list = list.filter(p => !p.available);
  if (_prodCat) list = list.filter(p => p.category_id === _prodCat);
  if (_prodPrecoMin) list = list.filter(p => parseFloat(p.price) >= parseFloat(_prodPrecoMin));
  if (_prodPrecoMax) list = list.filter(p => parseFloat(p.price) <= parseFloat(_prodPrecoMax));
  const inativos = produtos.filter(p => !p.available).length;
  const catOptions = [{ id: '', name: 'Todas' }, ...categorias].map(c => `<option value="${c.id}" ${_prodCat===c.id?'selected':''}>${c.name}</option>`).join('');
  document.getElementById('content').innerHTML = `
    <div class="search-bar">
      <input placeholder="🔍 Buscar por nome..." value="${_prodFilter}" oninput="renderProdutos(this.value)" style="flex:2;min-width:160px" />
      <select id="filtro-cat" onchange="renderProdutos()" style="border:1px solid var(--border);border-radius:8px;padding:6px 10px;background:var(--surface);color:var(--text);font-size:.85rem">
        ${catOptions}
      </select>
      <input id="filtro-preco-min" type="number" placeholder="R$ mín" value="${_prodPrecoMin}" oninput="renderProdutos()" style="width:80px;border:1px solid var(--border);border-radius:8px;padding:6px 8px;background:var(--surface);color:var(--text);font-size:.85rem" />
      <input id="filtro-preco-max" type="number" placeholder="R$ máx" value="${_prodPrecoMax}" oninput="renderProdutos()" style="width:80px;border:1px solid var(--border);border-radius:8px;padding:6px 8px;background:var(--surface);color:var(--text);font-size:.85rem" />
      <div style="display:flex;gap:6px;flex-wrap:wrap">
        <button class="btn btn-sm ${_prodStatus==='todos'?'btn-primary':'btn-secondary'}" onclick="renderProdutos(undefined,'todos')">Todos</button>
        <button class="btn btn-sm ${_prodStatus==='ativos'?'btn-primary':'btn-secondary'}" onclick="renderProdutos(undefined,'ativos')">✅ Ativos</button>
        <button class="btn btn-sm ${_prodStatus==='inativos'?'btn-danger':'btn-secondary'}" onclick="renderProdutos(undefined,'inativos')">🚫 Indisponíveis${inativos>0?' ('+inativos+')':''}</button>
      </div>
      <button class="btn btn-primary" onclick="modalNovoProduto()">+ Novo produto</button>
    </div>
    <div class="card">
      <h3>Produtos (${list.length})</h3>
      <table>
        <tr><th>Nome</th><th>Categoria</th><th>Preço</th><th>Impressora</th><th>Status</th><th>Ações</th></tr>
        ${list.map(p => {
          const ptLabel = p.print_target === 'cozinha' ? '🍳 Cozinha' : p.print_target === 'balcao' ? '🏪 Balcão' : '🧾 Caixa';
          const ptColor = p.print_target === 'cozinha' ? '#f59e0b' : p.print_target === 'balcao' ? '#3b82f6' : '#64748b';
          return `
          <tr style="${!p.available ? 'opacity:0.6' : ''}">
            <td>${p.name}</td>
            <td><span class="badge badge-blue">${p.category_name}</span></td>
            <td class="price">R$ ${parseFloat(p.price).toFixed(2).replace('.',',')}</td>
            <td><span style="color:${ptColor};font-size:.78rem;font-weight:700">${ptLabel}</span></td>
            <td>
              <button onclick="toggleDisponivel('${p.id}', ${p.available})"
                style="padding:4px 10px;border-radius:8px;border:none;cursor:pointer;font-size:12px;font-weight:600;background:${p.available ? '#d1fae5' : '#fee2e2'};color:${p.available ? '#065f46' : '#991b1b'}">
                ${p.available ? '✅ Disponível' : '🚫 Indisponível'}
              </button>
            </td>
            <td style="display:flex;gap:6px">
              <button class="btn btn-secondary btn-sm" onclick="modalEditarProduto('${p.id}')" title="Editar">✏️</button>
              <button class="btn btn-secondary btn-sm" onclick="modalAdicionaisProduto('${p.id}')" title="Adicionais">🧩</button>
              <button class="btn btn-sm" onclick="toggleDisponivel('${p.id}', ${p.available})" title="${p.available ? 'Tornar indisponível' : 'Tornar disponível'}"
                style="background:${p.available ? '#f59e0b' : '#10b981'};color:#fff;border:none">
                ${p.available ? '🚫' : '✅'}
              </button>
              <button class="btn btn-danger btn-sm" onclick="excluirProduto('${p.id}')" title="Excluir">🗑️</button>
            </td>
          </tr>`;}).join('')}
      </table>
    </div>`;
}

// Cache dos templates (página Templates) — reusado pelo seletor rápido no modal de Produto/Categoria
let _templatesCache = null;
async function ensureTemplatesLoaded() {
  if (!_templatesCache) {
    try { _templatesCache = await api('GET', '/templates'); } catch { _templatesCache = []; }
  }
  return _templatesCache;
}

function templatePickerHtml(selectId) {
  return `<div>
    <label>📋 Aplicar dias de um template</label>
    <div style="display:flex;gap:6px">
      <select id="${selectId}" style="flex:1"><option value="">Carregando templates...</option></select>
      <button type="button" class="btn btn-secondary btn-sm" onclick="applyTemplatePicker('${selectId}')">Aplicar</button>
    </div>
    <small style="color:var(--muted)">Marca automaticamente os mesmos dias ativos do template escolhido — você ainda pode ajustar antes de salvar.</small>
  </div>`;
}

async function populateTemplatePicker(selectId) {
  const templates = await ensureTemplatesLoaded();
  const el = document.getElementById(selectId);
  if (!el) return;
  el.innerHTML = templates.length
    ? `<option value="">— Selecione —</option>` + templates.map(t => `<option value="${t.id}">${t.name}</option>`).join('')
    : `<option value="">Nenhum template criado</option>`;
}

function applyTemplatePicker(selectId) {
  const id = document.getElementById(selectId)?.value;
  if (!id) return toast('Escolha um template primeiro', true);
  const t = (_templatesCache || []).find(x => x.id === id);
  if (!t) return;
  const days = t.active_days || [];
  const all = days.length === 0;
  const alldaysCb = document.getElementById('f-alldays');
  if (alldaysCb) { alldaysCb.checked = all; alldaysCb.dispatchEvent(new Event('change')); }
  document.querySelectorAll('.f-day-cb').forEach(c => { c.checked = !all && days.includes(parseInt(c.value)); });
  toast(`Dias do template "${t.name}" aplicados!`);
}

function activeDaysHtml(selected = null) {
  const all = selected === null || selected.length === 0;
  return `<div>
    <label>Dias ativos no cardápio</label>
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
      <input type="checkbox" id="f-alldays" ${all?'checked':''} onchange="
        const on=this.checked;
        document.querySelectorAll('.f-day-cb').forEach(c=>c.disabled=on);
        document.getElementById('f-days-wrap').style.opacity=on?'.4':'1';">
      <span style="font-size:.82rem;color:var(--muted)">Todos os dias</span>
    </div>
    <div id="f-days-wrap" style="display:flex;flex-wrap:wrap;gap:6px;opacity:${all?'.4':'1'}">

        <label style="display:flex;align-items:center;gap:4px;font-size:.8rem;font-weight:400;
          background:var(--hover);border-radius:6px;padding:4px 8px;cursor:pointer;">

}

async function excluirProduto(id) {
  const p = produtos.find(x => x.id === id);
  if (!confirm(`Excluir o produto "${p?.name || ''}"? Essa ação não pode ser desfeita.`)) return;
  try {
    await api('DELETE', '/menu/products/' + id);
    toast('Produto excluído!'); pageProdutos();
  } catch (e) {
    toast('❌ ' + e.message, true);
  }
}

function modalAdicionaisProduto(id) {
  const p = produtos.find(x => x.id === id);
  if (!p) return;
  openModal('Adicionais — ' + p.name, `<div id="addons-section"><p style="color:#64748b;font-size:.8rem">Carregando adicionais...</p></div>`, null);
  document.getElementById('modal-confirm').style.display = 'none';
  renderAddonsSection(id, () => modalAdicionaisProduto(id));
}

async function aplicarTemplate(productId, templateIndex) {
  const t = ADDON_TEMPLATES[templateIndex];
  closeModal();
  try {
    const group = await api('POST', `/menu/products/${productId}/addon-groups`, {
      name: t.name, min_select: t.min_select, max_select: t.max_select, required: t.required,
      active_days: t.active_days || [],
    });
    for (const op of t.options) {
      await api('POST', `/menu/addon-groups/${group.id}/options`, { name: op.name, price: op.price });
    }
    toast(`Grupo "${t.name}" adicionado!`);
    renderAddonsSection(productId);
  } catch(e) { toast('Erro: ' + e.message, true); }
}

async function aplicarTodosTemplates(productId) {
  closeModal();
  toast('Aplicando todos os templates...');
  try {
    for (const t of ADDON_TEMPLATES) {
      const group = await api('POST', `/menu/products/${productId}/addon-groups`, {
        name: t.name, min_select: t.min_select, max_select: t.max_select, required: t.required,
      });
      for (const op of t.options) {
        await api('POST', `/menu/addon-groups/${group.id}/options`, { name: op.name, price: op.price });
      }
    }
    toast('✅ Todos os templates aplicados!');
    renderAddonsSection(productId);
  } catch(e) { toast('Erro: ' + e.message, true); }
}

function agActiveDaysHtml(selected = null) {
  const all = selected === null || (Array.isArray(selected) && selected.length === 0);
  return `<div>
    <label>Dias ativos</label>
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
      <input type="checkbox" id="ag-alldays" ${all?'checked':''} onchange="
        document.querySelectorAll('.ag-day-cb').forEach(c=>c.disabled=this.checked);
        if(this.checked) document.querySelectorAll('.ag-day-cb').forEach(c=>c.checked=false);">
      <span style="font-size:.85rem;color:var(--muted)">Todos os dias</span>
    </div>
    <div style="display:flex;gap:8px;flex-wrap:wrap">
      ${DAYS_WEEK.map(d=>`<label style="display:flex;align-items:center;gap:4px;font-size:.82rem;cursor:pointer">
        <input type="checkbox" class="ag-day-cb" value="${d.v}" ${!all&&(selected||[]).includes(d.v)?'checked':''} ${all?'disabled':''}>
        ${d.l}</label>`).join('')}
    </div>
  </div>`;
}

function getAgActiveDays() {
  if (document.getElementById('ag-alldays')?.checked) return [];
  return Array.from(document.querySelectorAll('.ag-day-cb:checked')).map(c => parseInt(c.value));
}

async function removerGrupoAddon(productId, groupId) {
  if (!confirm('Remover este grupo e suas opções?')) return;
  await api('DELETE', '/menu/addon-groups/' + groupId);
  toast('Grupo removido');
  renderAddonsSection(productId);
}

async function toggleGrupoObrigatorio(productId, groupId, required, minSelect) {
  try {
    const payload = { required };
    if (required && (!minSelect || minSelect < 1)) payload.min_select = 1;
    await api('PATCH', `/menu/addon-groups/${groupId}`, payload);
    toast(required ? 'Grupo marcado como obrigatório' : 'Grupo marcado como opcional');
    renderAddonsSection(productId);
  } catch(e) { toast('Erro: ' + e.message, true); }
}

            <td><span class="badge badge-blue">${c.products.length} itens</span></td>
            <td><button class="btn btn-secondary btn-sm" onclick="modalEditarCategoria('${c.id}','${c.name}','${c.description||''}','${c.printer||''}')">✏️</button></td>
          </tr>`;
        }).join('')}
      </table>
    </div>`;
}

async function moverCategoria(idx, dir) {
  const swap = idx + dir;
  if (swap < 0 || swap >= _cats.length) return;
  [_cats[idx], _cats[swap]] = [_cats[swap], _cats[idx]];
  renderCategorias();
  // Salva nova ordem no backend
  await Promise.all(_cats.map((c, i) => api('PATCH', '/categories/' + c.id, { sort_order: i })));
}

function printerSelectHtml(selected = '') {
  const opts = [['', '— Sem impressora —'], ['balcao', '🏪 Balcão (todos os produtos)'], ['cozinha', '🍳 Cozinha (produtos da cozinha)']];
  return `<select id="f-printer">${opts.map(([v,l]) => `<option value="${v}"${selected===v?' selected':''}>${l}</option>`).join('')}</select>`;
}

function modalEditarCategoria(id, name, desc, printer) {
  openModal('Editar Categoria', `
    <div class="form-grid">
      <div><label>Nome</label><input id="f-name" value="${name}" /></div>
      <div><label>Descrição</label><input id="f-desc" value="${desc}" /></div>
      <div>
        <label>Impressora</label>
        ${printerSelectHtml(printer)}
        <label style="display:flex;align-items:center;gap:8px;margin-top:8px;cursor:pointer;font-size:.83rem;color:var(--muted)">
          <input type="checkbox" id="f-apply-produtos" checked>
          Aplicar impressora a todos os produtos desta categoria
        </label>
      </div>
      <div>
        ${templatePickerHtml('f-tpl-picker-cat')}
        <label style="display:flex;align-items:center;gap:8px;margin-top:6px;cursor:pointer;font-size:.83rem;color:var(--muted)">
          <input type="checkbox" id="f-apply-tpl-days">
          Ao salvar, aplicar os dias do template escolhido a todos os produtos desta categoria
        </label>
      </div>
    </div>`, async () => {
    const newPrinter = document.getElementById('f-printer').value || null;
    const applyProdutos = document.getElementById('f-apply-produtos').checked;
    const applyTplDays = document.getElementById('f-apply-tpl-days').checked;
    const tplId = document.getElementById('f-tpl-picker-cat').value;
    await api('PATCH', '/categories/' + id, { name: document.getElementById('f-name').value, description: document.getElementById('f-desc').value, printer: newPrinter });
    let msg = 'Categoria atualizada!';
    if (applyProdutos) {
      const r = await api('POST', `/categories/${id}/apply-printer`, { printer: newPrinter });
      msg = `Categoria atualizada e ${r.updated} produto(s) com impressora atualizada!`;
    }
    if (applyTplDays && tplId) {
      const t = (_templatesCache || []).find(x => x.id === tplId);
      const r2 = await api('POST', `/categories/${id}/apply-template-days`, { active_days: t?.active_days || [] });
      msg += ` ${r2.updated} produto(s) com dias do template "${t?.name || ''}" aplicados!`;
    } else if (applyTplDays && !tplId) {
      toast('Selecione um template pra aplicar os dias', true);
    }
    toast(msg);
    closeModal(); pageCategorias();
  });
  populateTemplatePicker('f-tpl-picker-cat');
}

async function buscarClientes(q) {
  _clientesCache = await api('GET', '/customers?search=' + encodeURIComponent(q) + '&limit=200');
  renderClientesTabela();
}

function renderClientesTabela() {
  const sort = document.getElementById('cli-sort')?.value || 'nome';
  let clientes = [..._clientesCache];

  if (sort === 'nome')         clientes.sort((a,b) => a.name.localeCompare(b.name, 'pt-BR'));
  else if (sort === 'zona')    clientes.sort((a,b) => (a.address_neighborhood||'zzz').localeCompare(b.address_neighborhood||'zzz', 'pt-BR'));
  else if (sort === 'melhores') clientes.sort((a,b) => parseFloat(b.total_gasto||0) - parseFloat(a.total_gasto||0));
  else if (sort === 'mais_pedidos') clientes.sort((a,b) => (b.total_pedidos||0) - (a.total_pedidos||0));
  else if (sort === 'recentes') clientes.sort((a,b) => new Date(b.created_at) - new Date(a.created_at));
  else if (sort === 'bloqueados') clientes.sort((a,b) => (b.blocked ? 1 : 0) - (a.blocked ? 1 : 0));

  document.getElementById('cli-table').innerHTML = `
    <div class="card">
      <h3>Clientes (${clientes.length})</h3>
      <table>
        <tr><th>Nome</th><th>WhatsApp</th><th>Bairro</th><th style="text-align:right">Pedidos</th><th style="text-align:right">Total gasto</th><th>Ações</th></tr>
        ${clientes.map(c => `
          <tr style="${c.blocked ? 'opacity:.55' : ''}">
            <td style="font-weight:600">${c.name}${c.blocked ? ' <span style="background:#7f1d1d;color:#fca5a5;border-radius:999px;padding:1px 7px;font-size:.68rem;font-weight:700">🚫 Bloqueado</span>' : ''}</td>
            <td>${c.phone ? '📱 ' + c.phone : '-'}</td>
            <td style="font-size:.78rem">
              ${c.address_neighborhood ? `<span style="color:#f1f5f9">${c.address_neighborhood}</span>` : '<span style="color:#475569">-</span>'}
              ${c.address_neighborhood && getTaxaEntrega(c.address_neighborhood) !== null ? `<span style="background:#064e3b;color:#6ee7b7;border-radius:999px;padding:1px 7px;font-size:.7rem;font-weight:700;margin-left:4px">🛵 R$ ${getTaxaEntrega(c.address_neighborhood).toFixed(2).replace('.',',')}</span>` : ''}
            </td>
            <td style="text-align:right;color:#94a3b8">${c.total_pedidos||0}</td>
            <td style="text-align:right;font-weight:600;color:#6ee7b7">R$ ${parseFloat(c.total_gasto||0).toFixed(2).replace('.',',')}</td>
            <td style="display:flex;gap:6px;flex-wrap:wrap">
              <button class="btn btn-secondary btn-sm" onclick="verCliente('${c.id}')">👁</button>
              <button class="btn btn-secondary btn-sm" onclick="modalEditarCliente('${c.id}')">✏️</button>
              <button class="btn btn-sm" style="background:${c.blocked ? '#064e3b' : '#7c2d12'};color:#fff" onclick="toggleBloquearCliente('${c.id}',${c.blocked})">${c.blocked ? '✅' : '🚫'}</button>
              <button class="btn btn-sm" style="background:#1e293b;color:#ef4444;border:1px solid #ef4444" onclick="deletarCliente('${c.id}','${c.name.replace(/'/g,'')}')">🗑</button>
            </td>
          </tr>`).join('')}
      </table>
    </div>`;
}

async function verCliente(id) {
  const c = await api('GET', '/customers/' + id);
  openModal('Cliente: ' + c.name, `
    <div style="display:grid;gap:8px;font-size:.85rem">
      <div><strong>WhatsApp:</strong> 📱 ${c.phone || '-'}</div>
      <div><strong>Endereço:</strong> ${[c.address_street, c.address_number, c.address_neighborhood, c.address_city].filter(Boolean).join(', ') || '-'}</div>
      <hr style="border-color:#334155;margin:8px 0">
      <strong>Últimos pedidos</strong>
      ${(c.recent_orders||[]).length === 0 ? '<p style="color:#475569">Nenhum pedido</p>' :
        c.recent_orders.map(o => `<div style="background:#0f172a;border-radius:8px;padding:8px;margin-top:4px">
          <span style="font-weight:700">#${o.id.slice(-6).toUpperCase()}</span>
          <span style="color:#64748b;font-size:.78rem;margin-left:8px">${o.status}</span>
          <span class="price" style="float:right">R$ ${parseFloat(o.total).toFixed(2).replace('.',',')}</span>
        </div>`).join('')}
    </div>`, null);
  document.getElementById('modal-confirm').style.display = 'none';
}

async function toggleBloquearCliente(id, bloqueado) {
  const acao = bloqueado ? 'desbloquear' : 'bloquear';
  if (!confirm(`Deseja ${acao} este cliente?`)) return;
  await api('PATCH', `/customers/${id}/block`, { blocked: !bloqueado });
  toast(`Cliente ${bloqueado ? 'desbloqueado' : 'bloqueado'}!`);
  buscarClientes(document.getElementById('cli-search')?.value || '');
}

async function deletarCliente(id, nome) {
  if (!confirm(`Deletar cliente "${nome}"? Esta ação não pode ser desfeita.`)) return;
  await api('DELETE', `/customers/${id}`);
  toast('Cliente removido!');
  buscarClientes(document.getElementById('cli-search')?.value || '');
}

function modalNovoCliente() {
  openModal('Novo Cliente', clienteForm({}), async () => {
    await api('POST', '/customers', getClienteForm());
    toast('Cliente criado!'); closeModal(); pageClientes();
  });
  document.getElementById('modal-confirm').style.display = '';
}

async function modalEditarCliente(id) {
  const c = await api('GET', '/customers/' + id);
  openModal('Editar Cliente', clienteForm(c), async () => {
    await api('PATCH', '/customers/' + id, getClienteForm());
    toast('Cliente atualizado!'); closeModal(); pageClientes();
  });
  document.getElementById('modal-confirm').style.display = '';
}

function clienteForm(c) {
  return `
    <div class="form-grid">
      <div><label>Nome *</label><input id="cf-name" value="${c.name||''}" placeholder="Nome completo" /></div>
      <div><label>WhatsApp *</label><input id="cf-phone" value="${c.phone||''}" placeholder="Ex: 11999990000" /></div>
      <div class="form-grid cols-2">
        <div><label>Rua</label><input id="cf-street" value="${c.address_street||''}" placeholder="Rua / Av." /></div>
        <div><label>Número</label><input id="cf-number" value="${c.address_number||''}" placeholder="Nº" /></div>
      </div>
      <div>
        <label>Bairro <span id="taxa-badge" style="display:none;padding:2px 10px;border-radius:999px;font-size:.75rem;font-weight:700;margin-left:8px"></span></label>
        <select id="cf-neigh" onchange="atualizarTaxaEntrega()" style="width:100%">
          <option value="">— Selecione o bairro —</option>
          ${bairroSelectOptions(c.address_neighborhood||'')}
        </select>
      </div>
      <div><label>Complemento</label><input id="cf-city" value="${c.address_city||''}" placeholder="Apto, bloco, ponto de referência..." /></div>
    </div>`;
}
function getClienteForm() {
  const bairro = document.getElementById('cf-neigh')?.value || '';
  const taxa = getTaxaEntrega(bairro);
  return {
    name: v('cf-name'),
    phone: v('cf-phone'),
    address_street: v('cf-street')||undefined,
    address_number: v('cf-number')||undefined,
    address_neighborhood: bairro||undefined,
    address_city: v('cf-city')||undefined,
    notes: taxa !== null ? `Taxa de entrega: R$ ${taxa.toFixed(2)}` : undefined,
  };
}

async function pageUsuarios() {
  document.getElementById('content').innerHTML = `
    <div style="display:flex;justify-content:flex-end;margin-bottom:16px">
      <button class="btn btn-primary" onclick="modalNovoUsuario()">+ Novo usuário</button>
    </div>
    <div class="card" id="usr-table"><p style="color:#64748b">Carregando...</p></div>`;
  // Lista via SQL direto (rota protegida admin)
  try {
    const users = await api('GET', '/users');
    renderUsuarios(users);
  } catch(e) {
    document.getElementById('usr-table').innerHTML = '<p style="color:#ef4444">Endpoint /api/users não implementado ainda — será adicionado.</p>';
  }
}

const ALL_PAGES = [
  { key:'dashboard', label:'📊 Dashboard' },
  { key:'pedidos', label:'📋 Pedidos' },
  { key:'produtos', label:'🍽 Produtos' },
  { key:'categorias', label:'📂 Categorias' },
  { key:'clientes', label:'👥 Clientes' },
  { key:'bairros', label:'📍 Bairros' },
  { key:'configuracoes', label:'⚙️ Configurações' },
  { key:'pagamentos', label:'💳 Pagamentos' },
  { key:'adicionais', label:'➕ Adicionais' },
  { key:'promocoes', label:'🎉 Promoções' },
  { key:'impressoras', label:'🖨 Impressoras' },
  { key:'templates', label:'📋 Templates' },
  { key:'financeiro', label:'💰 Financeiro' },
];

function permissionsForm(selectedPerms = []) {
  return `<div style="margin-top:12px;padding:12px;background:var(--input-bg);border:1px solid var(--border);border-radius:8px;">
    <label style="display:block;margin-bottom:8px;font-weight:700">Funcionalidades liberadas</label>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;">
      ${ALL_PAGES.map(p => `
        <label style="display:flex;align-items:center;gap:6px;font-size:.82rem;font-weight:400;cursor:pointer;">
          <input type="checkbox" class="perm-cb" value="${p.key}" ${selectedPerms.includes(p.key)?'checked':''} style="width:auto">
          ${p.label}
        </label>`).join('')}
    </div>
  </div>`;
}

function getSelectedPerms() {
  return Array.from(document.querySelectorAll('.perm-cb:checked')).map(cb => cb.value);
}

function renderUsuarios(users) {
  document.getElementById('usr-table').innerHTML = `
    <h3>Usuários do sistema</h3>
    <div class="table-wrap"><table>
      <tr><th>Nome</th><th>Perfil</th><th>Status</th><th>Ações</th></tr>
      ${users.map(u => `
        <tr>
          <td style="font-weight:600">${u.name}</td>
          <td><span class="badge ${u.role==='admin'?'badge-blue':'badge-gray'}">${u.role==='admin'?'Administrador':'Operador'}</span></td>
          <td><span class="badge ${u.active ? 'badge-green' : 'badge-red'}">${u.active ? 'Ativo' : 'Inativo'}</span></td>
          <td>
            <button class="btn btn-sm" onclick='modalEditarUsuario(${JSON.stringify(u)})'>✏️ Editar</button>
            <button class="btn btn-sm btn-danger" onclick="toggleUsuario('${u.id}',${u.active})" style="margin-left:4px">${u.active ? 'Desativar' : 'Ativar'}</button>
          </td>
        </tr>`).join('')}
    </table></div>`;
}

function usuarioRoleSelect(selected, id) {
  return `<select id="${id}" onchange="document.getElementById('perm-section').style.display=this.value==='operador'?'block':'none'">
    <option value="admin" ${selected==='admin'?'selected':''}>Administrador</option>
    <option value="operador" ${selected!=='admin'?'selected':''}>Operador</option>
  </select>`;
}

function modalEditarUsuario(u) {
  const isOp = u.role !== 'admin';
  openModal('Editar Usuário', `
    <div class="form-grid">
      <div><label>Nome</label><input id="eu-name" value="${u.name}" /></div>
      <div><label>Perfil</label>${usuarioRoleSelect(u.role, 'eu-role')}</div>
      <div><label>Nova senha <small style="color:#94a3b8">(deixe em branco para não alterar)</small></label><input id="eu-pass" type="password" /></div>
    </div>
    <div id="perm-section" style="display:${isOp?'block':'none'}">
      ${permissionsForm(u.permissions || [])}
    </div>`, async () => {
    const role = v('eu-role');
    const body = { name: v('eu-name'), role };
    const pass = v('eu-pass');
    if (pass) body.password = pass;
    if (role === 'operador') body.permissions = getSelectedPerms();
    else body.permissions = ALL_PAGES.map(p => p.key);
    await api('PATCH', `/users/${u.id}`, body);
    toast('Usuário atualizado!'); closeModal(); pageUsuarios();
  });
}

async function toggleUsuario(id, active) {
  if (!confirm(active ? 'Desativar este usuário?' : 'Ativar este usuário?')) return;
  await api('PATCH', `/users/${id}`, { active: !active });
  toast(active ? 'Usuário desativado' : 'Usuário ativado'); pageUsuarios();
}

function modalNovoUsuario() {
  openModal('Novo Usuário', `
    <div class="form-grid">
      <div><label>Nome</label><input id="u-name" /></div>
      <div><label>Senha</label><input id="u-pass" type="password" /></div>
      <div><label>Perfil</label>${usuarioRoleSelect('operador', 'u-role')}</div>
    </div>
    <div id="perm-section" style="display:block">
      ${permissionsForm([])}
    </div>`, async () => {
    const role = v('u-role');
    const perms = role === 'operador' ? getSelectedPerms() : ALL_PAGES.map(p => p.key);
    await api('POST', '/users', { name: v('u-name'), password: v('u-pass'), role, permissions: perms });
    toast('Usuário criado!'); closeModal(); pageUsuarios();
  });
}

// ── Pedidos ───────────────────────────────────────────────────────
const STATUS_LABEL = {
  aguardando_pagamento:'⏳ Aguardando',
  pago:'💳 Pago',
  confirmado:'📋 Confirmado',
  pronto:'✅ Pronto',
  saiu_para_entrega:'🛵 A caminho',
  entregue:'🏠 Entregue',
  cancelado:'❌ Cancelado'
};
const STATUS_NEXT = {
  pago:'confirmado',
  confirmado:'pronto',
  pronto:'saiu_para_entrega',
  saiu_para_entrega:'entregue'
};
const STATUS_COLOR = {
  aguardando_pagamento:'#92400e',
  pago:'#1e40af',
  confirmado:'#5b21b6',
  pronto:'#065f46',
  saiu_para_entrega:'#0369a1',
  entregue:'#374151',
  cancelado:'#991b1b'
};
let pedidosFiltro = 'todos';
let pedidosTimer = null;

async function pagePedidos() {
  clearInterval(pedidosTimer);
  document.getElementById('content').innerHTML = `
    <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;align-items:center">
      <div style="display:flex;gap:6px;flex-wrap:wrap;flex:1">
        ${['todos','aguardando_pagamento','pago','confirmado','pronto','saiu_para_entrega','entregue','cancelado'].map(s => `
          <button class="btn btn-sm" id="filtro-${s}" onclick="filtrarPedidos('${s}')"
            style="background:${s==='todos'?'#7c3aed':'#1e293b'};color:${s==='todos'?'#fff':'#94a3b8'};border:1px solid #334155">
            ${s==='todos'?'Todos':STATUS_LABEL[s]||s}
          </button>`).join('')}
      </div>
      <button class="btn btn-secondary btn-sm" onclick="carregarPedidos()">🔄 Atualizar</button>
      <button class="btn btn-sm" style="background:#7f1d1d;color:#fff;border:none;font-weight:700" onclick="fecharCaixa()">🔒 Fechar Caixa</button>
      <button class="btn btn-sm" style="background:#16a34a;color:#fff;border:none;font-weight:700" onclick="novoPedidoAdmin()">＋ Novo Pedido</button>
    </div>
    <div id="pedidos-lista"><p style="color:#64748b">Carregando...</p></div>`;
  await carregarPedidos();
  pedidosTimer = setInterval(carregarPedidos, 30000);
}

async function carregarPedidos() {
  try {
    const qs = pedidosFiltro !== 'todos' ? `?status=${pedidosFiltro}&limit=100` : '?limit=100';
    const orders = await api('GET', '/orders' + qs);
    renderPedidos(orders);
    startOrderTimers();
  } catch(e) { toast('Erro ao carregar pedidos: ' + e.message, true); }
}

function filtrarPedidos(filtro) {
  pedidosFiltro = filtro;
  document.querySelectorAll('[id^="filtro-"]').forEach(b => {
    const isActive = b.id === 'filtro-' + filtro;
    b.style.background = isActive ? '#7c3aed' : '#1e293b';
    b.style.color = isActive ? '#fff' : '#94a3b8';
  });
  carregarPedidos();
}

function renderPedidos(orders) {
  if (!orders.length) {
    document.getElementById('pedidos-lista').innerHTML = `<div class="card" style="text-align:center;color:var(--muted);padding:40px">Nenhum pedido encontrado</div>`;
    return;
  }

  // Ordenar por data/hora mais recente primeiro
  const sorted = [...orders].sort((a, b) => new Date(b.created_at) - new Date(a.created_at));

  // Agrupar por data
  const groups = {};
  for (const o of sorted) {
    const dt = new Date(o.created_at);
    const key = dt.toLocaleDateString('sv-SE', {timeZone:'America/Sao_Paulo'}); // YYYY-MM-DD
    if (!groups[key]) groups[key] = [];
    groups[key].push(o);
  }

  const hoje = new Date().toLocaleDateString('sv-SE', {timeZone:'America/Sao_Paulo'});
  const ontem = new Date(Date.now() - 86400000).toLocaleDateString('sv-SE', {timeZone:'America/Sao_Paulo'});

  function labelData(key) {
    if (key === hoje) return '📅 Hoje';
    if (key === ontem) return '📅 Ontem';
    return '📅 ' + new Date(key + 'T12:00:00').toLocaleDateString('pt-BR', {weekday:'long', day:'2-digit', month:'long'});
  }

  document.getElementById('pedidos-lista').innerHTML = Object.keys(groups)
    .sort((a, b) => b.localeCompare(a))
    .map(dateKey => {
      const dayOrders = groups[dateKey];
      const cardsHtml = dayOrders.map(o => {
        const cor = STATUS_COLOR[o.status] || '#334155';
        const hora = new Date(o.created_at).toLocaleTimeString('pt-BR', {hour:'2-digit',minute:'2-digit',timeZone:'America/Sao_Paulo'});
        const data = new Date(o.created_at).toLocaleDateString('pt-BR', {day:'2-digit',month:'2-digit',timeZone:'America/Sao_Paulo'});
    const num = o.order_number || o.id.slice(-4);
    const addr = o.delivery_address ? (typeof o.delivery_address === 'string' ? o.delivery_address : `${o.delivery_address.street||''}, ${o.delivery_address.number||''} — ${o.delivery_address.neighborhood||''}`) : '';
    return `
    <div class="pedido-card" style="background:var(--surface);border:1px solid var(--border);border-left:5px solid ${cor};border-radius:12px;padding:16px;margin-bottom:12px;box-shadow:0 1px 4px rgba(0,0,0,.15)${o.finalized_at ? ';opacity:.55' : ''}">
      ${o.finalized_at ? '<div style="font-size:.72rem;color:var(--muted);font-weight:700;margin-bottom:6px">🏁 FINALIZADO</div>' : ''}
      <div class="pedido-card-header" style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px">
        <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">
          <span style="font-family:monospace;font-weight:900;font-size:1.15rem;color:var(--text)">#${num}</span>
          <span style="background:${cor};color:#fff;padding:3px 12px;border-radius:999px;font-size:.75rem;font-weight:700;letter-spacing:.03em">${STATUS_LABEL[o.status]||o.status}</span>
          <span class="pedido-card-secondary" style="color:var(--muted);font-size:.8rem">${data} às ${hora}</span>
          <span id="timer-${o.id}" style="font-size:.78rem;font-weight:700;padding:2px 8px;border-radius:6px;background:#1e3a5f;color:#60a5fa" data-since="${o.created_at}" data-status="${o.status}" data-frozen="${o.finalized_at ? '1' : ''}">⏱ --:--</span>
          <span class="pedido-card-secondary" style="font-size:.85rem;color:var(--text)">${o.delivery_type === 'retirada' ? '🏪 Retirada' : '🛵 Entrega'}</span>
        </div>
        <div style="display:flex;align-items:center;gap:8px">
          <span style="font-weight:900;color:#7c3aed;font-size:1.1rem">R$ ${parseFloat(o.total||0).toFixed(2).replace('.',',')}</span>
          <span style="color:var(--muted);font-size:.8rem;background:var(--hover);padding:2px 8px;border-radius:6px">${o.payment_method||'-'}</span>
        </div>
      </div>
      <div class="pedido-card-meta" style="display:flex;gap:20px;margin-top:10px;font-size:.85rem;flex-wrap:wrap;align-items:center">
        <div><span style="color:var(--muted)">Cliente: </span><strong style="color:var(--text)">${o.customer_name||'—'}</strong></div>
        ${o.customer_phone ? `<div class="pedido-card-secondary" style="color:var(--muted)">📱 <span style="color:var(--text)">${o.customer_phone}</span></div>` : ''}
        ${addr ? `<div class="pedido-card-addr" style="color:var(--muted);display:flex;align-items:center;gap:6px;min-width:0">📍 <span class="pedido-card-addr-text" style="color:var(--text)">${addr}</span><button class="addr-copy-btn" onclick="copiarEndereco('${addr.replace(/'/g,"\\'")}')" style="background:none;border:1px solid var(--border);border-radius:6px;padding:1px 6px;font-size:.7rem;color:var(--muted);cursor:pointer" title="Copiar endereço">📋</button></div>` : ''}
        ${o.delivery_fee > 0 ? `<div style="color:var(--muted)">🛵 Taxa: <span style="color:#f59e0b;font-weight:700">R$ ${parseFloat(o.delivery_fee).toFixed(2).replace('.',',')}</span></div>` : (o.delivery_type === 'retirada' ? '' : `<div class="pedido-card-secondary" style="color:#10b981;font-size:.8rem;font-weight:600">🛵 Sem taxa</div>`)}
      </div>
      <div class="pedido-card-actions" style="display:flex;gap:8px;margin-top:12px;flex-wrap:wrap">
        <button class="btn btn-secondary btn-sm" onclick="verPedido('${o.id}')" title="Ver itens">👁<span class="btn-label"> Ver itens</span></button>
        <button class="btn btn-secondary btn-sm" onclick="imprimirPedido('${o.id}')" title="Imprimir">🖨<span class="btn-label"> Imprimir</span></button>
        ${o.status !== 'cancelado' && !o.finalized_at ? `<button class="btn btn-sm" style="background:#065f46;color:#fff;border:none" onclick="finalizarPedido('${o.id}')" title="Finalizar (imprime recibo de conferência)">🏁<span class="btn-label"> Finalizar</span></button>` : ''}
        ${o.finalized_at ? `<button class="btn btn-sm" style="background:#374151;color:#fff;border:none" onclick="reabrirFinalizacao('${o.id}')" title="Reabrir">🔓<span class="btn-label"> Reabrir</span></button>` : ''}
        ${o.customer_phone && (o.status==='aguardando_pagamento'||o.status==='pago') ? `<button class="btn btn-sm" style="background:#25D366;color:#fff;border:none" onclick="confirmarEEnviarWA('${o.id}')" title="Confirmar + WA">📲<span class="btn-label"> Confirmar + WA</span></button>` : ''}
        ${o.customer_phone && o.status!=='aguardando_pagamento' && o.status!=='pago' && o.status!=='cancelado' && o.status!=='entregue' ? `<button class="btn btn-sm" style="background:#25D366;color:#fff;border:none" onclick="reenviarWA('${o.id}')" title="WA">📲<span class="btn-label"> WA</span></button>` : ''}

// ── Cronômetros dos pedidos ────────────────────────────────────────
const TIMER_STOP_STATUSES = ['entregue', 'cancelado'];
const TIMER_PAUSE_STATUSES = ['pronto', 'saiu_para_entrega'];
let _timerInterval = null;
function startOrderTimers() {
  if (_timerInterval) clearInterval(_timerInterval);
  function tick() {
    document.querySelectorAll('[id^="timer-"]').forEach(el => {
      const status = el.dataset.status;
      if (TIMER_STOP_STATUSES.includes(status)) {
        el.textContent = status === 'entregue' ? '✅ Entregue' : '✕ Cancelado';
        el.style.background = status === 'entregue' ? '#14532d' : '#450a0a';
        el.style.color = status === 'entregue' ? '#86efac' : '#fca5a5';
        return;
      }
      if (el.dataset.frozen === '1') return;
      const since = new Date(el.dataset.since);
      const diff = Math.floor((Date.now() - since) / 1000);
      const h = Math.floor(diff / 3600);
      const m = Math.floor((diff % 3600) / 60);
      const s = diff % 60;
      const txt = h > 0 ? `${h}h ${String(m).padStart(2,'0')}m` : `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
      el.textContent = `⏱ ${txt}`;
      // Cor por urgência
      if (diff > 3600) { el.style.background='#450a0a'; el.style.color='#fca5a5'; } // >60min vermelho
      else if (diff > 1800) { el.style.background='#431407'; el.style.color='#fdba74'; } // >30min laranja
      else if (diff > 900) { el.style.background='#422006'; el.style.color='#fde68a'; } // >15min amarelo
      else { el.style.background='#1e3a5f'; el.style.color='#60a5fa'; } // azul normal
      if (TIMER_PAUSE_STATUSES.includes(status)) el.dataset.frozen = '1';
    });
  }
  tick();
  _timerInterval = setInterval(tick, 1000);
}

async function confirmarEEnviarWA(id) {

    if (o.status === 'aguardando_pagamento' || o.status === 'pago') {
      await api('PATCH', '/orders/' + id + '/status', { status: 'confirmado' });
      carregarPedidos();
    }

    toastWhatsApp('✅ Pedido confirmado! Toque para avisar o cliente:', url);

}

function copiarEndereco(addr) {
  navigator.clipboard.writeText(addr).then(() => toast('Endereço copiado!')).catch(() => {
    const el = document.createElement('textarea');
    el.value = addr;
    document.body.appendChild(el);
    el.select();
    document.execCommand('copy');
    document.body.removeChild(el);
    toast('Endereço copiado!');
  });
}

async function getLogoDataUrl() {
  try {
    const res = await fetch('/api/logo');
    if (!res.ok) return null;
    const blob = await res.blob();
    return new Promise(resolve => {
      const reader = new FileReader();
      reader.onload = () => resolve(reader.result);
      reader.onerror = () => resolve(null);
      reader.readAsDataURL(blob);
    });
  } catch { return null; }
}

function renderSubstituteItems(overlay, items) {
  const div = overlay.querySelector('#sub-items');
  if (!div) return;
  if (!items.length) {
    div.innerHTML = '<p style="color:#ef4444;font-size:.83rem;padding:8px 0">Todos os itens marcados como faltantes.</p>';
    updateSubstituteTotal(overlay);
    return;
  }
  div.innerHTML = items.map(i => {

    const price = parseFloat(i.unit_price) || 0;
    const qty = parseInt(i.quantity) || 1;

        <span class="sub-qty" style="min-width:24px;text-align:center;font-size:.88rem">${qty}</span>
        <button type="button" onclick="subQtyBtn(this,1)" style="background:#374151;border:none;color:white;width:24px;height:24px;border-radius:4px;cursor:pointer;line-height:1">+</button>
      </div>
      <span class="sub-row-total" style="font-size:.82rem;color:#94a3b8;min-width:56px;text-align:right">R$ ${(price*qty).toFixed(2)}</span>

  }).join('');

function subQtyBtn(btn, delta) {
  const row = btn.closest('.sub-row');
  const qtyEl = row.querySelector('.sub-qty');
  const totalEl = row.querySelector('.sub-row-total');
  const price = parseFloat(row.dataset.price) || 0;
  let qty = parseInt(qtyEl.textContent) + delta;
  if (qty < 1) qty = 1;
  qtyEl.textContent = qty;
  totalEl.textContent = 'R$ ' + (price * qty).toFixed(2);
  updateSubstituteTotal(btn.closest('#cancel-overlay'));
}

function updateSubstituteTotal(overlay) {
  const totalEl = overlay && overlay.querySelector('#sub-total');
  if (!totalEl) return;
  let total = 0;
  overlay.querySelectorAll('.sub-row').forEach(row => {
    const price = parseFloat(row.dataset.price) || 0;
    const qty = parseInt(row.querySelector('.sub-qty') && row.querySelector('.sub-qty').textContent) || 0;
    total += price * qty;
  });
  totalEl.textContent = 'R$ ' + total.toFixed(2).replace('.', ',');
}

        '<button type="button" onclick="subQtyBtn(this,-1)" style="background:#374151;border:none;color:white;width:24px;height:24px;border-radius:4px;cursor:pointer;line-height:1">−</button>' +
        '<span class="sub-qty" style="min-width:24px;text-align:center;font-size:.88rem">' + qty + '</span>' +
        '<button type="button" onclick="subQtyBtn(this,1)" style="background:#374151;border:none;color:white;width:24px;height:24px;border-radius:4px;cursor:pointer;line-height:1">+</button>' +
      '</div>' +
      '<span class="sub-row-total" style="font-size:.82rem;color:#94a3b8;min-width:56px;text-align:right">R$ ' + (price * qty).toFixed(2) + '</span>';
    subItems.appendChild(div);
  }
  updateSubstituteTotal(overlay);
  sel.value = '';
  qtyInput.value = 1;
}

async function toggleSubstituteSection(btn) {
  const section = document.getElementById('substitute-section');
  const arrow = document.getElementById('sub-arrow');
  const isOpen = section.style.display !== 'none';
  section.style.display = isOpen ? 'none' : 'block';
  arrow.textContent = isOpen ? '▼' : '▲';
  if (!isOpen && !section.dataset.productsLoaded) {
    section.dataset.productsLoaded = '1';
    try {
      const overlay = document.getElementById('cancel-overlay');
      const menu = await api('GET', '/menu');
      const products = [];
      for (const cat of (menu || [])) {
        for (const p of (cat.products || [])) products.push(p);
      }
      const addRow = document.getElementById('add-product-row');
      if (addRow) {
        addRow.innerHTML =
          '<select id="add-product-sel" style="flex:1;padding:7px;border-radius:8px;background:var(--card);border:1px solid var(--border);color:var(--text);font-size:.82rem">' +
            '<option value="">Selecionar produto...</option>' +
            products.map(p => '<option value="' + p.id + '" data-price="' + p.price + '" data-name="' + (p.name||'').replace(/"/g,'&quot;') + '">' + p.name + ' — R$ ' + parseFloat(p.price).toFixed(2) + '</option>').join('') +
          '</select>' +
          '<input type="number" id="add-product-qty" value="1" min="1" style="width:52px;padding:7px;border-radius:8px;background:var(--card);border:1px solid var(--border);color:var(--text)">' +
          '<button type="button" onclick="addProductToSubstitute()" style="background:#7c3aed;color:white;border:none;padding:7px 12px;border-radius:8px;cursor:pointer;font-size:.82rem;white-space:nowrap">+ Adicionar</button>';
      }
    } catch(e) { /* silencioso */ }
  }
}

async function confirmarCancelamentoPedido(id) {
  const overlay = document.getElementById('cancel-overlay');
  const reason = document.getElementById('cancel-motivo') && document.getElementById('cancel-motivo').value.trim() || null;
  const faltantes = [...overlay.querySelectorAll('.faltante-chk:checked')].map(c => ({
    name: c.dataset.name, product_id: c.dataset.id, quantity: parseInt(c.dataset.qty) || 1
  }));
  const doSubstitute = document.getElementById('substitute-section') && document.getElementById('substitute-section').style.display !== 'none';
  const substituteItems = [];
  if (doSubstitute) {
    overlay.querySelectorAll('.sub-row').forEach(row => {
      const qty = parseInt(row.querySelector('.sub-qty') && row.querySelector('.sub-qty').textContent) || 0;
      if (qty > 0) substituteItems.push({ product_id: row.dataset.pid, quantity: qty, unit_price: parseFloat(row.dataset.price) || 0 });
    });
  }
  try {
    await api('PATCH', '/orders/' + id + '/status', { status: 'cancelado', reason, faltantes: faltantes.length ? faltantes : null });
    if (doSubstitute && substituteItems.length) {
      const od = overlay._orderData;
      const novo = await api('POST', '/orders/from-admin', {
        customer_id: od.customer_id,
        items: substituteItems,
        delivery_type: od.delivery_type,
        delivery_address: od.delivery_address,
        payment_method: od.payment_method,
      });
      toast('Cancelado e novo pedido #' + novo.order_number + ' criado!');
    } else {
      toast('Pedido cancelado. WhatsApp enviado ao cliente.');
    }
    overlay.remove();
    carregarPedidos();
  } catch(e) {
    toast(e.message || 'Erro ao cancelar', true);
  }
}

async function novoPedidoAdmin() {
  const overlay = document.createElement('div');
  overlay.id = 'novo-pedido-overlay';
  overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:9998;display:flex;align-items:flex-start;justify-content:center;overflow-y:auto;padding:24px 16px';
  overlay._items = [];
  overlay._bairros = [];
  overlay._allProducts = [];
  overlay._customerId = null;

  overlay.innerHTML = buildNovoPedidoHtml('', '', 'retirada', [], []);
  document.body.appendChild(overlay);

  // Carrega produtos, bairros e pagamentos em paralelo
  try {
    const [menu, bairros, payments] = await Promise.all([
      api('GET', '/menu'), api('GET', '/neighborhoods'), api('GET', '/payment-methods')
    ]);
    for (const cat of (menu || [])) for (const p of (cat.products || [])) overlay._allProducts.push(p);
    overlay._bairros = bairros || [];
    // Popula bairros
    const neighSel = document.getElementById('np-neighborhood');
    if (neighSel) {
      neighSel.innerHTML = buildBairrosOptions(overlay._bairros);
      if (overlay._pendingNeighborhood) {
        npMatchBairro(overlay._pendingNeighborhood);
        overlay._pendingNeighborhood = null;
      }
    }
    // Popula pagamentos
    const paySel = document.getElementById('np-payment');
    if (paySel && payments && payments.length) {
      paySel.innerHTML = payments.filter(function(p) { return p.active; })
        .map(function(p) { return '<option value="' + p.name + '">' + p.name + '</option>'; }).join('');
    }
  } catch(e) { /* silencioso */ }
}
