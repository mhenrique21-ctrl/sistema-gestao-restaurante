<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — Confraria</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: system-ui, sans-serif; background: #0f172a; color: #f1f5f9; min-height: 100vh; display: flex; }

/* Sidebar */
#sidebar { width: 220px; background: #1e293b; border-right: 1px solid #334155; display: flex; flex-direction: column; flex-shrink: 0; }
#sidebar .logo { padding: 20px 16px; border-bottom: 1px solid #334155; }
#sidebar .logo h1 { font-size: 1.1rem; font-weight: 800; }
#sidebar .logo p { font-size: .72rem; color: #64748b; margin-top: 2px; }
#sidebar nav { flex: 1; padding: 12px 8px; }
.nav-btn { width: 100%; text-align: left; padding: 10px 12px; background: none; border: none; color: #94a3b8; border-radius: 8px; font-size: .85rem; cursor: pointer; display: flex; align-items: center; gap: 10px; transition: all .15s; }
.nav-btn:hover { background: #334155; color: #f1f5f9; }
.nav-btn.active { background: #7c3aed; color: #fff; }
#sidebar .bottom { padding: 12px; border-top: 1px solid #334155; font-size: .72rem; color: #475569; }

/* Main */
#main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
#topbar { background: #1e293b; border-bottom: 1px solid #334155; padding: 12px 24px; display: flex; align-items: center; justify-content: space-between; }
#topbar h2 { font-size: 1rem; font-weight: 700; }
#content { flex: 1; overflow-y: auto; padding: 24px; }

/* Cards */
.card { background: #1e293b; border: 1px solid #334155; border-radius: 12px; padding: 20px; margin-bottom: 20px; }
.card h3 { font-size: .85rem; font-weight: 700; color: #94a3b8; text-transform: uppercase; letter-spacing: .05em; margin-bottom: 16px; display: flex; align-items: center; justify-content: space-between; }

/* Table */
table { width: 100%; border-collapse: collapse; font-size: .82rem; }
th { text-align: left; padding: 8px 12px; color: #64748b; border-bottom: 1px solid #334155; font-weight: 600; font-size: .75rem; text-transform: uppercase; }
td { padding: 10px 12px; border-bottom: 1px solid #1e293b; color: #cbd5e1; vertical-align: middle; }
tr:hover td { background: #0f172a; }

/* Form */
.form-grid { display: grid; gap: 12px; }
.form-grid.cols-2 { grid-template-columns: 1fr 1fr; }
.form-grid.cols-3 { grid-template-columns: 1fr 1fr 1fr; }
label { display: block; font-size: .75rem; color: #64748b; font-weight: 600; margin-bottom: 4px; }
input, select, textarea { width: 100%; background: #0f172a; border: 1px solid #334155; color: #f1f5f9; border-radius: 8px; padding: 8px 12px; font-size: .85rem; outline: none; }
input:focus, select:focus, textarea:focus { border-color: #7c3aed; }
textarea { resize: vertical; min-height: 70px; }

/* Buttons */
.btn { padding: 8px 16px; border: none; border-radius: 8px; font-size: .82rem; font-weight: 600; cursor: pointer; transition: all .15s; }
.btn-primary { background: #7c3aed; color: white; }
.btn-primary:hover { background: #6d28d9; }
.btn-secondary { background: #334155; color: #f1f5f9; }
.btn-secondary:hover { background: #475569; }
.btn-danger { background: #dc2626; color: white; }
.btn-danger:hover { background: #b91c1c; }
.btn-sm { padding: 4px 10px; font-size: .75rem; }
.btn-success { background: #059669; color: white; }

/* Badge */
.badge { display: inline-block; padding: 2px 8px; border-radius: 999px; font-size: .72rem; font-weight: 700; }
.badge-green { background: #d1fae5; color: #065f46; }
.badge-red { background: #fee2e2; color: #991b1b; }
.badge-gray { background: #334155; color: #94a3b8; }
.badge-blue { background: #dbeafe; color: #1e40af; }

/* Toast */
#toast { position: fixed; bottom: 24px; right: 24px; background: #059669; color: white; padding: 12px 20px; border-radius: 10px; font-size: .85rem; font-weight: 600; transform: translateY(80px); opacity: 0; transition: all .3s; z-index: 999; }
#toast.show { transform: translateY(0); opacity: 1; }
#toast.error { background: #dc2626; }

/* Modal */
.modal-bg { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.7); z-index: 100; align-items: center; justify-content: center; }
.modal-bg.open { display: flex; }
.modal { background: #1e293b; border: 1px solid #334155; border-radius: 16px; padding: 24px; width: 100%; max-width: 520px; max-height: 90vh; overflow-y: auto; }
.modal h2 { font-size: 1rem; font-weight: 700; margin-bottom: 20px; }

/* Search */
.search-bar { display: flex; gap: 10px; margin-bottom: 16px; }
.search-bar input { flex: 1; }

/* Price */
.price { font-weight: 700; color: #a78bfa; }

/* Available toggle */
.toggle { width: 36px; height: 20px; background: #334155; border-radius: 999px; border: none; cursor: pointer; position: relative; transition: background .2s; }
.toggle.on { background: #7c3aed; }
.toggle::after { content: ''; position: absolute; top: 2px; left: 2px; width: 16px; height: 16px; background: white; border-radius: 50%; transition: left .2s; }
.toggle.on::after { left: 18px; }
</style>
</head>
<body>

<div id="sidebar">
  <div class="logo">
    <h1>☕ Confraria</h1>
    <p>Painel Administrativo</p>
  </div>
  <nav>
    <button class="nav-btn active" onclick="showPage('dashboard',this)">📊 Dashboard</button>
    <button class="nav-btn" onclick="showPage('produtos',this)">🍽 Produtos</button>
    <button class="nav-btn" onclick="showPage('categorias',this)">📂 Categorias</button>
    <button class="nav-btn" onclick="showPage('clientes',this)">👥 Clientes</button>
    <button class="nav-btn" onclick="showPage('usuarios',this)">🔐 Usuários</button>
    <button class="nav-btn" onclick="showPage('pedidos',this)">📋 Pedidos</button>
    <button class="nav-btn" onclick="showPage('bairros',this)">📍 Bairros</button>
    <button class="nav-btn" onclick="showPage('configuracoes',this)">⚙️ Configurações</button>
    <button class="nav-btn" onclick="showPage('pagamentos',this)">💳 Pagamentos</button>
    <button class="nav-btn" onclick="showPage('impressoras',this)">🖨 Impressoras</button>
  </nav>
  <div class="bottom" id="user-info">Carregando...</div>
</div>

<div id="main">
  <div id="topbar">
    <h2 id="page-title">Dashboard</h2>
    <div style="display:flex;gap:10px;align-items:center;">
      <span id="ws-dot" style="width:8px;height:8px;border-radius:50%;background:#ef4444;display:inline-block;"></span>
      <button class="btn btn-secondary btn-sm" onclick="logout()">Sair</button>
    </div>
  </div>
  <div id="content"></div>
</div>

<div id="toast"></div>

<!-- Modal genérico -->
<div class="modal-bg" id="modal">
  <div class="modal">
    <h2 id="modal-title">Modal</h2>
    <div id="modal-body"></div>
    <div style="display:flex;gap:10px;justify-content:flex-end;margin-top:20px;">
      <button class="btn btn-secondary" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" id="modal-confirm" onclick="confirmModal()">Salvar</button>
    </div>
  </div>
</div>

<script>
// ── Auth ──────────────────────────────────────────────────────────
let TOKEN = localStorage.getItem('admin_token');
if (!TOKEN) {
  TOKEN = prompt('Token JWT admin:');
  if (TOKEN) localStorage.setItem('admin_token', TOKEN);
}

async function api(method, path, body) {
  const res = await fetch('/api' + path, {
    method,
    headers: { 'Content-Type': 'application/json', Authorization: 'Bearer ' + TOKEN },
    body: body ? JSON.stringify(body) : undefined,
  });
  const data = await res.json();
  if (!res.ok) throw new Error(data.error || 'Erro');
  return data;
}

function imagePickerHtml(url = '') {
  return `
    <div>
      <label>Imagem do produto</label>
      <div style="display:flex;align-items:center;gap:10px">
        <img id="f-image-preview" src="${url}" style="width:56px;height:56px;object-fit:cover;border-radius:8px;background:#0f172a;${url ? '' : 'display:none'}" />
        <input type="file" accept="image/*" id="f-image-file" onchange="handleImageUpload(this)" style="flex:1" />
        <span id="f-image-status" style="font-size:.75rem;color:#64748b"></span>
      </div>
      <input type="hidden" id="f-image" value="${url}" />
    </div>`;
}

async function handleImageUpload(inputEl) {
  const file = inputEl.files[0];
  if (!file) return;
  const statusEl = document.getElementById('f-image-status');
  statusEl.textContent = 'Enviando...';
  try {
    const fd = new FormData();
    fd.append('image', file);
    const res = await fetch('/api/menu/upload', { method: 'POST', headers: { Authorization: 'Bearer ' + TOKEN }, body: fd });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Erro ao enviar imagem');
    document.getElementById('f-image').value = data.url;
    const preview = document.getElementById('f-image-preview');
    preview.src = data.url;
    preview.style.display = '';
    statusEl.textContent = '✓ Enviada';
  } catch (err) {
    statusEl.textContent = '';
    toast(err.message, true);
  }
}

function toast(msg, err = false) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'show' + (err ? ' error' : '');
  setTimeout(() => el.className = '', 3000);
}

function logout() {
  localStorage.removeItem('admin_token');
  location.reload();
}

// ── Catálogo de Bairros e Taxas de Entrega (carregado da API) ─────
let NEIGHBORHOODS = [];
async function carregarBairrosCache() {
  try {
    NEIGHBORHOODS = await api('GET', '/neighborhoods?all=true');
  } catch (e) {
    NEIGHBORHOODS = [];
  }
}

function getTaxaEntrega(bairro) {
  const found = NEIGHBORHOODS.find(b => b.name === bairro);
  return found ? parseFloat(found.delivery_fee) : null;
}

function bairroSelectOptions(selected) {
  const zonas = {};
  for (const b of NEIGHBORHOODS) {
    if (!b.active) continue;
    (zonas[b.zone] = zonas[b.zone] || []).push(b);
  }
  return Object.entries(zonas).map(([zona, bairros]) => `
    <optgroup label="── ${zona} ──">
      ${bairros.map(b => `<option value="${b.name}" ${b.name === selected ? 'selected' : ''}>
        ${b.name} — R$ ${parseFloat(b.delivery_fee).toFixed(2).replace('.',',')}
      </option>`).join('')}
    </optgroup>`).join('');
}

function atualizarTaxaEntrega() {
  const sel = document.getElementById('cf-neigh');
  const badge = document.getElementById('taxa-badge');
  if (!sel || !badge) return;
  const taxa = getTaxaEntrega(sel.value);
  if (taxa !== null) {
    badge.textContent = '🛵 Taxa: R$ ' + taxa.toFixed(2).replace('.',',');
    badge.style.display = 'inline-block';
    badge.style.background = '#064e3b';
    badge.style.color = '#6ee7b7';
  } else {
    badge.textContent = '';
    badge.style.display = 'none';
  }
}

// ── WebSocket ─────────────────────────────────────────────────────
;(function wsConnect() {
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  const ws = new WebSocket(`${proto}://${location.host}/ws?token=${TOKEN}&station=retaguarda`);
  ws.onopen = () => document.getElementById('ws-dot').style.background = '#10b981';
  ws.onclose = () => { document.getElementById('ws-dot').style.background = '#ef4444'; setTimeout(wsConnect, 3000); };
  ws.onmessage = (e) => {
    const m = JSON.parse(e.data);
    if (m.type === 'order_update') {
      toast('🔔 Novo pedido chegou!');
      if (currentPage === 'pedidos') showPage('pedidos');
      if (currentPage === 'dashboard') showPage('dashboard');
    }
  };
})();

// ── Router ────────────────────────────────────────────────────────
let currentPage = 'dashboard';
let modalCallback = null;

function showPage(page, btn) {
  currentPage = page;
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');
  const titles = { dashboard:'Dashboard', produtos:'Produtos', categorias:'Categorias', clientes:'Clientes', usuarios:'Usuários', pedidos:'Pedidos', bairros:'Bairros', configuracoes:'Configurações', pagamentos:'Formas de Pagamento', impressoras:'Impressoras' };
  document.getElementById('page-title').textContent = titles[page] || page;
  const pages = { dashboard: pageDashboard, produtos: pageProdutos, categorias: pageCategorias, clientes: pageClientes, usuarios: pageUsuarios, pedidos: pagePedidos, bairros: pageBairros, configuracoes: pageConfiguracoes, pagamentos: pagePagamentos, impressoras: pageImpressoras };
  pages[page]?.();
}

function openModal(title, body, cb) {
  document.getElementById('modal-title').textContent = title;
  document.getElementById('modal-body').innerHTML = body;
  document.getElementById('modal').classList.add('open');
  modalCallback = cb;
}
function closeModal() { document.getElementById('modal').classList.remove('open'); modalCallback = null; }
async function confirmModal() {
  try {
    await modalCallback?.();
  } catch(e) {
    toast('❌ ' + (e.message || 'Erro ao salvar'), true);
  }
}

// ── Dashboard ─────────────────────────────────────────────────────
async function pageDashboard() {
  document.getElementById('content').innerHTML = '<p style="color:#64748b">Carregando...</p>';
  let d;
  try {
    d = await api('GET', '/dashboard');
  } catch(e) {
    document.getElementById('content').innerHTML = `<div class="card"><p style="color:#ef4444">❌ Erro ao carregar dashboard: ${e.message}</p><button class="btn btn-primary" onclick="pageDashboard()">Tentar novamente</button></div>`;
    return;
  }
  const s = d.summary || {};
  document.getElementById('content').innerHTML = `
    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:20px">
      ${stat('📦', 'Pedidos hoje', s.total_orders)}
      ${stat('💰', 'Faturamento', 'R$ ' + parseFloat(s.revenue||0).toFixed(2).replace('.',','))}
      ${stat('✅', 'Receita paga', 'R$ ' + parseFloat(s.paid_revenue||0).toFixed(2).replace('.',','))}
      ${stat('❌', 'Cancelados', s.cancelled)}
    </div>
    <div class="card">
      <h3>Status dos pedidos</h3>
      <div style="display:flex;flex-wrap:wrap;gap:10px">
        ${(d.by_status||[]).map(x => `<div style="background:#0f172a;border:1px solid #334155;border-radius:8px;padding:10px 16px;text-align:center"><div style="font-size:1.4rem;font-weight:800">${x.count}</div><div style="font-size:.75rem;color:#64748b">${x.status.replace(/_/g,' ')}</div></div>`).join('')}
      </div>
    </div>
    <div class="card">
      <h3>🏆 Top produtos hoje</h3>
      <table>
        <tr><th>Produto</th><th>Qtde vendida</th><th>Receita</th></tr>
        ${(d.top_products||[]).map(p => `<tr><td>${p.name}</td><td>${p.qty_sold}</td><td class="price">R$ ${parseFloat(p.revenue||0).toFixed(2).replace('.',',')}</td></tr>`).join('') || '<tr><td colspan="3" style="color:#475569;text-align:center;padding:20px">Sem vendas hoje</td></tr>'}
      </table>
    </div>`;
}
function stat(icon, label, val) {
  return `<div class="card" style="margin:0"><div style="font-size:1.5rem">${icon}</div><div style="font-size:1.6rem;font-weight:800;margin:4px 0">${val}</div><div style="font-size:.75rem;color:#64748b">${label}</div></div>`;
}

// ── Produtos ──────────────────────────────────────────────────────
let produtos = [], categorias = [];
async function pageProdutos() {
  [produtos, categorias] = await Promise.all([
    api('GET', '/menu').then(cats => cats.flatMap(c => c.products.map(p => ({ ...p, category_name: c.name, category_id: c.id })))),
    api('GET', '/menu').then(cats => cats.map(c => ({ id: c.id, name: c.name }))),
  ]);
  renderProdutos();
}

function renderProdutos(filter = '') {
  const list = filter ? produtos.filter(p => p.name.toLowerCase().includes(filter.toLowerCase())) : produtos;
  document.getElementById('content').innerHTML = `
    <div class="search-bar">
      <input placeholder="Buscar produto..." oninput="renderProdutos(this.value)" />
      <button class="btn btn-primary" onclick="modalNovoProduto()">+ Novo produto</button>
    </div>
    <div class="card">
      <h3>Produtos (${list.length})</h3>
      <table>
        <tr><th>Nome</th><th>Categoria</th><th>Preço</th><th>Disponível</th><th>Ações</th></tr>
        ${list.map(p => `
          <tr>
            <td>${p.name}</td>
            <td><span class="badge badge-blue">${p.category_name}</span></td>
            <td class="price">R$ ${parseFloat(p.price).toFixed(2).replace('.',',')}</td>
            <td><button class="toggle ${p.available ? 'on' : ''}" onclick="toggleDisponivel('${p.id}', ${p.available})" title="${p.available ? 'Disponível' : 'Indisponível'}"></button></td>
            <td style="display:flex;gap:6px">
              <button class="btn btn-secondary btn-sm" onclick="modalEditarProduto('${p.id}')" title="Editar">✏️</button>
              <button class="btn btn-secondary btn-sm" onclick="modalAdicionaisProduto('${p.id}')" title="Adicionais">🧩</button>
              <button class="btn btn-danger btn-sm" onclick="excluirProduto('${p.id}')" title="Excluir">🗑️</button>
            </td>
          </tr>`).join('')}
      </table>
    </div>`;
}

function modalNovoProduto() {
  const opts = categorias.map(c => `<option value="${c.id}">${c.name}</option>`).join('');
  openModal('Novo Produto', `
    <div class="form-grid">
      <div><label>Nome</label><input id="f-name" /></div>
      <div class="form-grid cols-2">
        <div><label>Preço (R$)</label><input id="f-price" type="number" step="0.01" /></div>
        <div><label>Categoria</label><select id="f-cat">${opts}</select></div>
      </div>
      <div><label>Descrição</label><textarea id="f-desc"></textarea></div>
      ${imagePickerHtml()}
      <div class="form-grid cols-2">
        <div><label>Preço promocional (R$, opcional)</label><input id="f-promo" type="number" step="0.01" /></div>
        <div style="display:flex;align-items:center;gap:8px;padding-top:20px">
          <button type="button" class="toggle" id="f-featured-toggle" onclick="this.classList.toggle('on')"></button>
          <label style="margin:0">Produto em destaque</label>
        </div>
      </div>
    </div>`, async () => {
    await api('POST', '/menu/products', {
      name: v('f-name'),
      price: parseFloat(v('f-price')),
      category_id: v('f-cat'),
      description: v('f-desc'),
      image_url: v('f-image') || undefined,
      promo_price: v('f-promo') ? parseFloat(v('f-promo')) : undefined,
      featured: document.getElementById('f-featured-toggle').classList.contains('on'),
    });
    toast('Produto criado!'); closeModal(); pageProdutos();
  });
}

function modalEditarProduto(id) {
  const p = produtos.find(x => x.id === id);
  if (!p) return;
  const opts = categorias.map(c => `<option value="${c.id}" ${c.id === p.category_id ? 'selected' : ''}>${c.name}</option>`).join('');
  openModal('Editar Produto', `
    <div class="form-grid">
      <div><label>Nome</label><input id="f-name" value="${p.name}" /></div>
      <div class="form-grid cols-2">
        <div><label>Preço (R$)</label><input id="f-price" type="number" step="0.01" value="${p.price}" /></div>
        <div><label>Categoria</label><select id="f-cat">${opts}</select></div>
      </div>
      <div><label>Descrição</label><textarea id="f-desc">${p.description || ''}</textarea></div>
      ${imagePickerHtml(p.image_url || '')}
      <div class="form-grid cols-2">
        <div><label>Preço promocional (R$, opcional)</label><input id="f-promo" type="number" step="0.01" value="${p.promo_price ?? ''}" /></div>
        <div style="display:flex;align-items:center;gap:8px;padding-top:20px">
          <button type="button" class="toggle ${p.featured ? 'on' : ''}" id="f-featured-toggle" onclick="this.classList.toggle('on')"></button>
          <label style="margin:0">Produto em destaque</label>
        </div>
      </div>
      <hr style="border-color:#334155">
      <div id="addons-section"><p style="color:#64748b;font-size:.8rem">Carregando adicionais...</p></div>
    </div>`, async () => {
    await api('PATCH', '/menu/products/' + id, {
      name: v('f-name'),
      price: parseFloat(v('f-price')),
      category_id: v('f-cat'),
      description: v('f-desc'),
      image_url: v('f-image'),
      promo_price: v('f-promo') ? parseFloat(v('f-promo')) : null,
      featured: document.getElementById('f-featured-toggle').classList.contains('on'),
    });
    toast('Produto atualizado!'); closeModal(); pageProdutos();
  });
  renderAddonsSection(id, () => modalEditarProduto(id));
}

async function excluirProduto(id) {
  const p = produtos.find(x => x.id === id);
  if (!confirm(`Excluir o produto "${p?.name || ''}"? Essa ação não pode ser desfeita.`)) return;
  try {
    await api('DELETE', '/menu/products/' + id);
    toast('Produto excluído!'); pageProdutos();
  } catch (e) {
    toast('❌ ' + e.message, true);
  }
}

function modalAdicionaisProduto(id) {
  const p = produtos.find(x => x.id === id);
  if (!p) return;
  openModal('Adicionais — ' + p.name, `<div id="addons-section"><p style="color:#64748b;font-size:.8rem">Carregando adicionais...</p></div>`, null);
  document.getElementById('modal-confirm').style.display = 'none';
  renderAddonsSection(id, () => modalAdicionaisProduto(id));
}

// ── Adicionais de um produto ─────────────────────────────────────
let addonsReopen = null;
async function renderAddonsSection(productId, reopen) {
  if (reopen) addonsReopen = reopen;
  const el = document.getElementById('addons-section');
  if (!el) return;
  const groups = await api('GET', `/menu/products/${productId}/addon-groups`);
  el.innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
      <strong style="font-size:.85rem">Adicionais</strong>
      <button type="button" class="btn btn-secondary btn-sm" onclick="modalNovoGrupoAddon('${productId}')">+ Grupo</button>
    </div>
    ${groups.length === 0 ? '<p style="color:#475569;font-size:.8rem">Nenhum grupo de adicionais</p>' : ''}
    ${groups.map(g => `
      <div style="background:#0f172a;border:1px solid #334155;border-radius:8px;padding:10px;margin-bottom:8px">
        <div style="display:flex;justify-content:space-between;align-items:center">
          <div>
            <strong style="font-size:.82rem">${g.name}</strong>
            <span class="badge ${g.required ? 'badge-red' : 'badge-gray'}" style="margin-left:6px">${g.required ? 'obrigatório' : 'opcional'}</span>
            <span style="color:#64748b;font-size:.72rem;margin-left:4px">min ${g.min_select} · máx ${g.max_select}</span>
          </div>
          <div style="display:flex;gap:4px">
            <button type="button" class="btn btn-secondary btn-sm" onclick="modalNovaOpcaoAddon('${productId}','${g.id}')">+ Opção</button>
            <button type="button" class="btn btn-danger btn-sm" onclick="removerGrupoAddon('${productId}','${g.id}')">✕</button>
          </div>
        </div>
        ${(g.options || []).map(o => `
          <div style="display:flex;justify-content:space-between;padding:4px 0;font-size:.78rem;color:#cbd5e1">
            <span>${o.name}</span>
            <span style="display:flex;align-items:center;gap:8px">
              <span class="price">+R$ ${parseFloat(o.price).toFixed(2).replace('.',',')}</span>
              <button type="button" class="btn btn-danger btn-sm" onclick="removerOpcaoAddon('${productId}','${o.id}')">✕</button>
            </span>
          </div>`).join('') || '<p style="color:#475569;font-size:.75rem;padding-left:4px">Sem opções</p>'}

}

function modalNovoGrupoAddon(productId) {

async function verCliente(id) {

function modalNovoCliente() {

async function modalEditarCliente(id) {

function clienteForm(c) {

      <div class="form-grid cols-2">
        <div><label>Rua</label><input id="cf-street" value="${c.address_street||''}" placeholder="Rua / Av." /></div>
        <div><label>Número</label><input id="cf-number" value="${c.address_number||''}" placeholder="Nº" /></div>
      </div>
      <div>
        <label>Bairro <span id="taxa-badge" style="display:none;padding:2px 10px;border-radius:999px;font-size:.75rem;font-weight:700;margin-left:8px"></span></label>
        <select id="cf-neigh" onchange="atualizarTaxaEntrega()" style="width:100%">

function getClienteForm() {
  const bairro = document.getElementById('cf-neigh')?.value || '';

    address_street: v('cf-street')||undefined,
    address_number: v('cf-number')||undefined,
    address_neighborhood: bairro||undefined,
    address_city: v('cf-city')||undefined,
    notes: taxa !== null ? `Taxa de entrega: R$ ${taxa.toFixed(2)}` : undefined,
  };
}

// ── Pedidos ───────────────────────────────────────────────────────
const STATUS_LABEL = {
  aguardando_pagamento:'⏳ Aguardando',
  pago:'💳 Pago',
  confirmado:'📋 Confirmado',
  em_preparo:'🍳 Em preparo',
  pronto:'✅ Pronto',
  saiu_para_entrega:'🛵 A caminho',
  entregue:'🏠 Entregue',
  cancelado:'❌ Cancelado'
};
const STATUS_NEXT = {
  pago:'confirmado',
  confirmado:'em_preparo',
  em_preparo:'pronto',
  pronto:'saiu_para_entrega',
  saiu_para_entrega:'entregue'
};
const STATUS_COLOR = {
  aguardando_pagamento:'#92400e',
  pago:'#1e40af',
  confirmado:'#5b21b6',
  em_preparo:'#92400e',
  pronto:'#065f46',
  saiu_para_entrega:'#0369a1',
  entregue:'#374151',
  cancelado:'#991b1b'
};
let pedidosFiltro = 'todos';
let pedidosTimer = null;

async function pagePedidos() {
  clearInterval(pedidosTimer);
  document.getElementById('content').innerHTML = `
    <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;align-items:center">
      <div style="display:flex;gap:6px;flex-wrap:wrap;flex:1">
        ${['todos','aguardando_pagamento','pago','confirmado','em_preparo','pronto','saiu_para_entrega','entregue','cancelado'].map(s => `
          <button class="btn btn-sm" id="filtro-${s}" onclick="filtrarPedidos('${s}')"
            style="background:${s==='todos'?'#7c3aed':'#1e293b'};color:${s==='todos'?'#fff':'#94a3b8'};border:1px solid #334155">
            ${s==='todos'?'Todos':STATUS_LABEL[s]||s}
          </button>`).join('')}
      </div>
      <button class="btn btn-secondary btn-sm" onclick="carregarPedidos()">🔄 Atualizar</button>
    </div>
    <div id="pedidos-lista"><p style="color:#64748b">Carregando...</p></div>`;
  await carregarPedidos();
  pedidosTimer = setInterval(carregarPedidos, 30000);
}

async function carregarPedidos() {
  try {
    const qs = pedidosFiltro !== 'todos' ? `?status=${pedidosFiltro}&limit=100` : '?limit=100';
    const orders = await api('GET', '/orders' + qs);
    renderPedidos(orders);
  } catch(e) { toast('Erro ao carregar pedidos: ' + e.message, true); }
}

function filtrarPedidos(filtro) {
  pedidosFiltro = filtro;
  document.querySelectorAll('[id^="filtro-"]').forEach(b => {
    const isActive = b.id === 'filtro-' + filtro;
    b.style.background = isActive ? '#7c3aed' : '#1e293b';
    b.style.color = isActive ? '#fff' : '#94a3b8';
  });
  carregarPedidos();
}

function renderPedidos(orders) {
  if (!orders.length) {
    document.getElementById('pedidos-lista').innerHTML = `<div class="card" style="text-align:center;color:#64748b;padding:40px">Nenhum pedido encontrado</div>`;
    return;
  }
  document.getElementById('pedidos-lista').innerHTML = orders.map(o => {
    const cor = STATUS_COLOR[o.status] || '#334155';
    const prox = STATUS_NEXT[o.status];
    const hora = new Date(o.created_at).toLocaleTimeString('pt-BR', {hour:'2-digit',minute:'2-digit'});
    const data = new Date(o.created_at).toLocaleDateString('pt-BR', {day:'2-digit',month:'2-digit'});
    return `
    <div style="background:#1e293b;border:1px solid #334155;border-left:4px solid ${cor};border-radius:12px;padding:16px;margin-bottom:12px">
      <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px">
        <div style="display:flex;align-items:center;gap:12px">
          <span style="font-family:monospace;font-weight:800;font-size:1.1rem">#${o.id.slice(-6).toUpperCase()}</span>
          <span style="background:${cor};color:#fff;padding:2px 10px;border-radius:999px;font-size:.72rem;font-weight:700">${STATUS_LABEL[o.status]||o.status}</span>
          <span style="color:#64748b;font-size:.78rem">${data} às ${hora}</span>
          <span style="font-size:.85rem">${o.delivery_type === 'retirada' ? '🏪 Retirada' : '🛵 Entrega'}</span>
        </div>
        <div style="display:flex;align-items:center;gap:8px">
          <span style="font-weight:800;color:#a78bfa;font-size:1.05rem">R$ ${parseFloat(o.total||0).toFixed(2).replace('.',',')}</span>
          <span style="color:#64748b;font-size:.78rem">${o.payment_method||'-'}</span>
        </div>
      </div>
      <div style="display:flex;gap:24px;margin-top:10px;font-size:.82rem;flex-wrap:wrap">
        <div><span style="color:#64748b">Cliente: </span><strong>${o.customer_name||'—'}</strong></div>
        ${o.customer_phone ? `<div>📱 ${o.customer_phone}</div>` : ''}
        ${o.delivery_address ? `<div style="color:#94a3b8">📍 ${o.delivery_address}</div>` : ''}
      </div>
      <div style="display:flex;gap:8px;margin-top:12px;flex-wrap:wrap">
        <button class="btn btn-secondary btn-sm" onclick="verPedido('${o.id}')">👁 Ver itens</button>
        ${prox ? `<button class="btn btn-success btn-sm" onclick="avancarStatus('${o.id}','${prox}')">▶ ${STATUS_LABEL[prox]}</button>` : ''}
        ${o.status !== 'cancelado' && o.status !== 'entregue' ? `<button class="btn btn-danger btn-sm" onclick="cancelarPedido('${o.id}')">✕ Cancelar</button>` : ''}
      </div>
    </div>`;
  }).join('');
}

async function verPedido(id) {
  const o = await api('GET', '/orders/' + id);
  const items = o.items || [];
  openModal(`Pedido #${id.slice(-6).toUpperCase()}`, `
    <div style="font-size:.85rem;display:grid;gap:10px">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
        <div><span style="color:#64748b">Cliente:</span> <strong>${o.customer_name||'—'}</strong></div>
        <div><span style="color:#64748b">WhatsApp:</span> ${o.customer_phone||'—'}</div>
        <div><span style="color:#64748b">Tipo:</span> ${o.delivery_type === 'retirada' ? '🏪 Retirada' : '🛵 Entrega'}</div>
        <div><span style="color:#64748b">Pagamento:</span> ${o.payment_method||'—'}</div>
        ${o.delivery_address ? `<div style="grid-column:1/-1"><span style="color:#64748b">Endereço:</span> ${o.delivery_address}</div>` : ''}
      </div>
      <hr style="border-color:#334155">
      <strong>Itens do pedido</strong>
      ${items.map(i => `
        <div style="display:flex;justify-content:space-between;padding:8px;background:#0f172a;border-radius:8px">
          <div>
            <span style="font-weight:700">${i.quantity}x</span> ${i.product_name||i.name||'—'}
            ${i.notes ? `<div style="color:#64748b;font-size:.75rem">${i.notes}</div>` : ''}
          </div>
          <span class="price">R$ ${parseFloat((i.unit_price||i.price||0)*i.quantity).toFixed(2).replace('.',',')}</span>
        </div>`).join('') || '<p style="color:#475569">Sem itens registrados</p>'}
      <hr style="border-color:#334155">
      <div style="display:flex;justify-content:space-between;font-weight:800;font-size:1rem">
        <span>Total</span>
        <span class="price">R$ ${parseFloat(o.total||0).toFixed(2).replace('.',',')}</span>
      </div>

    </div>`, null);
  document.getElementById('modal-confirm').style.display = 'none';
}

async function avancarStatus(id, status) {
  await api('PATCH', '/orders/' + id + '/status', { status });
  toast('Status atualizado!'); carregarPedidos();
}
async function cancelarPedido(id) {
  if (!confirm('Cancelar este pedido?')) return;
  await api('PATCH', '/orders/' + id + '/status', { status: 'cancelado' });
  toast('Pedido cancelado'); carregarPedidos();
}

// ── Formas de Pagamento ───────────────────────────────────────────
async function pagePagamentos() {
  document.getElementById('content').innerHTML = `
    <div style="display:flex;justify-content:flex-end;margin-bottom:16px">
      <button class="btn btn-primary" onclick="modalNovoPagamento()">+ Nova forma</button>
    </div>
    <div class="card" id="pay-table"><p style="color:#64748b">Carregando...</p></div>`;
  try {
    const methods = await api('GET', '/payment-methods');
    renderPagamentos(methods);
  } catch(e) {
    document.getElementById('pay-table').innerHTML = '<p style="color:#ef4444">Erro ao carregar formas de pagamento.</p>';
  }
}

function renderPagamentos(methods) {
  document.getElementById('pay-table').innerHTML = `
    <h3>Formas de Pagamento</h3>
    <table>
      <tr><th>Ordem</th><th>Nome</th><th>Descrição</th><th>Chave PIX</th><th>Troco</th><th>Status</th><th>Ações</th></tr>
      ${methods.map(m => `
        <tr>
          <td style="color:#94a3b8">${m.sort_order}</td>
          <td style="font-weight:600">${m.name}</td>
          <td style="color:#64748b">${m.description || '—'}</td>
          <td style="font-size:.8rem">${m.pix_key || '—'}</td>
          <td>${m.requires_change ? '<span class="badge badge-blue">Sim</span>' : '—'}</td>
          <td><span class="badge ${m.active ? 'badge-green' : 'badge-red'}">${m.active ? 'Ativo' : 'Inativo'}</span></td>
          <td>
            <button class="btn btn-sm" onclick='modalEditarPagamento(${JSON.stringify(m)})'>✏️ Editar</button>
            <button class="btn btn-sm btn-danger" onclick="togglePagamento('${m.id}',${m.active})" style="margin-left:4px">${m.active ? 'Desativar' : 'Ativar'}</button>
            <button class="btn btn-sm btn-danger" onclick="deletarPagamento('${m.id}')" style="margin-left:4px">🗑</button>
          </td>
        </tr>`).join('')}
    </table>`;
}

function modalNovoPagamento() {
  openModal('Nova Forma de Pagamento', `
    <div class="form-grid">
      <div><label>Nome</label><input id="pm-name" placeholder="Ex: PIX, Dinheiro..." /></div>
      <div><label>Descrição</label><input id="pm-desc" placeholder="Ex: Pagamento via PIX" /></div>
      <div><label>Chave PIX <small style="color:#94a3b8">(opcional)</small></label><input id="pm-pix" placeholder="email, CPF ou chave aleatória" /></div>
      <div><label>Ordem de exibição</label><input id="pm-order" type="number" value="0" /></div>
      <div style="grid-column:1/-1;display:flex;align-items:center;gap:8px">
        <input type="checkbox" id="pm-change" style="width:18px;height:18px" />
        <label for="pm-change" style="margin:0">Requer informar troco</label>
      </div>
    </div>`, async () => {
    await api('POST', '/payment-methods', {
      name: v('pm-name'), description: v('pm-desc'), pix_key: v('pm-pix') || null,
      sort_order: parseInt(v('pm-order')) || 0,
      requires_change: document.getElementById('pm-change').checked
    });
    toast('Forma de pagamento criada!'); closeModal(); pagePagamentos();
  });
}

function modalEditarPagamento(m) {
  openModal('Editar Forma de Pagamento', `
    <div class="form-grid">
      <div><label>Nome</label><input id="epm-name" value="${m.name}" /></div>
      <div><label>Descrição</label><input id="epm-desc" value="${m.description || ''}" /></div>
      <div><label>Chave PIX</label><input id="epm-pix" value="${m.pix_key || ''}" /></div>
      <div><label>Ordem de exibição</label><input id="epm-order" type="number" value="${m.sort_order}" /></div>
      <div style="grid-column:1/-1;display:flex;align-items:center;gap:8px">
        <input type="checkbox" id="epm-change" style="width:18px;height:18px" ${m.requires_change ? 'checked' : ''} />
        <label for="epm-change" style="margin:0">Requer informar troco</label>
      </div>
    </div>`, async () => {
    await api('PATCH', \`/payment-methods/\${m.id}\`, {
      name: v('epm-name'), description: v('epm-desc'), pix_key: v('epm-pix') || null,
      sort_order: parseInt(v('epm-order')) || 0,
      requires_change: document.getElementById('epm-change').checked
    });
    toast('Forma de pagamento atualizada!'); closeModal(); pagePagamentos();
  });
}

async function togglePagamento(id, active) {
  await api('PATCH', \`/payment-methods/\${id}\`, { active: !active });
  toast(active ? 'Desativado' : 'Ativado'); pagePagamentos();
}

async function deletarPagamento(id) {
  if (!confirm('Excluir esta forma de pagamento?')) return;
  await api('DELETE', \`/payment-methods/\${id}\`);
  toast('Excluído!'); pagePagamentos();
}

        <div>

// ── Bairros ───────────────────────────────────────────────────────

  await carregarBairrosCache();

function modalNovoBairro() {
  openModal('Novo Bairro', bairroForm(), async () => {

    toast('Bairro atualizado!'); closeModal(); pageBairros();
  });
}

async function toggleBairroAtivo(id, current) {
  await api('PATCH', '/neighborhoods/' + id, { active: !current });
  toast(current ? 'Bairro desativado' : 'Bairro ativado');
  pageBairros();
}

// ── Configurações ─────────────────────────────────────────────────
function cfgImageHtml(idPrefix, label, url, folder, previewStyle) {
  return `
    <div>
      <label>${label}</label>
      <div style="display:flex;align-items:center;gap:10px">
        <img id="${idPrefix}-preview" src="${url || ''}" style="${previewStyle};object-fit:cover;border-radius:8px;background:#0f172a;${url ? '' : 'display:none'}" />
        <input type="file" accept="image/*" id="${idPrefix}-file" onchange="handleCfgImageUpload(this,'${idPrefix}','${folder}')" style="flex:1" />
        <span id="${idPrefix}-status" style="font-size:.75rem;color:#64748b"></span>
      </div>
      <input type="hidden" id="${idPrefix}" value="${url || ''}" />
    </div>`;
}

async function handleCfgImageUpload(inputEl, idPrefix, folder) {
  const file = inputEl.files[0];
  if (!file) return;
  const statusEl = document.getElementById(`${idPrefix}-status`);
  statusEl.textContent = 'Enviando...';
  try {
    const fd = new FormData();
    fd.append('image', file);
    fd.append('folder', folder);
    const res = await fetch('/api/menu/upload', { method: 'POST', headers: { Authorization: 'Bearer ' + TOKEN }, body: fd });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Erro ao enviar imagem');
    document.getElementById(idPrefix).value = data.url;
    const preview = document.getElementById(`${idPrefix}-preview`);
    preview.src = data.url;
    preview.style.display = '';
    statusEl.textContent = '✓ Enviada';
  } catch (err) {
    statusEl.textContent = '';
    toast(err.message, true);
  }
}

async function salvarConfiguracoes() {
