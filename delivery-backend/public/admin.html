<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — Confraria</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: system-ui, sans-serif; background: #0f172a; color: #f1f5f9; min-height: 100vh; display: flex; }

/* Sidebar */
#sidebar { width: 220px; background: #1e293b; border-right: 1px solid #334155; display: flex; flex-direction: column; flex-shrink: 0; }
#sidebar .logo { padding: 20px 16px; border-bottom: 1px solid #334155; }
#sidebar .logo h1 { font-size: 1.1rem; font-weight: 800; }
#sidebar .logo p { font-size: .72rem; color: #64748b; margin-top: 2px; }
#sidebar nav { flex: 1; padding: 12px 8px; }
.nav-btn { width: 100%; text-align: left; padding: 10px 12px; background: none; border: none; color: #94a3b8; border-radius: 8px; font-size: .85rem; cursor: pointer; display: flex; align-items: center; gap: 10px; transition: all .15s; }
.nav-btn:hover { background: #334155; color: #f1f5f9; }
.nav-btn.active { background: #7c3aed; color: #fff; }
#sidebar .bottom { padding: 12px; border-top: 1px solid #334155; font-size: .72rem; color: #475569; }

/* Main */
#main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
#topbar { background: #1e293b; border-bottom: 1px solid #334155; padding: 12px 24px; display: flex; align-items: center; justify-content: space-between; }
#topbar h2 { font-size: 1rem; font-weight: 700; }
#content { flex: 1; overflow-y: auto; padding: 24px; }

/* Cards */
.card { background: #1e293b; border: 1px solid #334155; border-radius: 12px; padding: 20px; margin-bottom: 20px; }
.card h3 { font-size: .85rem; font-weight: 700; color: #94a3b8; text-transform: uppercase; letter-spacing: .05em; margin-bottom: 16px; display: flex; align-items: center; justify-content: space-between; }

/* Table */
table { width: 100%; border-collapse: collapse; font-size: .82rem; }
th { text-align: left; padding: 8px 12px; color: #64748b; border-bottom: 1px solid #334155; font-weight: 600; font-size: .75rem; text-transform: uppercase; }
td { padding: 10px 12px; border-bottom: 1px solid #1e293b; color: #cbd5e1; vertical-align: middle; }
tr:hover td { background: #0f172a; }

/* Form */
.form-grid { display: grid; gap: 12px; }
.form-grid.cols-2 { grid-template-columns: 1fr 1fr; }
.form-grid.cols-3 { grid-template-columns: 1fr 1fr 1fr; }
label { display: block; font-size: .75rem; color: #64748b; font-weight: 600; margin-bottom: 4px; }
input, select, textarea { width: 100%; background: #0f172a; border: 1px solid #334155; color: #f1f5f9; border-radius: 8px; padding: 8px 12px; font-size: .85rem; outline: none; }
input:focus, select:focus, textarea:focus { border-color: #7c3aed; }
textarea { resize: vertical; min-height: 70px; }

/* Buttons */
.btn { padding: 8px 16px; border: none; border-radius: 8px; font-size: .82rem; font-weight: 600; cursor: pointer; transition: all .15s; }
.btn-primary { background: #7c3aed; color: white; }
.btn-primary:hover { background: #6d28d9; }
.btn-secondary { background: #334155; color: #f1f5f9; }
.btn-secondary:hover { background: #475569; }
.btn-danger { background: #dc2626; color: white; }
.btn-danger:hover { background: #b91c1c; }
.btn-sm { padding: 4px 10px; font-size: .75rem; }
.btn-success { background: #059669; color: white; }

/* Badge */
.badge { display: inline-block; padding: 2px 8px; border-radius: 999px; font-size: .72rem; font-weight: 700; }
.badge-green { background: #d1fae5; color: #065f46; }
.badge-red { background: #fee2e2; color: #991b1b; }
.badge-gray { background: #334155; color: #94a3b8; }
.badge-blue { background: #dbeafe; color: #1e40af; }

/* Toast */
#toast { position: fixed; bottom: 24px; right: 24px; background: #059669; color: white; padding: 12px 20px; border-radius: 10px; font-size: .85rem; font-weight: 600; transform: translateY(80px); opacity: 0; transition: all .3s; z-index: 999; }
#toast.show { transform: translateY(0); opacity: 1; }
#toast.error { background: #dc2626; }

/* Modal */
.modal-bg { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.7); z-index: 100; align-items: center; justify-content: center; }
.modal-bg.open { display: flex; }
.modal { background: #1e293b; border: 1px solid #334155; border-radius: 16px; padding: 24px; width: 100%; max-width: 520px; max-height: 90vh; overflow-y: auto; }
.modal h2 { font-size: 1rem; font-weight: 700; margin-bottom: 20px; }

/* Search */
.search-bar { display: flex; gap: 10px; margin-bottom: 16px; }
.search-bar input { flex: 1; }

/* Price */
.price { font-weight: 700; color: #a78bfa; }

/* Available toggle */
.toggle { width: 36px; height: 20px; background: #334155; border-radius: 999px; border: none; cursor: pointer; position: relative; transition: background .2s; }
.toggle.on { background: #7c3aed; }
.toggle::after { content: ''; position: absolute; top: 2px; left: 2px; width: 16px; height: 16px; background: white; border-radius: 50%; transition: left .2s; }
.toggle.on::after { left: 18px; }
</style>
</head>
<body>

<div id="sidebar">
  <div class="logo">
    <h1>☕ Confraria</h1>
    <p>Painel Administrativo</p>
  </div>
  <nav>
    <button class="nav-btn active" onclick="showPage('dashboard')">📊 Dashboard</button>
    <button class="nav-btn" onclick="showPage('produtos')">🍽 Produtos</button>
    <button class="nav-btn" onclick="showPage('categorias')">📂 Categorias</button>
    <button class="nav-btn" onclick="showPage('clientes')">👥 Clientes</button>
    <button class="nav-btn" onclick="showPage('usuarios')">🔐 Usuários</button>
    <button class="nav-btn" onclick="showPage('pedidos')">📋 Pedidos</button>
    <button class="nav-btn" onclick="showPage('impressoras')">🖨 Impressoras</button>
  </nav>
  <div class="bottom" id="user-info">Carregando...</div>
</div>

<div id="main">
  <div id="topbar">
    <h2 id="page-title">Dashboard</h2>
    <div style="display:flex;gap:10px;align-items:center;">
      <span id="ws-dot" style="width:8px;height:8px;border-radius:50%;background:#ef4444;display:inline-block;"></span>
      <button class="btn btn-secondary btn-sm" onclick="logout()">Sair</button>
    </div>
  </div>
  <div id="content"></div>
</div>

<div id="toast"></div>

<!-- Modal genérico -->
<div class="modal-bg" id="modal">
  <div class="modal">
    <h2 id="modal-title">Modal</h2>
    <div id="modal-body"></div>
    <div style="display:flex;gap:10px;justify-content:flex-end;margin-top:20px;">
      <button class="btn btn-secondary" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" id="modal-confirm" onclick="confirmModal()">Salvar</button>
    </div>
  </div>
</div>

<script>
// ── Auth ──────────────────────────────────────────────────────────
let TOKEN = localStorage.getItem('admin_token');
if (!TOKEN) {
  TOKEN = prompt('Token JWT admin:');
  if (TOKEN) localStorage.setItem('admin_token', TOKEN);
}

async function api(method, path, body) {
  const res = await fetch('/api' + path, {
    method,
    headers: { 'Content-Type': 'application/json', Authorization: 'Bearer ' + TOKEN },
    body: body ? JSON.stringify(body) : undefined,
  });
  const data = await res.json();
  if (!res.ok) throw new Error(data.error || 'Erro');
  return data;
}

function toast(msg, err = false) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'show' + (err ? ' error' : '');
  setTimeout(() => el.className = '', 3000);
}

function logout() {
  localStorage.removeItem('admin_token');
  location.reload();
}

// ── Catálogo de Bairros e Taxas de Entrega ────────────────────────
const BAIRROS = {

    { nome: 'Trem',             taxa: 7  },
    { nome: 'Jesus de Nazaré',  taxa: 8  },
    { nome: 'Perpétuo Socorro', taxa: 8  },
  ],
  'OESTE': [
    { nome: 'Alvorada',              taxa: 10 },
    { nome: 'Nova Esperança',        taxa: 9  },
    { nome: 'Cabralzinho',           taxa: 15 },
    { nome: 'Irmãos Platon',         taxa: 17 },
    { nome: 'Goiabal',               taxa: 17 },
    { nome: 'Marabaixo 1 e 2',       taxa: 17 },
    { nome: 'Parque Novo Mundo',     taxa: 20 },
    { nome: 'Parque das Nações',     taxa: 20 },
    { nome: 'Resd. Jardim América',  taxa: 22 },

    { nome: 'Resd. Cidade Jardim',   taxa: 22 },
    { nome: 'Resd. Amazonas',        taxa: 24 },
  ],
  'ZONA SUL': [
    { nome: 'Buritizal',             taxa: 10 },
    { nome: 'Novo Buritizal',        taxa: 11 },
    { nome: 'Muca',                  taxa: 10 },
    { nome: 'Beirol',                taxa: 8  },
    { nome: 'Santa Inês',            taxa: 8  },
    { nome: 'Araxá',                 taxa: 9  },
    { nome: 'Congós',                taxa: 12 },
    { nome: 'Pedrinhas',             taxa: 12 },
    { nome: 'Jardim Equatorial',     taxa: 10 },
    { nome: 'Jardim Marco Zero',     taxa: 12 },
    { nome: 'Universidade',          taxa: 16 },
    { nome: 'Zerão',                 taxa: 16 },
    { nome: 'Cond. Parque Felicitá', taxa: 17 },
    { nome: 'Cond. Portal do Sol',   taxa: 19 },
    { nome: 'Cond. Manari',          taxa: 19 },
    { nome: 'Cond. Arboretto',       taxa: 19 },
    { nome: 'Cond. Villa Tropical',  taxa: 19 },
    { nome: 'Chefe Clodoaldo',       taxa: 19 },
    { nome: 'Cond. Verana',          taxa: 20 },
    { nome: 'Fazendinha',            taxa: 23 },
  ],
  'ZONA NORTE': [
    { nome: 'Cidade Nova',           taxa: 10 },
    { nome: 'Julião Ramos',          taxa: 7  },
    { nome: 'Laguinho',              taxa: 8  },
    { nome: 'Pacoval',               taxa: 10 },
    { nome: 'São Lázaro',            taxa: 12 },
    { nome: 'Pantanal',              taxa: 14 },
    { nome: 'Renascer',              taxa: 12 },
    { nome: 'Vit. do Renascer',      taxa: 12 },
    { nome: 'Infraero 1',            taxa: 13 },
    { nome: 'Infraero 2',            taxa: 18 },
    { nome: 'Sol Nascente',          taxa: 20 },
    { nome: 'Ipê',                   taxa: 20 },
    { nome: 'Açaí',                  taxa: 18 },
    { nome: 'Boné Azul',             taxa: 17 },
    { nome: 'Novo Horizonte',        taxa: 19 },
    { nome: 'Jardim Felidade',       taxa: 16 },
    { nome: 'Jardim Felidade 2',     taxa: 18 },
    { nome: 'Brasil Novo',           taxa: 20 },
    { nome: 'Cond. Terra Nova',      taxa: 23 },
    { nome: 'Macapaba',              taxa: 20 },
    { nome: 'Morada das Palmeiras',  taxa: 18 },
    { nome: 'Resid. Bella Vista',    taxa: 23 },
    { nome: 'Amazonas',              taxa: 25 },
    { nome: 'Resid. Bouganville',    taxa: 12 },
  ],
};

function getTaxaEntrega(bairro) {
  for (const zona of Object.values(BAIRROS)) {
    const found = zona.find(b => b.nome === bairro);
    if (found) return found.taxa;
  }
  return null;
}

function bairroSelectOptions(selected) {
  return Object.entries(BAIRROS).map(([zona, bairros]) => `
    <optgroup label="── ${zona} ──">
      ${bairros.map(b => `<option value="${b.nome}" ${b.nome === selected ? 'selected' : ''}>
        ${b.nome} — R$ ${b.taxa.toFixed(2).replace('.',',')}
      </option>`).join('')}
    </optgroup>`).join('');
}

function atualizarTaxaEntrega() {
  const sel = document.getElementById('cf-neigh');
  const badge = document.getElementById('taxa-badge');
  if (!sel || !badge) return;
  const taxa = getTaxaEntrega(sel.value);
  if (taxa !== null) {
    badge.textContent = '🛵 Taxa: R$ ' + taxa.toFixed(2).replace('.',',');
    badge.style.display = 'inline-block';
    badge.style.background = '#064e3b';
    badge.style.color = '#6ee7b7';
  } else {
    badge.textContent = '';
    badge.style.display = 'none';
  }
}

// ── WebSocket ─────────────────────────────────────────────────────
;(function wsConnect() {
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  const ws = new WebSocket(`${proto}://${location.host}/ws?token=${TOKEN}&station=retaguarda`);
  ws.onopen = () => document.getElementById('ws-dot').style.background = '#10b981';
  ws.onclose = () => { document.getElementById('ws-dot').style.background = '#ef4444'; setTimeout(wsConnect, 3000); };
  ws.onmessage = (e) => {
    const m = JSON.parse(e.data);
    if (m.type === 'order_update') {
      toast('🔔 Novo pedido chegou!');
      if (currentPage === 'pedidos') showPage('pedidos');
      if (currentPage === 'dashboard') showPage('dashboard');
    }
  };
})();

// ── Router ────────────────────────────────────────────────────────
let currentPage = 'dashboard';
let modalCallback = null;

function showPage(page) {
  currentPage = page;
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  event?.target?.classList?.add('active');
  const titles = { dashboard:'Dashboard', produtos:'Produtos', categorias:'Categorias', clientes:'Clientes', usuarios:'Usuários', pedidos:'Pedidos', impressoras:'Impressoras' };
  document.getElementById('page-title').textContent = titles[page] || page;
  const pages = { dashboard: pageDashboard, produtos: pageProdutos, categorias: pageCategorias, clientes: pageClientes, usuarios: pageUsuarios, pedidos: pagePedidos, impressoras: pageImpressoras };
  pages[page]?.();
}

function openModal(title, body, cb) {
  document.getElementById('modal-title').textContent = title;
  document.getElementById('modal-body').innerHTML = body;
  document.getElementById('modal').classList.add('open');
  modalCallback = cb;
}
function closeModal() { document.getElementById('modal').classList.remove('open'); modalCallback = null; }
async function confirmModal() {
  try {
    await modalCallback?.();
  } catch(e) {
    toast('❌ ' + (e.message || 'Erro ao salvar'), true);
  }
}

// ── Dashboard ─────────────────────────────────────────────────────
async function pageDashboard() {
  document.getElementById('content').innerHTML = '<p style="color:#64748b">Carregando...</p>';
  const d = await api('GET', '/dashboard');
  const s = d.summary;
  document.getElementById('content').innerHTML = `
    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:20px">
      ${stat('📦', 'Pedidos hoje', s.total_orders)}
      ${stat('💰', 'Faturamento', 'R$ ' + parseFloat(s.revenue||0).toFixed(2).replace('.',','))}
      ${stat('✅', 'Receita paga', 'R$ ' + parseFloat(s.paid_revenue||0).toFixed(2).replace('.',','))}
      ${stat('❌', 'Cancelados', s.cancelled)}
    </div>
    <div class="card">
      <h3>Status dos pedidos</h3>
      <div style="display:flex;flex-wrap:wrap;gap:10px">
        ${(d.by_status||[]).map(x => `<div style="background:#0f172a;border:1px solid #334155;border-radius:8px;padding:10px 16px;text-align:center"><div style="font-size:1.4rem;font-weight:800">${x.count}</div><div style="font-size:.75rem;color:#64748b">${x.status.replace(/_/g,' ')}</div></div>`).join('')}
      </div>
    </div>
    <div class="card">
      <h3>🏆 Top produtos hoje</h3>
      <table>
        <tr><th>Produto</th><th>Qtde vendida</th><th>Receita</th></tr>
        ${(d.top_products||[]).map(p => `<tr><td>${p.name}</td><td>${p.qty_sold}</td><td class="price">R$ ${parseFloat(p.revenue||0).toFixed(2).replace('.',',')}</td></tr>`).join('') || '<tr><td colspan="3" style="color:#475569;text-align:center;padding:20px">Sem vendas hoje</td></tr>'}
      </table>
    </div>`;
}
function stat(icon, label, val) {
  return `<div class="card" style="margin:0"><div style="font-size:1.5rem">${icon}</div><div style="font-size:1.6rem;font-weight:800;margin:4px 0">${val}</div><div style="font-size:.75rem;color:#64748b">${label}</div></div>`;
}

// ── Produtos ──────────────────────────────────────────────────────
let produtos = [], categorias = [];
async function pageProdutos() {
  [produtos, categorias] = await Promise.all([
    api('GET', '/menu').then(cats => cats.flatMap(c => c.products.map(p => ({ ...p, category_name: c.name, category_id: c.id })))),
    api('GET', '/menu').then(cats => cats.map(c => ({ id: c.id, name: c.name }))),
  ]);
  renderProdutos();
}

function renderProdutos(filter = '') {
  const list = filter ? produtos.filter(p => p.name.toLowerCase().includes(filter.toLowerCase())) : produtos;
  document.getElementById('content').innerHTML = `
    <div class="search-bar">
      <input placeholder="Buscar produto..." oninput="renderProdutos(this.value)" />
      <button class="btn btn-primary" onclick="modalNovoProduto()">+ Novo produto</button>
    </div>
    <div class="card">
      <h3>Produtos (${list.length})</h3>
      <table>
        <tr><th>Nome</th><th>Categoria</th><th>Preço</th><th>Disponível</th><th>Ações</th></tr>
        ${list.map(p => `
          <tr>
            <td>${p.name}</td>
            <td><span class="badge badge-blue">${p.category_name}</span></td>
            <td class="price">R$ ${parseFloat(p.price).toFixed(2).replace('.',',')}</td>
            <td><button class="toggle ${p.available ? 'on' : ''}" onclick="toggleDisponivel('${p.id}', ${p.available})" title="${p.available ? 'Disponível' : 'Indisponível'}"></button></td>
            <td style="display:flex;gap:6px">
              <button class="btn btn-secondary btn-sm" onclick="modalEditarProduto('${p.id}')">✏️</button>
            </td>
          </tr>`).join('')}
      </table>
    </div>`;
}

function modalNovoProduto() {
  const opts = categorias.map(c => `<option value="${c.id}">${c.name}</option>`).join('');
  openModal('Novo Produto', `
    <div class="form-grid">
      <div><label>Nome</label><input id="f-name" /></div>
      <div class="form-grid cols-2">
        <div><label>Preço (R$)</label><input id="f-price" type="number" step="0.01" /></div>
        <div><label>Categoria</label><select id="f-cat">${opts}</select></div>
      </div>
      <div><label>Descrição</label><textarea id="f-desc"></textarea></div>
    </div>`, async () => {
    await api('POST', '/menu/products', {
      name: document.getElementById('f-name').value,
      price: parseFloat(document.getElementById('f-price').value),
      category_id: document.getElementById('f-cat').value,
      description: document.getElementById('f-desc').value,
    });
    toast('Produto criado!'); closeModal(); pageProdutos();
  });
}

function modalEditarProduto(id) {
  const p = produtos.find(x => x.id === id);
  if (!p) return;
  const opts = categorias.map(c => `<option value="${c.id}" ${c.id === p.category_id ? 'selected' : ''}>${c.name}</option>`).join('');
  openModal('Editar Produto', `
    <div class="form-grid">
      <div><label>Nome</label><input id="f-name" value="${p.name}" /></div>
      <div class="form-grid cols-2">
        <div><label>Preço (R$)</label><input id="f-price" type="number" step="0.01" value="${p.price}" /></div>
        <div><label>Categoria</label><select id="f-cat">${opts}</select></div>
      </div>
      <div><label>Descrição</label><textarea id="f-desc">${p.description || ''}</textarea></div>
    </div>`, async () => {
    await api('PATCH', '/menu/products/' + id, {
      name: document.getElementById('f-name').value,
      price: parseFloat(document.getElementById('f-price').value),
      category_id: document.getElementById('f-cat').value,
      description: document.getElementById('f-desc').value,
    });
    toast('Produto atualizado!'); closeModal(); pageProdutos();
  });
}

async function toggleDisponivel(id, current) {
  await api('PATCH', '/menu/products/' + id, { available: !current });
  toast(current ? 'Produto desativado' : 'Produto ativado');
  pageProdutos();
}

// ── Categorias ────────────────────────────────────────────────────
async function pageCategorias() {
  const cats = await api('GET', '/menu');
  document.getElementById('content').innerHTML = `
    <div style="display:flex;justify-content:flex-end;margin-bottom:16px">
      <button class="btn btn-primary" onclick="modalNovaCategoria()">+ Nova categoria</button>
    </div>
    <div class="card">
      <h3>Categorias</h3>
      <table>
        <tr><th>Nome</th><th>Descrição</th><th>Produtos</th><th>Ações</th></tr>
        ${cats.map(c => `
          <tr>
            <td style="font-weight:700">${c.name}</td>
            <td style="color:#64748b">${c.description || '-'}</td>
            <td><span class="badge badge-blue">${c.products.length} itens</span></td>
            <td><button class="btn btn-secondary btn-sm" onclick="modalEditarCategoria('${c.id}','${c.name}','${c.description||''}')">✏️</button></td>
          </tr>`).join('')}
      </table>
    </div>`;
}

function modalNovaCategoria() {
  openModal('Nova Categoria', `
    <div class="form-grid">
      <div><label>Nome</label><input id="f-name" /></div>
      <div><label>Descrição</label><input id="f-desc" /></div>
      <div><label>Ordem de exibição</label><input id="f-order" type="number" value="0" /></div>
    </div>`, async () => {
    await api('POST', '/categories', { name: document.getElementById('f-name').value, description: document.getElementById('f-desc').value, sort_order: parseInt(document.getElementById('f-order').value) });
    toast('Categoria criada!'); closeModal(); pageCategorias();
  });
}

function modalEditarCategoria(id, name, desc) {
  openModal('Editar Categoria', `
    <div class="form-grid">
      <div><label>Nome</label><input id="f-name" value="${name}" /></div>
      <div><label>Descrição</label><input id="f-desc" value="${desc}" /></div>
    </div>`, async () => {
    await api('PATCH', '/categories/' + id, { name: document.getElementById('f-name').value, description: document.getElementById('f-desc').value });
    toast('Categoria atualizada!'); closeModal(); pageCategorias();
  });
}

// ── Clientes ──────────────────────────────────────────────────────
async function pageClientes() {
  document.getElementById('content').innerHTML = `
    <div class="search-bar">
      <input placeholder="Buscar por nome ou telefone..." id="cli-search" oninput="buscarClientes(this.value)" />
      <button class="btn btn-primary" onclick="modalNovoCliente()">+ Novo cliente</button>
    </div>
    <div id="cli-table"><p style="color:#64748b">Digite para buscar ou aguarde...</p></div>`;
  buscarClientes('');
}

async function buscarClientes(q) {
  const clientes = await api('GET', '/customers?search=' + encodeURIComponent(q) + '&limit=50');
  document.getElementById('cli-table').innerHTML = `
    <div class="card">
      <h3>Clientes (${clientes.length})</h3>
      <table>
        <tr><th>Nome</th><th>WhatsApp</th><th>Endereço</th><th>Ações</th></tr>
        ${clientes.map(c => `
          <tr>
            <td style="font-weight:600">${c.name}</td>
            <td>${c.phone ? '📱 ' + c.phone : '-'}</td>
            <td style="font-size:.78rem">
              ${c.address_neighborhood ? `<span style="color:#f1f5f9">${c.address_neighborhood}</span>` : ''}
              ${c.address_neighborhood && getTaxaEntrega(c.address_neighborhood) !== null ? `<span style="background:#064e3b;color:#6ee7b7;border-radius:999px;padding:1px 7px;font-size:.7rem;font-weight:700;margin-left:4px">🛵 R$ ${getTaxaEntrega(c.address_neighborhood).toFixed(2).replace('.',',')}</span>` : ''}
              ${c.address_street ? `<div style="color:#64748b;margin-top:2px">${[c.address_street, c.address_number, c.address_city].filter(Boolean).join(', ')}</div>` : ''}
            </td>
            <td style="display:flex;gap:6px">
              <button class="btn btn-secondary btn-sm" onclick="verCliente('${c.id}')">👁</button>
              <button class="btn btn-secondary btn-sm" onclick="modalEditarCliente('${c.id}')">✏️</button>
            </td>
          </tr>`).join('')}
      </table>
    </div>`;
}

async function verCliente(id) {
  const c = await api('GET', '/customers/' + id);
  openModal('Cliente: ' + c.name, `
    <div style="display:grid;gap:8px;font-size:.85rem">
      <div><strong>WhatsApp:</strong> 📱 ${c.phone || '-'}</div>
      <div><strong>Endereço:</strong> ${[c.address_street, c.address_number, c.address_neighborhood, c.address_city].filter(Boolean).join(', ') || '-'}</div>
      <hr style="border-color:#334155;margin:8px 0">
      <strong>Últimos pedidos</strong>
      ${(c.recent_orders||[]).length === 0 ? '<p style="color:#475569">Nenhum pedido</p>' :
        c.recent_orders.map(o => `<div style="background:#0f172a;border-radius:8px;padding:8px;margin-top:4px">
          <span style="font-weight:700">#${o.id.slice(-6).toUpperCase()}</span>
          <span style="color:#64748b;font-size:.78rem;margin-left:8px">${o.status}</span>
          <span class="price" style="float:right">R$ ${parseFloat(o.total).toFixed(2).replace('.',',')}</span>
        </div>`).join('')}
    </div>`, null);
  document.getElementById('modal-confirm').style.display = 'none';
}

function modalNovoCliente() {
  openModal('Novo Cliente', clienteForm({}), async () => {
    await api('POST', '/customers', getClienteForm());
    toast('Cliente criado!'); closeModal(); pageClientes();
  });
  document.getElementById('modal-confirm').style.display = '';
}

async function modalEditarCliente(id) {
  const c = await api('GET', '/customers/' + id);
  openModal('Editar Cliente', clienteForm(c), async () => {
    await api('PATCH', '/customers/' + id, getClienteForm());
    toast('Cliente atualizado!'); closeModal(); pageClientes();
  });
  document.getElementById('modal-confirm').style.display = '';
}

function clienteForm(c) {
  return `
    <div class="form-grid">
      <div><label>Nome *</label><input id="cf-name" value="${c.name||''}" placeholder="Nome completo" /></div>
      <div><label>WhatsApp *</label><input id="cf-phone" value="${c.phone||''}" placeholder="Ex: 11999990000" /></div>
      <div class="form-grid cols-2">
        <div><label>Rua</label><input id="cf-street" value="${c.address_street||''}" placeholder="Rua / Av." /></div>
        <div><label>Número</label><input id="cf-number" value="${c.address_number||''}" placeholder="Nº" /></div>
      </div>
      <div>
        <label>Bairro <span id="taxa-badge" style="display:none;padding:2px 10px;border-radius:999px;font-size:.75rem;font-weight:700;margin-left:8px"></span></label>
        <select id="cf-neigh" onchange="atualizarTaxaEntrega()" style="width:100%">
          <option value="">— Selecione o bairro —</option>
          ${bairroSelectOptions(c.address_neighborhood||'')}
        </select>
      </div>
      <div><label>Complemento</label><input id="cf-city" value="${c.address_city||''}" placeholder="Apto, bloco, ponto de referência..." /></div>
    </div>`;
}
function getClienteForm() {
  const bairro = document.getElementById('cf-neigh')?.value || '';
  const taxa = getTaxaEntrega(bairro);
  return {
    name: v('cf-name'),
    phone: v('cf-phone'),
    address_street: v('cf-street')||undefined,
    address_number: v('cf-number')||undefined,
    address_neighborhood: bairro||undefined,
    address_city: v('cf-city')||undefined,
    notes: taxa !== null ? `Taxa de entrega: R$ ${taxa.toFixed(2)}` : undefined,
  };
}

// ── Usuários ──────────────────────────────────────────────────────
async function pageUsuarios() {
  document.getElementById('content').innerHTML = `
    <div style="display:flex;justify-content:flex-end;margin-bottom:16px">
      <button class="btn btn-primary" onclick="modalNovoUsuario()">+ Novo usuário</button>
    </div>
    <div class="card" id="usr-table"><p style="color:#64748b">Carregando...</p></div>`;
  // Lista via SQL direto (rota protegida admin)
  try {
    const users = await api('GET', '/users');
    renderUsuarios(users);
  } catch(e) {
    document.getElementById('usr-table').innerHTML = '<p style="color:#ef4444">Endpoint /api/users não implementado ainda — será adicionado.</p>';
  }
}

function renderUsuarios(users) {
  document.getElementById('usr-table').innerHTML = `
    <h3>Usuários do sistema</h3>
    <table>
      <tr><th>Nome</th><th>E-mail</th><th>Perfil</th><th>Status</th></tr>
      ${users.map(u => `
        <tr>
          <td style="font-weight:600">${u.name}</td>
          <td>${u.email}</td>
          <td><span class="badge badge-blue">${u.role}</span></td>
          <td><span class="badge ${u.active ? 'badge-green' : 'badge-red'}">${u.active ? 'Ativo' : 'Inativo'}</span></td>
        </tr>`).join('')}
    </table>`;
}

function modalNovoUsuario() {
  openModal('Novo Usuário', `
    <div class="form-grid">
      <div><label>Nome</label><input id="u-name" /></div>
      <div><label>E-mail</label><input id="u-email" type="email" /></div>
      <div><label>Senha</label><input id="u-pass" type="password" /></div>
      <div><label>Perfil</label>
        <select id="u-role">
          <option value="atendente">Atendente</option>
          <option value="cozinha">Cozinha</option>
          <option value="entregador">Entregador</option>
          <option value="admin">Admin</option>
        </select>
      </div>
    </div>`, async () => {
    await api('POST', '/auth/register', { name: v('u-name'), email: v('u-email'), password: v('u-pass'), role: v('u-role') });
    toast('Usuário criado!'); closeModal(); pageUsuarios();
  });
}

// ── Pedidos ───────────────────────────────────────────────────────
async function pagePedidos() {
  const orders = await api('GET', '/orders?limit=100');
  const STATUS = { aguardando_pagamento:'⏳ Aguardando', pago:'💳 Pago', confirmado:'📋 Confirmado', em_preparo:'🍳 Em preparo', pronto:'✅ Pronto', saiu_para_entrega:'🛵 A caminho', entregue:'🏠 Entregue', cancelado:'❌ Cancelado' };
  const NEXT = { confirmado:'em_preparo', em_preparo:'pronto', pronto:'saiu_para_entrega', saiu_para_entrega:'entregue' };
  document.getElementById('content').innerHTML = `
    <div class="card">
      <h3>Pedidos recentes (${orders.length})</h3>
      <table>
        <tr><th>#</th><th>Cliente</th><th>Itens</th><th>Total</th><th>Pagamento</th><th>Tipo</th><th>Status</th><th>Hora</th><th>Ação</th></tr>
        ${orders.map(o => `
          <tr>
            <td style="font-family:monospace;font-weight:700">${o.id.slice(-6).toUpperCase()}</td>
            <td>${o.customer_name||'-'}</td>
            <td style="color:#64748b">${o.item_count} item(s)</td>
            <td class="price">R$ ${parseFloat(o.total||0).toFixed(2).replace('.',',')}</td>
            <td style="color:#64748b">${o.payment_method||'-'}</td>
            <td>${o.delivery_type === 'retirada' ? '🏪' : '🛵'}</td>
            <td>${STATUS[o.status]||o.status}</td>
            <td style="color:#64748b">${new Date(o.created_at).toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'})}</td>
            <td style="display:flex;gap:4px">
              ${NEXT[o.status] ? `<button class="btn btn-success btn-sm" onclick="avancarStatus('${o.id}','${NEXT[o.status]}')">▶</button>` : ''}
              ${o.status !== 'cancelado' && o.status !== 'entregue' ? `<button class="btn btn-danger btn-sm" onclick="cancelarPedido('${o.id}')">✕</button>` : ''}
            </td>
          </tr>`).join('')}
      </table>
    </div>`;
}

async function avancarStatus(id, status) {
  await api('PATCH', '/orders/' + id + '/status', { status });
  toast('Status atualizado!'); pagePedidos();
}
async function cancelarPedido(id) {
  if (!confirm('Cancelar este pedido?')) return;
  await api('PATCH', '/orders/' + id + '/status', { status: 'cancelado' });
  toast('Pedido cancelado'); pagePedidos();
}

// ── Impressoras ───────────────────────────────────────────────────
function pageImpressoras() {
  document.getElementById('content').innerHTML = `
    <div class="card">
      <h3>Configuração de Impressoras ESC/POS</h3>
      <p style="color:#64748b;font-size:.85rem;margin-bottom:20px">Configure o endereço IP de cada impressora térmica. Use o formato <code style="background:#0f172a;padding:2px 6px;border-radius:4px">tcp://192.168.0.X:9100</code> para impressoras em rede.</p>
      <div class="form-grid">
        <div>
          <label>☕ Impressora — Bebidas</label>
          <input id="p-bebidas" placeholder="tcp://192.168.0.101:9100" value="${localStorage.getItem('p_bebidas')||''}" />
        </div>
        <div>
          <label>🔥 Impressora — Comida Quente</label>
          <input id="p-comida" placeholder="tcp://192.168.0.102:9100" value="${localStorage.getItem('p_comida')||''}" />
        </div>
        <div>
          <label>🎂 Impressora — Montagem</label>
          <input id="p-montagem" placeholder="tcp://192.168.0.103:9100" value="${localStorage.getItem('p_montagem')||''}" />
        </div>
      </div>
      <div style="margin-top:16px;display:flex;gap:10px">
        <button class="btn btn-primary" onclick="salvarImpressoras()">💾 Salvar no .env</button>
      </div>
    </div>
    <div class="card">
      <h3>Como conectar impressoras</h3>
      <div style="font-size:.83rem;color:#94a3b8;line-height:1.8">
        <p><strong style="color:#f1f5f9">Via rede (TCP)</strong> — Conecte a impressora no roteador e use <code style="background:#0f172a;padding:1px 6px;border-radius:4px">tcp://IP:9100</code></p>
        <p><strong style="color:#f1f5f9">Via USB no Windows</strong> — Use <code style="background:#0f172a;padding:1px 6px;border-radius:4px">printer:NomeDaImpressora</code></p>
        <p><strong style="color:#f1f5f9">Via USB no Linux</strong> — Use <code style="background:#0f172a;padding:1px 6px;border-radius:4px">/dev/usb/lp0</code></p>
        <p style="margin-top:8px;color:#64748b">Sem impressora configurada, os tickets são apenas exibidos no terminal do servidor.</p>
      </div>
    </div>`;
}

function salvarImpressoras() {
  localStorage.setItem('p_bebidas', v('p-bebidas'));
  localStorage.setItem('p_comida', v('p-comida'));
  localStorage.setItem('p_montagem', v('p-montagem'));
  toast('Configurações salvas! Adicione ao .env do servidor:');
  alert(`Adicione ao arquivo .env do delivery-backend:\n\nPRINTER_BEBIDAS=${v('p-bebidas')}\nPRINTER_COMIDA_QUENTE=${v('p-comida')}\nPRINTER_MONTAGEM=${v('p-montagem')}`);
}

// ── Helpers ───────────────────────────────────────────────────────
function v(id) { return document.getElementById(id)?.value || ''; }

// ── Init ──────────────────────────────────────────────────────────
api('GET', '/auth/me').then(u => {
  document.getElementById('user-info').textContent = `${u.name} · ${u.role}`;
}).catch(() => {});

showPage('dashboard');
</script>
</body>
</html>
