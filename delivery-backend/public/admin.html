function buildBairrosOptions(bairros) {
  if (!bairros || !bairros.length) return '<option value="">Selecionar bairro...</option>';
  const zones = {};
  for (const b of bairros) {
    const z = b.zone || 'Outros';
    if (!zones[z]) zones[z] = [];
    zones[z].push(b);
  }
  return '<option value="" data-fee="0">Selecionar bairro...</option>' +
    Object.entries(zones).map(function(entry) {
      return '<optgroup label="' + entry[0] + '">' +
        entry[1].map(function(b) {
          return '<option value="' + b.name + '" data-fee="' + b.delivery_fee + '">' + b.name + (b.free_delivery ? ' (grátis)' : ' — R$ ' + parseFloat(b.delivery_fee).toFixed(2)) + '</option>';
        }).join('') + '</optgroup>';
    }).join('');
}

function npSetTipo(tipo) {
  const overlay = document.getElementById('novo-pedido-overlay');
  const isDelivery = tipo === 'delivery';
  document.getElementById('np-endereco').style.display = isDelivery ? 'block' : 'none';
  const btnR = document.getElementById('np-btn-retirada');
  const btnD = document.getElementById('np-btn-delivery');
  btnR.style.borderColor = isDelivery ? 'var(--border)' : '#7c3aed';
  btnR.style.background = isDelivery ? 'var(--card)' : '#1e1b4b';
  btnR.style.color = isDelivery ? 'var(--muted)' : '#a78bfa';
  btnD.style.borderColor = isDelivery ? '#7c3aed' : 'var(--border)';
  btnD.style.background = isDelivery ? '#1e1b4b' : 'var(--card)';
  btnD.style.color = isDelivery ? '#a78bfa' : 'var(--muted)';
  overlay._deliveryType = tipo;
  if (!isDelivery) {
    document.getElementById('np-fee').value = '0';
    npCalcTotal();
  }
}

function npMatchBairro(neighborhood) {
  const sel = document.getElementById('np-neighborhood');
  if (!sel || !neighborhood) return false;
  const q = neighborhood.toLowerCase().trim();
  for (let i = 0; i < sel.options.length; i++) {
    if (sel.options[i].value.toLowerCase().trim() === q) {
      sel.selectedIndex = i;
      npAtualizarTaxa();
      return true;
    }
  }
  return false;
}

function npToggleTroco() {
  const pay = (document.getElementById('np-payment').value || '').toLowerCase();
  const wrap = document.getElementById('np-troco-wrap');
  if (wrap) wrap.style.display = pay.includes('dinheiro') ? 'block' : 'none';
}

function npAtualizarTaxa() {
  const sel = document.getElementById('np-neighborhood');
  const opt = sel.options[sel.selectedIndex];
  const fee = parseFloat(opt && opt.dataset.fee) || 0;
  document.getElementById('np-fee').value = fee.toFixed(2);
  npCalcTotal();
}

function npFormatPhone(phone) {
  if (!phone) return '';
  const d = ('' + phone).replace(/\D/g, '').slice(0, 11);
  if (d.length <= 10) return d.replace(/^(\d{0,2})(\d{0,4})(\d{0,4})$/, function(_, a, b, c) {
    return (a ? '(' + a + ')' : '') + (b ? ' ' + b : '') + (c ? '-' + c : '');
  }).trim();
  return d.replace(/^(\d{2})(\d{5})(\d{0,4})$/, '($1) $2-$3');
}

function npPhoneMask(el) {
  const d = el.value.replace(/\D/g, '').slice(0, 11);
  if (d.length <= 10) el.value = d.replace(/^(\d{0,2})(\d{0,4})(\d{0,4})$/, function(_, a, b, c) {
    return (a ? '(' + a + ')' : '') + (b ? ' ' + b : '') + (c ? '-' + c : '');
  }).trim();
  else el.value = d.replace(/^(\d{2})(\d{5})(\d{0,4})$/, '($1) $2-$3');
}

async function npBuscarCliente() {
  const phone = (document.getElementById('np-phone').value || '').replace(/\D/g, '');
  if (!phone) return;
  const info = document.getElementById('np-cliente-info');
  info.textContent = 'Buscando...';
  info.style.color = '#94a3b8';
  try {
    const r = await api('GET', '/delivery/lookup?phone=' + phone);
    const overlay = document.getElementById('novo-pedido-overlay');
    if (r && r.customer) {
      overlay._customerId = r.customer.id;
      document.getElementById('np-name').value = r.customer.name || '';
      info.textContent = '✅ Cliente encontrado';
      info.style.color = '#10b981';
      const addr = r.addresses && r.addresses[0];
      if (addr) {
        const stEl = document.getElementById('np-street');
        const numEl = document.getElementById('np-number');
        const cmpEl = document.getElementById('np-complement');
        if (stEl) stEl.value = addr.street || '';
        if (numEl) numEl.value = addr.number || '';
        if (cmpEl) cmpEl.value = addr.complement || '';
        if (addr.neighborhood) {
          const matched = npMatchBairro(addr.neighborhood);
          if (!matched) overlay._pendingNeighborhood = addr.neighborhood;
        }
        npSetTipo('delivery');
      }
    } else {
      overlay._customerId = null;
      info.textContent = '🆕 Novo cliente — preencha o nome';
      info.style.color = '#f59e0b';
    }
  } catch(e) {
    document.getElementById('np-cliente-info').textContent = 'Erro ao buscar cliente';
    document.getElementById('np-cliente-info').style.color = '#ef4444';
  }
}

function npFiltrar(input) {
  const overlay = document.getElementById('novo-pedido-overlay');
  const dropdown = document.getElementById('np-dropdown');
  if (!overlay || !dropdown) return;
  const q = input.value.trim().toLowerCase();
  const products = overlay._allProducts || [];
  const filtered = q ? products.filter(function(p) { return p.name.toLowerCase().includes(q); }) : products;
  if (!filtered.length) { dropdown.style.display = 'none'; return; }
  dropdown.style.display = 'block';
  dropdown.innerHTML = filtered.slice(0, 20).map(function(p) {
    return '<div onclick="npSelecionarProduto(\'' + p.id + '\',\'' + (p.name||'').replace(/'/g,"\\'") + '\',' + (parseFloat(p.price)||0) + ')" ' +
      'style="padding:8px 12px;cursor:pointer;font-size:.85rem;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border)">' +
      '<span style="color:var(--text)">' + p.name + '</span>' +
      '<span style="color:#7c3aed;font-weight:700;white-space:nowrap;margin-left:8px">R$ ' + parseFloat(p.price).toFixed(2) + '</span>' +
      '</div>';
  }).join('');
}

function npSelecionarProduto(id, name, price) {
  const sel = document.getElementById('np-prod-sel');
  const busca = document.getElementById('np-busca');
  const dropdown = document.getElementById('np-dropdown');
  sel.value = id; sel.dataset.price = price; sel.dataset.name = name;
  busca.value = name + ' — R$ ' + parseFloat(price).toFixed(2);
  dropdown.style.display = 'none';
}

function npAddProduct() {
  const overlay = document.getElementById('novo-pedido-overlay');
  const sel = document.getElementById('np-prod-sel');
  const qtyInput = document.getElementById('np-prod-qty');
  if (!sel.value) { toast('Selecione um produto da lista', true); return; }
  const basePrice = parseFloat(sel.dataset.price) || 0;
  const name = sel.dataset.name || '';
  const pid = sel.value;
  const qty = parseInt(qtyInput.value) || 1;
  const product = (overlay._allProducts || []).find(function(p) { return p.id === pid; });
  const groups = product && product.addon_groups ? product.addon_groups.filter(function(g) { return g.options && g.options.length > 0; }) : [];
  if (groups.length > 0) {
    npShowAddonModal(pid, name, basePrice, qty, groups);
  } else {
    const existing = overlay._items.find(function(i) { return i.product_id === pid && (!i.addons || !i.addons.length); });
    if (existing) { existing.quantity += qty; }
    else { overlay._items.push({ product_id: pid, product_name: name, unit_price: basePrice, quantity: qty, addons: [] }); }
    npRenderItems();
    npResetSearch();
  }
}

function npResetSearch() {
  const sel = document.getElementById('np-prod-sel');
  const busca = document.getElementById('np-busca');
  const qtyInput = document.getElementById('np-prod-qty');
  const dropdown = document.getElementById('np-dropdown');
  if (sel) { sel.value = ''; sel.dataset.price = ''; sel.dataset.name = ''; }
  if (busca) busca.value = '';
  if (qtyInput) qtyInput.value = 1;
  if (dropdown) dropdown.style.display = 'none';
}

function npShowAddonModal(pid, name, basePrice, qty, groups) {
  var existing = document.getElementById('np-addon-modal');
  if (existing) existing.remove();
  var modal = document.createElement('div');
  modal.id = 'np-addon-modal';
  modal.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:10001;display:flex;align-items:center;justify-content:center;padding:16px';
  var html = '<div style="background:#1e1b4b;border:1px solid #4c1d95;border-radius:14px;padding:20px;width:100%;max-width:460px;max-height:82vh;overflow-y:auto;box-shadow:0 8px 32px rgba(0,0,0,.6)">' +
    '<h3 style="margin:0 0 2px;font-size:1rem;color:#e2e8f0;font-weight:700">➕ Adicionais</h3>' +
    '<p style="margin:0 0 14px;font-size:.82rem;color:#a78bfa;font-weight:600">' + name + '</p>';
  for (var gi = 0; gi < groups.length; gi++) {
    var g = groups[gi];
    var isMulti = g.max_select > 1;
    html += '<div style="margin-bottom:16px;background:#0f0b2a;border-radius:10px;padding:12px">' +
      '<p style="font-weight:700;font-size:.82rem;color:#c4b5fd;margin:0 0 8px;text-transform:uppercase;letter-spacing:.05em">' + g.name +
      (g.required ? ' <span style="color:#f87171;font-size:.72rem;font-weight:400">(obrigatório)</span>' : '') +
      (g.max_select > 1 ? ' <span style="color:#94a3b8;font-size:.72rem;font-weight:400">— máx ' + g.max_select + '</span>' : '') + '</p>';
    for (var oi = 0; oi < g.options.length; oi++) {
      var o = g.options[oi];
      var inputType = isMulti ? 'checkbox' : 'radio';
      var oName = (o.name || o.option_name || '');
      var oPrice = parseFloat(o.price || o.option_price || 0);
      var priceLabel = oPrice > 0 ? ' <span style="color:#a78bfa;font-weight:700">+R$ ' + oPrice.toFixed(2) + '</span>' : ' <span style="color:#6b7280;font-size:.75rem">grátis</span>';
      html += '<label style="display:flex;align-items:center;gap:10px;padding:8px 6px;border-radius:6px;cursor:pointer;transition:background .15s" ' +
        'onmouseover="this.style.background=\'#1e1b4b\'" onmouseout="this.style.background=\'transparent\'">' +
        '<input type="' + inputType + '" name="npag_' + (g.id || g.group_id) + '" value="' + (o.id || o.option_id) + '" ' +
        'data-name="' + oName.replace(/"/g, '&quot;') + '" data-price="' + oPrice + '" ' +
        'style="accent-color:#7c3aed;width:17px;height:17px;flex-shrink:0">' +
        '<span style="flex:1;font-size:.87rem;color:#e2e8f0">' + oName + '</span>' +
        priceLabel +
        '</label>';
    }
    html += '</div>';
  }
  html += '<div id="np-addon-total" style="text-align:right;font-weight:700;color:#a78bfa;font-size:.92rem;margin:4px 0 14px;min-height:20px"></div>' +
    '<div style="display:flex;gap:8px">' +
    '<button type="button" onclick="document.getElementById(\'np-addon-modal\').remove()" style="flex:1;padding:10px;border-radius:8px;background:#374151;color:#e2e8f0;border:none;cursor:pointer;font-size:.9rem">Cancelar</button>' +
    '<button type="button" onclick="npConfirmAddons(\'' + pid + '\',\'' + name.replace(/'/g, "\\'") + '\',' + basePrice + ',' + qty + ')" style="flex:1;padding:10px;border-radius:8px;background:#7c3aed;color:#fff;border:none;cursor:pointer;font-size:.9rem;font-weight:700">✅ Adicionar</button>' +
    '</div></div>';
  modal.innerHTML = html;
  document.body.appendChild(modal);
  modal.addEventListener('change', npAddonCalcTotal);
  npAddonCalcTotal();
}

function npAddonCalcTotal() {
  var modal = document.getElementById('np-addon-modal');
  if (!modal) return;
  var checked = modal.querySelectorAll('input:checked');
  var extra = 0;
  for (var i = 0; i < checked.length; i++) extra += parseFloat(checked[i].dataset.price) || 0;
  var el = document.getElementById('np-addon-total');
  if (el) el.textContent = extra > 0 ? 'Adicionais: +R$ ' + extra.toFixed(2) : '';
}

function npConfirmAddons(pid, name, basePrice, qty) {
  var modal = document.getElementById('np-addon-modal');
  if (!modal) return;
  var checked = modal.querySelectorAll('input:checked');
  var addons = [];
  var extra = 0;
  for (var i = 0; i < checked.length; i++) {
    var p = parseFloat(checked[i].dataset.price) || 0;
    addons.push({ name: checked[i].dataset.name, price: p });
    extra += p;
  }
  var overlay = document.getElementById('novo-pedido-overlay');
  overlay._items.push({ product_id: pid, product_name: name, unit_price: basePrice + extra, quantity: qty, addons: addons });
  modal.remove();
  npRenderItems();
  npResetSearch();
}

function npRenderItems() {
  const overlay = document.getElementById('novo-pedido-overlay');
  const div = document.getElementById('np-items');
  if (!div) return;
  const items = overlay._items;
  if (!items.length) { div.innerHTML = '<p style="color:var(--muted);font-size:.83rem;padding:4px 0">Nenhum item adicionado.</p>'; npCalcTotal(); return; }
  div.innerHTML = items.map(function(i, idx) {
    var addonsHtml = (i.addons && i.addons.length) ? i.addons.map(function(a) {
      return '<div style="font-size:.75rem;color:#a78bfa;margin-left:4px">➕ ' + a.name + (a.price > 0 ? ' +R$ ' + parseFloat(a.price).toFixed(2) : '') + '</div>';
    }).join('') : '';
    return '<div style="padding:6px 0;border-bottom:1px solid var(--border)">' +
      '<div style="display:flex;align-items:center;gap:8px">' +
        '<div style="flex:1;min-width:0">' +
          '<span style="font-size:.85rem;color:var(--cream)">' + i.product_name + '</span>' +
          addonsHtml +
        '</div>' +
        '<div style="display:flex;align-items:center;gap:4px;flex-shrink:0">' +
          '<button type="button" onclick="npQty(' + idx + ',-1)" style="background:#374151;border:none;color:white;width:22px;height:22px;border-radius:4px;cursor:pointer;line-height:1">−</button>' +
          '<span style="min-width:22px;text-align:center;font-size:.88rem">' + i.quantity + '</span>' +
          '<button type="button" onclick="npQty(' + idx + ',1)" style="background:#374151;border:none;color:white;width:22px;height:22px;border-radius:4px;cursor:pointer;line-height:1">+</button>' +
        '</div>' +
        '<button type="button" onclick="npRemove(' + idx + ')" style="background:none;border:none;color:#ef4444;cursor:pointer;font-size:.95rem;padding:0 2px">✕</button>' +
        '<span style="font-size:.82rem;color:#94a3b8;min-width:56px;text-align:right">R$ ' + (i.unit_price * i.quantity).toFixed(2) + '</span>' +
      '</div>' +
    '</div>';
  }).join('');
  npCalcTotal();
}

function npQty(idx, delta) {
  const overlay = document.getElementById('novo-pedido-overlay');
  overlay._items[idx].quantity = Math.max(1, overlay._items[idx].quantity + delta);
  npRenderItems();
}

function npRemove(idx) {
  const overlay = document.getElementById('novo-pedido-overlay');
  overlay._items.splice(idx, 1);
  npRenderItems();
}

function npCalcTotal() {
  const overlay = document.getElementById('novo-pedido-overlay');
  if (!overlay) return;
  let subtotal = 0;
  for (const i of (overlay._items || [])) subtotal += i.unit_price * i.quantity;
  const fee = parseFloat(document.getElementById('np-fee') && document.getElementById('np-fee').value) || 0;
  const el = document.getElementById('np-total');
  if (el) el.textContent = 'R$ ' + (subtotal + fee).toFixed(2).replace('.', ',');
}

async function npConfirmar() {
  const overlay = document.getElementById('novo-pedido-overlay');
  const phone = (document.getElementById('np-phone').value || '').replace(/\D/g, '');
  const name = (document.getElementById('np-name').value || '').trim();
  const items = overlay._items || [];
  if (!phone) { toast('Informe o telefone do cliente', true); return; }
  if (!name) { toast('Informe o nome do cliente', true); return; }
  if (!items.length) { toast('Adicione ao menos um produto', true); return; }
  const deliveryType = overlay._deliveryType || 'retirada';
  const isDelivery = deliveryType === 'delivery';
  const fee = parseFloat(document.getElementById('np-fee').value) || 0;
  const payment = (document.getElementById('np-payment').value || '').trim() || 'dinheiro';
  const trocoVal = parseFloat(document.getElementById('np-troco') && document.getElementById('np-troco').value) || 0;
  const troco = payment.toLowerCase().includes('dinheiro') && trocoVal > 0 ? trocoVal : 0;
  let delivery_address = null;
  if (isDelivery) {
    const street = document.getElementById('np-street').value.trim();
    const number = document.getElementById('np-number').value.trim();
    const neighborhood = document.getElementById('np-neighborhood').value;
    const complement = document.getElementById('np-complement').value.trim();
    if (!street || !neighborhood) { toast('Preencha rua e bairro', true); return; }
    delivery_address = { street, number, neighborhood, complement };
  }
  try {
    const novo = await api('POST', '/orders/from-admin', {
      customer_id: overlay._customerId || null,
      customer_phone: phone,
      customer_name: name,
      items,
      delivery_type: deliveryType,
      delivery_address,
      payment_method: payment,
      delivery_fee: fee,
      troco: troco || null,
    });
    toast('Pedido #' + novo.order_number + ' criado! WhatsApp enviado ao cliente.');
    overlay.remove();
    carregarPedidos();
  } catch(e) {
    toast(e.message || 'Erro ao criar pedido', true);
  }
}

async function refazerPedido(id) {
  const overlay = document.createElement('div');
  overlay.id = 'refazer-overlay';
  overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:9998;display:flex;align-items:flex-start;justify-content:center;overflow-y:auto;padding:24px 16px';
  overlay.innerHTML = '<div style="color:var(--muted);padding:40px;margin:auto">Carregando...</div>';
  document.body.appendChild(overlay);

  let orderData, menu;
  try {
    [orderData, menu] = await Promise.all([api('GET', '/orders/' + id), api('GET', '/menu')]);
  } catch(e) { overlay.remove(); toast('Erro ao carregar pedido', true); return; }

  const allProducts = [];
  for (const cat of (menu || [])) for (const p of (cat.products || [])) allProducts.push(p);

  overlay._orderData = orderData;
  overlay._allProducts = allProducts;

  const items = orderData.items || [];

  function buildRows() {
    const div = overlay.querySelector('#refazer-items');
    if (!div) return;
    div.innerHTML = overlay._refazerItems.map((i, idx) =>
      '<div class="refazer-row" style="display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--border)" data-idx="' + idx + '" data-price="' + i.unit_price + '">' +
        '<span style="flex:1;font-size:.85rem;color:var(--cream)">' + i.product_name + '</span>' +
        '<div style="display:flex;align-items:center;gap:4px">' +
          '<button type="button" onclick="refazerQty(this,-1)" style="background:#374151;border:none;color:white;width:24px;height:24px;border-radius:4px;cursor:pointer;line-height:1">−</button>' +
          '<span class="refazer-qty" style="min-width:24px;text-align:center;font-size:.88rem">' + i.quantity + '</span>' +
          '<button type="button" onclick="refazerQty(this,1)" style="background:#374151;border:none;color:white;width:24px;height:24px;border-radius:4px;cursor:pointer;line-height:1">+</button>' +
        '</div>' +
        '<button type="button" onclick="refazerRemove(this)" style="background:none;border:none;color:#ef4444;cursor:pointer;font-size:1rem;padding:0 4px" title="Remover">✕</button>' +
        '<span class="refazer-row-total" style="font-size:.82rem;color:#94a3b8;min-width:58px;text-align:right">R$ ' + (parseFloat(i.unit_price)*i.quantity).toFixed(2) + '</span>' +
      '</div>'
    ).join('') || '<p style="color:var(--muted);font-size:.83rem;padding:8px 0">Nenhum item.</p>';
    calcRefazerTotal();
  }

  overlay._refazerItems = items
    .filter(i => i.product_available !== false)
    .map(i => ({ product_id: i.product_id, product_name: i.product_name, unit_price: parseFloat(i.unit_price)||0, quantity: parseInt(i.quantity)||1 }));

  const feeOrig = parseFloat(orderData.delivery_fee) || 0;
  const pmOrig = orderData.payment_method || 'dinheiro';

  overlay.innerHTML = `
    <div style="background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:28px;width:100%;max-width:500px;margin:auto">
      <h3 style="margin-bottom:4px;font-size:1rem;color:var(--text)">📋 Refazer Pedido #${orderData.order_number}</h3>
      <p style="font-size:.8rem;color:var(--muted);margin-bottom:16px">Cliente: <strong>${orderData.customer_name||'—'}</strong></p>
      <p style="font-size:.83rem;color:var(--muted);margin-bottom:8px">Itens do novo pedido:</p>
      <div id="refazer-items" style="max-height:200px;overflow-y:auto;margin-bottom:14px"></div>
      <div style="position:relative;margin-bottom:14px">
        <div style="display:flex;gap:6px;align-items:center">
          <div style="flex:1;position:relative">
            <input type="text" id="refazer-busca" placeholder="🔍 Buscar produto para adicionar..."
              autocomplete="off"
              oninput="refazerFiltrar(this)"
              onfocus="refazerFiltrar(this)"
              style="width:100%;padding:8px 10px;border-radius:8px;background:var(--card);border:1px solid var(--border);color:var(--text);font-size:.85rem;box-sizing:border-box;outline:none">
            <div id="refazer-dropdown" style="display:none;position:absolute;top:100%;left:0;right:0;background:var(--surface);border:1px solid var(--border);border-radius:8px;max-height:180px;overflow-y:auto;z-index:10;margin-top:2px;box-shadow:0 4px 16px rgba(0,0,0,.3)"></div>
          </div>
          <input type="number" id="refazer-prod-qty" value="1" min="1" style="width:52px;padding:8px;border-radius:8px;background:var(--card);border:1px solid var(--border);color:var(--text)">
          <button type="button" onclick="refazerAddProduct()" style="background:#7c3aed;color:white;border:none;padding:8px 14px;border-radius:8px;cursor:pointer;font-size:.82rem;white-space:nowrap">+ Add</button>
        </div>
        <input type="hidden" id="refazer-prod-sel" data-price="" data-name="">
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px">
        <div>
          <label style="font-size:.78rem;color:var(--muted);display:block;margin-bottom:4px">🛵 Taxa de entrega (R$)</label>
          <input type="number" id="refazer-fee" value="${feeOrig.toFixed(2)}" min="0" step="0.01"
            oninput="calcRefazerTotal()"
            style="width:100%;padding:8px;border-radius:8px;background:var(--card);border:1px solid var(--border);color:var(--text);box-sizing:border-box">
        </div>
        <div>
          <label style="font-size:.78rem;color:var(--muted);display:block;margin-bottom:4px">💳 Pagamento</label>
          <input type="text" id="refazer-payment" value="${pmOrig}"
            style="width:100%;padding:8px;border-radius:8px;background:var(--card);border:1px solid var(--border);color:var(--text);box-sizing:border-box">
        </div>
      </div>
      <div style="display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-top:1px solid var(--border);margin-bottom:16px">
        <span style="font-size:.85rem;color:var(--muted)">Total (itens + taxa):</span>
        <span id="refazer-total" style="font-weight:900;font-size:1.1rem;color:#7c3aed">R$ 0,00</span>
      </div>
      <div style="display:flex;gap:8px">
        <button type="button" onclick="document.getElementById('refazer-overlay').remove()" class="btn btn-secondary" style="flex:1">Cancelar</button>
        <button type="button" onclick="confirmarRefazerPedido('${id}')" class="btn" style="flex:1;background:#1d4ed8;color:#fff">📋 Criar Novo Pedido</button>
      </div>
    </div>`;

  buildRows();
  overlay._buildRows = buildRows;
}

function refazerQty(btn, delta) {
  const overlay = document.getElementById('refazer-overlay');
  const row = btn.closest('.refazer-row');
  const idx = parseInt(row.dataset.idx);
  const price = parseFloat(row.dataset.price) || 0;
  let qty = parseInt(row.querySelector('.refazer-qty').textContent) + delta;
  if (qty < 1) qty = 1;
  overlay._refazerItems[idx].quantity = qty;
  row.querySelector('.refazer-qty').textContent = qty;
  row.querySelector('.refazer-row-total').textContent = 'R$ ' + (price * qty).toFixed(2);
  calcRefazerTotal();
}

function refazerRemove(btn) {
  const overlay = document.getElementById('refazer-overlay');
  const row = btn.closest('.refazer-row');
  const idx = parseInt(row.dataset.idx);
  overlay._refazerItems.splice(idx, 1);
  overlay._buildRows();
}

function refazerFiltrar(input) {
  const overlay = document.getElementById('refazer-overlay');
  const dropdown = document.getElementById('refazer-dropdown');
  if (!overlay || !dropdown) return;
  const q = input.value.trim().toLowerCase();
  const products = overlay._allProducts || [];
  const filtered = q ? products.filter(p => p.name.toLowerCase().includes(q)) : products;
  if (!filtered.length) { dropdown.style.display = 'none'; return; }
  dropdown.style.display = 'block';
  dropdown.innerHTML = filtered.slice(0, 20).map(p =>
    '<div class="refazer-drop-item" onclick="refazerSelecionarProduto(\'' + p.id + '\',\'' + (p.name||'').replace(/'/g,"\\'") + '\',' + (parseFloat(p.price)||0) + ')" ' +
    'style="padding:8px 12px;cursor:pointer;font-size:.85rem;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border)">' +
      '<span style="color:var(--text)">' + p.name + '</span>' +
      '<span style="color:#7c3aed;font-weight:700;white-space:nowrap;margin-left:8px">R$ ' + parseFloat(p.price).toFixed(2) + '</span>' +
    '</div>'
  ).join('');
}

function refazerSelecionarProduto(id, name, price) {
  const sel = document.getElementById('refazer-prod-sel');
  const busca = document.getElementById('refazer-busca');
  const dropdown = document.getElementById('refazer-dropdown');
  sel.value = id;
  sel.dataset.price = price;
  sel.dataset.name = name;
  busca.value = name + ' — R$ ' + parseFloat(price).toFixed(2);
  dropdown.style.display = 'none';
}

function refazerAddProduct() {
  const overlay = document.getElementById('refazer-overlay');
  const sel = document.getElementById('refazer-prod-sel');
  const busca = document.getElementById('refazer-busca');
  const qtyInput = document.getElementById('refazer-prod-qty');
  if (!sel.value) { toast('Selecione um produto da lista', true); return; }
  const price = parseFloat(sel.dataset.price) || 0;
  const name = sel.dataset.name || '';
  const pid = sel.value;
  const qty = parseInt(qtyInput.value) || 1;
  const existing = overlay._refazerItems.find(i => i.product_id === pid);
  if (existing) { existing.quantity += qty; }
  else { overlay._refazerItems.push({ product_id: pid, product_name: name, unit_price: price, quantity: qty }); }
  overlay._buildRows();
  sel.value = ''; sel.dataset.price = ''; sel.dataset.name = '';
  busca.value = '';
  qtyInput.value = 1;
}

function calcRefazerTotal() {
  const overlay = document.getElementById('refazer-overlay');
  if (!overlay) return;
  let subtotal = 0;
  overlay.querySelectorAll('.refazer-row').forEach(row => {
    const price = parseFloat(row.dataset.price) || 0;
    const qty = parseInt(row.querySelector('.refazer-qty') && row.querySelector('.refazer-qty').textContent) || 0;
    subtotal += price * qty;
  });
  const fee = parseFloat(document.getElementById('refazer-fee') && document.getElementById('refazer-fee').value) || 0;
  const el = overlay.querySelector('#refazer-total');
  if (el) el.textContent = 'R$ ' + (subtotal + fee).toFixed(2).replace('.', ',');
}

async function confirmarRefazerPedido(originalId) {
  const overlay = document.getElementById('refazer-overlay');
  const items = overlay._refazerItems.filter(i => i.quantity > 0);
  if (!items.length) { toast('Adicione ao menos um item', true); return; }
  const od = overlay._orderData;
  try {
    const fee = parseFloat(document.getElementById('refazer-fee') && document.getElementById('refazer-fee').value) || 0;
    const payment = (document.getElementById('refazer-payment') && document.getElementById('refazer-payment').value.trim()) || od.payment_method || 'dinheiro';
    const novo = await api('POST', '/orders/from-admin', {
      customer_id: od.customer_id,
      items,
      delivery_type: od.delivery_type,
      delivery_address: od.delivery_address,
      payment_method: payment,
      delivery_fee: fee,
    });
    toast('Novo pedido #' + novo.order_number + ' criado com sucesso!');
    overlay.remove();
    carregarPedidos();
  } catch(e) {
    toast(e.message || 'Erro ao criar pedido', true);
  }
}

async function reabrirPedido(id) {
  if (!confirm('Reabrir este pedido? O status voltará para Confirmado.')) return;
  try {
    await api('PATCH', '/orders/' + id + '/status', { status: 'confirmado' });
    toast('Pedido reaberto!');
    carregarPedidos();
  } catch(e) {
    toast(e.message || 'Erro ao reabrir', true);
  }
}

async function cancelarPedido(id) {
  const overlay = document.createElement('div');
  overlay.id = 'cancel-overlay';
  overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:9998;display:flex;align-items:flex-start;justify-content:center;overflow-y:auto;padding:24px 16px';
  overlay.innerHTML = '<div style="color:var(--muted);padding:40px;margin:auto">Carregando...</div>';
  document.body.appendChild(overlay);
  let orderData;
  try {
    orderData = await api('GET', '/orders/' + id);
  } catch(e) {
    overlay.remove();
    toast('Erro ao carregar pedido', true);
    return;
  }
  overlay._orderData = orderData;
  const items = orderData.items || [];
  const itemsHtml = items.length ? buildCancelFaltanteRows(items) : '<p style="color:var(--muted);font-size:.85rem">Sem itens</p>';
  overlay.innerHTML = `
    <div style="background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:28px;width:100%;max-width:480px;margin:auto">
      <h3 style="margin-bottom:4px;font-size:1rem;color:var(--text)">✕ Cancelar Pedido #${orderData.order_number}</h3>
      <p style="font-size:.8rem;color:#ef4444;margin-bottom:16px">WhatsApp será enviado automaticamente ao cliente.</p>
      ${items.length ? '<p style="font-size:.83rem;color:var(--muted);margin-bottom:8px">Marque os produtos que estavam em falta:</p>' : ''}
      <div style="max-height:200px;overflow-y:auto;margin-bottom:16px">${itemsHtml}</div>
      <div style="margin-bottom:16px">
        <label style="font-size:.83rem;color:var(--muted);display:block;margin-bottom:6px">Motivo do cancelamento (opcional)</label>
        <textarea id="cancel-motivo" rows="2" placeholder="Ex: produto indisponível, cliente desistiu..."
          style="width:100%;padding:10px;border-radius:10px;background:var(--card);border:1px solid var(--border);color:var(--cream);font-size:.85rem;resize:none;outline:none;box-sizing:border-box"></textarea>
      </div>
      <div style="display:flex;gap:8px;margin-top:4px">
        <button type="button" onclick="document.getElementById('cancel-overlay').remove()" class="btn btn-secondary" style="flex:1">Voltar</button>
        <button type="button" onclick="confirmarCancelamentoPedido('${id}')" class="btn btn-danger" style="flex:1">✕ Confirmar Cancelamento</button>
      </div>
    </div>`;
  overlay.querySelectorAll('.faltante-chk').forEach(chk => {
    chk.addEventListener('change', () => {
      const faltanteIds = getFaltanteIds(overlay);
      renderSubstituteItems(overlay, items.filter(i => !faltanteIds.has(i.product_id)));
    });
  });
  renderSubstituteItems(overlay, items);
}

// ── Formas de Pagamento ───────────────────────────────────────────
async function pagePagamentos() {
  document.getElementById('content').innerHTML = `
    <div style="display:flex;justify-content:flex-end;margin-bottom:16px">
      <button class="btn btn-primary" onclick="modalNovoPagamento()">+ Nova forma</button>
    </div>
    <div class="card" id="pay-table"><p style="color:#64748b">Carregando...</p></div>`;
  try {
    const methods = await api('GET', '/payment-methods');
    renderPagamentos(methods);
  } catch(e) {
    document.getElementById('pay-table').innerHTML = '<p style="color:#ef4444">Erro ao carregar formas de pagamento.</p>';
  }
}

function renderPagamentos(methods) {
  document.getElementById('pay-table').innerHTML = `
    <h3>Formas de Pagamento</h3>
    <table>
      <tr><th>Ordem</th><th>Nome</th><th>Descrição</th><th>Chave PIX</th><th>Troco</th><th>Status</th><th>Ações</th></tr>
      ${methods.map(m => `
        <tr>
          <td style="color:#94a3b8">${m.sort_order}</td>
          <td style="font-weight:600">${m.name}${m.code ? `<div style="font-size:.68rem;color:#64748b;font-family:monospace">${m.code}</div>` : ''}</td>
          <td style="color:#64748b">${m.description || '—'}</td>
          <td style="font-size:.8rem">${m.pix_key || '—'}</td>
          <td>${m.requires_change ? '<span class="badge badge-blue">Sim</span>' : '—'}</td>
          <td><span class="badge ${m.active ? 'badge-green' : 'badge-red'}">${m.active ? 'Ativo' : 'Inativo'}</span></td>
          <td>
            <button class="btn btn-sm" onclick='modalEditarPagamento(${JSON.stringify(m)})'>✏️ Editar</button>
            <button class="btn btn-sm btn-danger" onclick="togglePagamento('${m.id}',${m.active})" style="margin-left:4px">${m.active ? 'Desativar' : 'Ativar'}</button>
            <button class="btn btn-sm btn-danger" onclick="deletarPagamento('${m.id}')" style="margin-left:4px">🗑</button>
          </td>
        </tr>`).join('')}
    </table>`;
}

function modalNovoPagamento() {
  openModal('Nova Forma de Pagamento', `
    <div class="form-grid">
      <div><label>Nome</label><input id="pm-name" placeholder="Ex: PIX, Dinheiro..." /></div>
      <div><label>Descrição</label><input id="pm-desc" placeholder="Ex: Pagamento via PIX" /></div>
      <div><label>Chave PIX <small style="color:#94a3b8">(opcional)</small></label><input id="pm-pix" placeholder="email, CPF ou chave aleatória" /></div>
      <div><label>Ordem de exibição</label><input id="pm-order" type="number" value="0" /></div>
      <div style="grid-column:1/-1;display:flex;align-items:center;gap:8px">
        <input type="checkbox" id="pm-change" style="width:18px;height:18px" />
        <label for="pm-change" style="margin:0">Requer informar troco</label>
      </div>
    </div>`, async () => {
    await api('POST', '/payment-methods', {
      name: v('pm-name'), description: v('pm-desc'), pix_key: v('pm-pix') || null,
      sort_order: parseInt(v('pm-order')) || 0,
      requires_change: document.getElementById('pm-change').checked
    });
    toast('Forma de pagamento criada!'); closeModal(); pagePagamentos();
  });
}

function modalEditarPagamento(m) {
  openModal('Editar Forma de Pagamento', `
    <div class="form-grid">
      <div><label>Nome</label><input id="epm-name" value="${m.name}" /></div>
      <div><label>Descrição</label><input id="epm-desc" value="${m.description || ''}" /></div>
      <div><label>Chave PIX</label><input id="epm-pix" value="${m.pix_key || ''}" /></div>
      <div><label>Ordem de exibição</label><input id="epm-order" type="number" value="${m.sort_order}" /></div>
      <div style="grid-column:1/-1;display:flex;align-items:center;gap:8px">
        <input type="checkbox" id="epm-change" style="width:18px;height:18px" ${m.requires_change ? 'checked' : ''} />
        <label for="epm-change" style="margin:0">Requer informar troco</label>
      </div>
    </div>`, async () => {
    await api('PATCH', `/payment-methods/${m.id}`, {
      name: v('epm-name'), description: v('epm-desc'), pix_key: v('epm-pix') || null,
      sort_order: parseInt(v('epm-order')) || 0,
      requires_change: document.getElementById('epm-change').checked
    });
    toast('Forma de pagamento atualizada!'); closeModal(); pagePagamentos();
  });
}

async function togglePagamento(id, active) {
  await api('PATCH', `/payment-methods/${id}`, { active: !active });
  toast(active ? 'Desativado' : 'Ativado'); pagePagamentos();
}

async function deletarPagamento(id) {
  if (!confirm('Excluir esta forma de pagamento?')) return;
  await api('DELETE', `/payment-methods/${id}`);
  toast('Excluído!'); pagePagamentos();
}

// ── Promoções ─────────────────────────────────────────────────────

      <div style="display:flex;flex-direction:column;gap:12px">

            <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:12px">
              <div style="flex:1">
                <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px">
                  <strong style="color:var(--text)">${p.name}</strong>
                  ${p.active ? '<span style="background:#16a34a;color:#fff;font-size:.68rem;font-weight:700;padding:2px 8px;border-radius:20px">ATIVA</span>' : '<span style="background:#64748b;color:#fff;font-size:.68rem;font-weight:700;padding:2px 8px;border-radius:20px">INATIVA</span>'}

                  <span style="background:var(--card);border:1px solid var(--border);padding:3px 10px;border-radius:20px;color:var(--text)">📅 ${dias}</span>
                  <span style="background:var(--card);border:1px solid var(--border);padding:3px 10px;border-radius:20px;color:var(--text)">💰 Mínimo R$ ${parseFloat(p.min_order_value).toFixed(2).replace('.',',')}</span>
                  ${p.zones && p.zones.length ? `<span style="background:var(--card);border:1px solid var(--border);padding:3px 10px;border-radius:20px;color:var(--text)">📍 Zona: ${p.zones.join(', ')}</span>` : ''}
                  <span style="background:var(--card);border:1px solid var(--border);padding:3px 10px;border-radius:20px;color:var(--text)">${tipo}</span>
                </div>
              </div>
              <div style="display:flex;gap:8px;flex-shrink:0">
                <button class="toggle ${p.active ? 'on' : ''}" onclick="togglePromocao('${p.id}',${p.active})" title="${p.active ? 'Desativar' : 'Ativar'}"></button>
                <button class="btn btn-secondary btn-sm" onclick="modalEditarPromocao('${p.id}')">✏️</button>

              </div>
            </div>
          </div>`;
        }).join('')}
      </div>
    </div>

    <div class="card" style="margin-top:16px" id="cupons-section">
      <p style="color:var(--muted);text-align:center;padding:20px">Carregando cupons...</p>
    </div>

    <div class="card" style="margin-top:16px">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
        <h3 style="margin:0">🏷️ Promoções de Produtos</h3>
        <button class="btn btn-primary btn-sm" onclick="modalPromoPreco()">+ Adicionar promoção</button>
      </div>
      <p style="font-size:.82rem;color:var(--muted);margin-bottom:16px">Produtos com preço promocional ativo no app do cliente.</p>
      <div id="promo-produtos-list"><p style="color:var(--muted);text-align:center;padding:20px">Carregando...</p></div>
    </div>`;
  renderCupons().then(() => renderPromoProdutos());

async function renderPromoProdutos() {
  const prods = await api('GET', '/menu/admin').then(cats => cats.flatMap(c => c.products.map(p => ({...p, category_name: c.name}))));
  const comPromo = prods.filter(p => p.promo_price != null);
  const DAYS = ['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];
  const el = document.getElementById('promo-produtos-list');
  if (!el) return;
  if (comPromo.length === 0) {
    el.innerHTML = '<p style="color:var(--muted);text-align:center;padding:20px">Nenhum produto com promoção ativa</p>';
    return;
  }
  el.innerHTML = `
    <div class="table-wrap">
      <table>
        <tr><th>Produto</th><th>Preço normal</th><th>Preço promo</th><th>Desconto</th><th>Label</th><th>Dias</th><th>Qtd. máx.</th><th>Ações</th></tr>
        ${comPromo.map(p => {
          const pct = Math.round((1 - p.promo_price / p.price) * 100);
          const dias = p.promo_days && p.promo_days.length ? p.promo_days.map(d => DAYS[d]).join(', ') : 'Sempre';
          return `<tr>
            <td><strong>${p.name}</strong></td>
            <td style="text-decoration:line-through;color:var(--muted)">R$ ${parseFloat(p.price).toFixed(2).replace('.',',')}</td>
            <td style="color:#16a34a;font-weight:700">R$ ${parseFloat(p.promo_price).toFixed(2).replace('.',',')}</td>
            <td><span style="background:#fee2e2;color:#dc2626;font-weight:700;padding:2px 8px;border-radius:20px;font-size:.78rem">${pct}% OFF</span></td>
            <td>${p.promo_label || '<span style="color:var(--muted)">—</span>'}</td>
            <td style="font-size:.8rem;color:var(--muted)">${dias}</td>
            <td style="font-size:.8rem;color:var(--muted)">${p.promo_max_qty != null ? p.promo_max_qty : 'Sem limite'}</td>
            <td style="display:flex;gap:6px">
              <button class="btn btn-secondary btn-sm" onclick="modalEditarPromoPreco(${JSON.stringify(p).split('"').join('&quot;')})">✏️</button>
              <button class="btn btn-sm" style="background:#fee2e2;color:#dc2626;border:none" onclick="removerPromoPreco('${p.id}','${p.name}')">🗑</button>
            </td>
          </tr>`;
        }).join('')}
      </table>
    </div>`;
}

function modalPromoPreco(prod = null) {
  const DAYS_OPTS = ['Domingo','Segunda','Terça','Quarta','Quinta','Sexta','Sábado'];
  const sel = prod && prod.promo_days ? prod.promo_days : [];
  openModal('🏷️ Promoção de Produto', `
    <div style="display:flex;flex-direction:column;gap:14px">
      ${!prod ? `<div><label>Produto</label><select id="pp-prod" style="width:100%"><option value="">Selecione...</option></select></div>` : `<div><strong>${prod.name}</strong></div>`}
      <div style="display:flex;gap:12px">
        <div style="flex:1"><label>Preço normal (R$)</label><input id="pp-preco" type="number" step="0.01" value="${prod ? prod.price : ''}" ${prod ? 'readonly style="opacity:.6"' : ''}/></div>
        <div style="flex:1"><label>Preço promocional (R$)</label><input id="pp-promo" type="number" step="0.01" value="${prod && prod.promo_price != null ? prod.promo_price : ''}"/></div>
        <div style="flex:1"><label>Qtd. máx. por pedido</label><input id="pp-max-qty" type="number" step="1" min="1" placeholder="Sem limite" value="${prod && prod.promo_max_qty != null ? prod.promo_max_qty : ''}"/></div>
      </div>
      <div><label>Label da tag (ex: 50% OFF • Sábado)</label><input id="pp-label" value="${prod && prod.promo_label ? prod.promo_label : ''}" placeholder="Ex: 50% OFF" /></div>
      <div>
        <label>Dias da semana (deixe vazio para sempre ativo)</label>
        <div style="display:flex;flex-wrap:wrap;gap:8px;margin-top:6px">
          ${DAYS_OPTS.map((d,i) => `<label style="display:flex;align-items:center;gap:4px;font-size:.85rem;cursor:pointer">
            <input type="checkbox" class="pp-day" value="${i}" ${sel.includes(i)?'checked':''}> ${d}
          </label>`).join('')}
        </div>
      </div>
    </div>`, async () => {
    const prodId = prod ? prod.id : document.getElementById('pp-prod').value;
    const promo_price = parseFloat(document.getElementById('pp-promo').value);
    const promo_label = document.getElementById('pp-label').value.trim() || null;
    const promo_days = Array.from(document.querySelectorAll('.pp-day:checked')).map(c => parseInt(c.value));
    const maxQtyRaw = document.getElementById('pp-max-qty').value;
    const promo_max_qty = maxQtyRaw ? parseInt(maxQtyRaw, 10) : null;
    if (!prodId) { toast('Selecione um produto', true); return; }
    if (isNaN(promo_price)) { toast('Informe o preço promocional', true); return; }
    await api('PATCH', `/menu/products/${prodId}`, { promo_price, promo_label, promo_days: promo_days.length ? promo_days : null, promo_max_qty });
    toast('Promoção salva!'); closeModal(); pagePromocoes();
  });
  if (!prod) {
    api('GET', '/menu/admin').then(cats => cats.flatMap(c => c.products.map(p => ({...p, category_name: c.name})))).then(prods => {
      const sel = document.getElementById('pp-prod');
      if (!sel) return;
      prods.filter(p => p.available !== false).sort((a,b) => a.name.localeCompare(b.name)).forEach(p => {
        const o = document.createElement('option'); o.value = p.id; o.textContent = p.name + ' (' + p.category_name + ')'; sel.appendChild(o);
      });
    });
  }
}

function modalEditarPromoPreco(prod) {
  modalPromoPreco(prod);
}

async function removerPromoPreco(id, nome) {
  if (!confirm(`Remover promoção de "${nome}"?`)) return;
  await api('PATCH', `/menu/products/${id}`, { promo_price: null, promo_label: null, promo_days: null, promo_max_qty: null });
  toast('Promoção removida!'); pagePromocoes();
}

function promocaoForm(p = {}, zonas = []) {
  const selectedDays = p.day_of_week || [];
  const selectedZones = p.zones || [];
  return `
    <div style="display:flex;flex-direction:column;gap:14px">
      <div><label>Nome da promoção</label><input id="pr-name" value="${p.name || ''}" placeholder="Ex: Terça de Frete Grátis" /></div>
      <div><label>Descrição</label><input id="pr-desc" value="${p.description || ''}" placeholder="Descrição exibida para o cliente" /></div>
      <div>
        <label>Dias da semana</label>
        <div style="display:flex;gap:6px;flex-wrap:wrap;margin-top:6px">
          ${DAYS.map((d, i) => `
            <label style="display:flex;align-items:center;gap:4px;cursor:pointer;background:var(--card);border:1px solid var(--border);padding:4px 10px;border-radius:20px;font-size:.82rem">
              <input type="checkbox" id="pr-day-${i}" ${selectedDays.includes(i) ? 'checked' : ''} style="accent-color:#7c3aed"> ${d}
            </label>`).join('')}
        </div>
        <p style="font-size:.75rem;color:var(--muted);margin-top:4px">Deixe todos desmarcados para valer todos os dias</p>
      </div>
      <div>
        <label>Zonas elegíveis (opcional)</label>
        <div style="display:flex;gap:6px;flex-wrap:wrap;margin-top:6px">
          ${zonas.length === 0
            ? '<p style="font-size:.8rem;color:var(--muted)">Nenhuma zona cadastrada</p>'
            : zonas.map(z => `
              <label style="display:flex;align-items:center;gap:4px;cursor:pointer;background:var(--card);border:1px solid var(--border);padding:4px 12px;border-radius:20px;font-size:.82rem">
                <input type="checkbox" class="pr-zone-cb" value="${z}" ${selectedZones.includes(z) ? 'checked' : ''} style="accent-color:#7c3aed"> ${z}
              </label>`).join('')}
        </div>
        <p style="font-size:.75rem;color:var(--muted);margin-top:4px">Deixe todas desmarcadas para valer em todos os bairros</p>
      </div>
      <div><label>Valor mínimo do pedido (R$)</label><input id="pr-min" type="number" step="0.01" value="${p.min_order_value ?? 0}" /></div>
      <div>
        <label>Tipo de desconto</label>
        <select id="pr-type" onchange="updatePromoDiscountField()" style="width:100%">
          <option value="free_delivery" ${p.discount_type === 'free_delivery' ? 'selected' : ''}>🚚 Frete grátis</option>
          <option value="percent" ${p.discount_type === 'percent' ? 'selected' : ''}>% Porcentagem</option>
          <option value="fixed" ${p.discount_type === 'fixed' ? 'selected' : ''}>R$ Valor fixo</option>
        </select>
      </div>
      <div id="pr-discount-wrap" style="${p.discount_type && p.discount_type !== 'free_delivery' ? '' : 'display:none'}">
        <label id="pr-discount-label">Valor do desconto</label>
        <input id="pr-discount" type="number" step="0.01" value="${p.discount_value ?? 0}" />
      </div>
    </div>`;
}

function updatePromoDiscountField() {
  const tipo = document.getElementById('pr-type')?.value;
  const wrap = document.getElementById('pr-discount-wrap');
  const label = document.getElementById('pr-discount-label');
  if (!wrap) return;
  if (tipo === 'free_delivery') { wrap.style.display = 'none'; return; }
  wrap.style.display = '';
  label.textContent = tipo === 'percent' ? 'Porcentagem (%)' : 'Valor fixo (R$)';
}

function getPromocaoFormData() {
  const days = [0,1,2,3,4,5,6].filter(i => document.getElementById(`pr-day-${i}`)?.checked);
  const zones = [...document.querySelectorAll('.pr-zone-cb:checked')].map(cb => cb.value);
  return {
    name: document.getElementById('pr-name')?.value,
    description: document.getElementById('pr-desc')?.value,
    day_of_week: days.length ? days : null,
    zones: zones.length ? zones : null,
    min_order_value: parseFloat(document.getElementById('pr-min')?.value || 0),
    discount_type: document.getElementById('pr-type')?.value,
    discount_value: parseFloat(document.getElementById('pr-discount')?.value || 0),
    active: true,
  };
}

async function getZonas() {
  const bairros = await api('GET', '/neighborhoods?all=true');
  return [...new Set(bairros.map(b => b.zone).filter(Boolean))].sort();
}

function updateCupomField() {
  const t = document.getElementById('cp-type')?.value;
  const wrap = document.getElementById('cp-value-wrap');
  const label = document.getElementById('cp-value-label');
  if (!wrap) return;
  wrap.style.display = t === 'free_delivery' ? 'none' : '';
  if (label) label.textContent = t === 'fixed' ? 'Valor (R$)' : 'Porcentagem (%)';
}

function getCupomData() {
  return {
    code: document.getElementById('cp-code')?.value.trim().toUpperCase(),
    description: document.getElementById('cp-desc')?.value,
    discount_type: document.getElementById('cp-type')?.value,
    discount_value: parseFloat(document.getElementById('cp-value')?.value||0),
    min_order_value: parseFloat(document.getElementById('cp-min')?.value||0),
    max_uses: document.getElementById('cp-max')?.value ? parseInt(document.getElementById('cp-max').value) : null,
    max_uses_per_customer: document.getElementById('cp-max-per')?.value ? parseInt(document.getElementById('cp-max-per').value) : null,
    expires_at: document.getElementById('cp-expires')?.value || null,
    allowed_categories: Array.from(document.querySelectorAll('.cp-cat:checked')).map(c => c.value),
    active: true,
  };
}

function loadCupomCats(selectedIds = []) {
  api('GET', '/categories').then(cats => {
    const wrap = document.getElementById('cp-cats-wrap');
    if (!wrap) return;
    const excluir = ['Adicionais'];
    const visiveis = cats.filter(c => !excluir.includes(c.name));
    const allChecked = selectedIds.length === 0;
    wrap.innerHTML = visiveis.map(c => `
      <label style="display:flex;align-items:center;gap:5px;cursor:pointer">
        <input type="checkbox" class="cp-cat" value="${c.id}" ${allChecked || selectedIds.includes(c.id)?'checked':''}>
        ${c.name}
      </label>`).join('');
  });
}

function modalNovoCupom() {

    await api('POST', '/coupons', data);

  setTimeout(() => loadCupomCats([]), 50);

async function modalEditarCupom(id) {
  const cupons = await api('GET', '/coupons');

async function detectarImpressoras() {
  const msg = document.getElementById('printer-detect-msg');
  msg.textContent = 'Detectando...';
  try {
    const data = await api('GET', '/printers');
    const list = data.printers || [];
    if (list.length === 0) {
      msg.textContent = 'Nenhuma impressora encontrada.';
      return;
    }
    const sel = document.getElementById('printer-select');
    sel.innerHTML = '<option value="">— selecione para copiar nome —</option>' +
      list.map(p => `<option value="${p}">${p}</option>`).join('');
    document.getElementById('printer-list-wrap').style.display = '';
    msg.textContent = `${list.length} impressora(s) encontrada(s).`;
  } catch(e) {
    msg.textContent = 'Erro ao detectar.';
  }
}

function usarSelecionada(fieldId) {
  const sel = document.getElementById('printer-select');
  if (!sel || !sel.value) { toast('Primeiro detecte e selecione uma impressora acima.'); return; }
  const field = document.getElementById(fieldId);
  if (field) field.value = sel.value;
}

async function salvarImpressoras() {
  const saveMsg = document.getElementById('printer-save-msg');
  saveMsg.textContent = 'Salvando...';
  try {
    await api('POST', '/printers/config', {
      printer_caixa:   document.getElementById('p-caixa').value.trim(),
      printer_cozinha: document.getElementById('p-cozinha').value.trim(),
      printer_balcao:  document.getElementById('p-balcao').value.trim(),
    });
    toast('Impressoras salvas!');
    saveMsg.textContent = '';
  } catch(e) {
    toast('Erro ao salvar: ' + e.message, true);
    saveMsg.textContent = '';
  }
}

async function pageArquivo() {
  document.getElementById('content').innerHTML = '<p style="color:#64748b">Carregando...</p>';
  let orders;
  try {
    orders = await api('GET', '/orders?archived=true&limit=500');
  } catch (e) {
    document.getElementById('content').innerHTML = `<div class="card"><p style="color:#ef4444">❌ Erro ao carregar arquivo: ${e.message}</p></div>`;
    return;
  }

  const groups = {};
  for (const o of orders) {
    const d = new Date(o.created_at).toLocaleDateString('pt-BR');
    (groups[d] = groups[d] || []).push(o);
  }
  const dates = Object.keys(groups).sort((a, b) => {
    const [da,ma,ya] = a.split('/'); const [db,mb,yb] = b.split('/');
    return new Date(yb,mb-1,db) - new Date(ya,ma-1,da);
  });

  document.getElementById('content').innerHTML = `
    <p style="color:var(--muted);font-size:.85rem;margin-bottom:14px">📁 Vendas arquivadas ao fechar o caixa, separadas por data. Somem do painel de Pedidos assim que arquivadas.</p>
    ${!dates.length ? '<div class="card"><p style="color:#64748b">Nenhuma venda arquivada ainda.</p></div>' : dates.map(d => {
      const os = groups[d];
      const total = os.reduce((s,o) => s + parseFloat(o.total||0), 0);
      return `
      <details class="card" style="margin-bottom:10px">
        <summary style="cursor:pointer;font-weight:700;color:var(--text);display:flex;justify-content:space-between;align-items:center">
          <span>📅 ${d} — ${os.length} venda(s)</span>
          <span style="color:#7c3aed">R$ ${total.toFixed(2).replace('.',',')}</span>
        </summary>
        <table style="margin-top:10px">
          <tr><th>Pedido</th><th>Cliente</th><th>Status</th><th>Pagamento</th><th>Total</th></tr>
          ${os.map(o => `
            <tr>
              <td>#${(o.order_number||'').toString().slice(-6).toUpperCase()}</td>
              <td>${o.customer_name||'-'}</td>
              <td>${STATUS_LABEL[o.status]||o.status}</td>

              <td>R$ ${parseFloat(o.total||0).toFixed(2).replace('.',',')}</td>
            </tr>`).join('')}
        </table>
      </details>`;
    }).join('')}`;
}

function cfgImageHtml(idPrefix, label, url, folder, previewStyle) {
  return `
    <div>
      <label>${label}</label>
      <div style="display:flex;align-items:center;gap:10px">
        <img id="${idPrefix}-preview" src="${url || ''}" style="${previewStyle};object-fit:cover;border-radius:8px;background:#0f172a;${url ? '' : 'display:none'}" />
        <input type="file" accept="image/*" id="${idPrefix}-file" onchange="handleCfgImageUpload(this,'${idPrefix}','${folder}')" style="flex:1" />
        <span id="${idPrefix}-status" style="font-size:.75rem;color:#64748b"></span>
      </div>
      <input type="hidden" id="${idPrefix}" value="${url || ''}" />
    </div>`;
}

async function handleCfgImageUpload(inputEl, idPrefix, folder) {
  const file = inputEl.files[0];
  if (!file) return;
  const statusEl = document.getElementById(`${idPrefix}-status`);
  statusEl.textContent = 'Enviando...';
  try {
    const fd = new FormData();
    fd.append('image', file);
    fd.append('folder', folder);
    const res = await fetch('/api/menu/upload', { method: 'POST', headers: { Authorization: 'Bearer ' + TOKEN }, body: fd });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Erro ao enviar imagem');
    document.getElementById(idPrefix).value = data.url;
    const preview = document.getElementById(`${idPrefix}-preview`);
    preview.src = data.url;
    preview.style.display = '';
    statusEl.textContent = '✓ Enviada';
  } catch (err) {
    statusEl.textContent = '';
    toast(err.message, true);
  }
}

async function handleBannerDayUpload(inputEl, idPrefix) {
  const file = inputEl.files[0];
  if (!file) return;

    statusEl.textContent = '✓';
  } catch (err) {
    statusEl.textContent = '';
    toast(err.message, true);
  }
}

async function salvarConfiguracoes() {
  // Horários de funcionamento
  const business_hours = {};
  for (let i = 0; i < 7; i++) {
    const key = `hs_${i}`;
    business_hours[i] = {
      open: document.getElementById(`${key}_open`)?.classList.contains('on') || false,
      from: document.getElementById(`${key}_from`)?.value || '08:00',
      to: document.getElementById(`${key}_to`)?.value || '22:00',
      banner_url: document.getElementById(`${key}_banner`)?.value || '',
    };
  }
  // Datas especiais
  const special_dates = [];
  document.querySelectorAll('[id^="sd-"]').forEach(row => {
    const i = row.id.replace('sd-', '');
    const date = document.getElementById(`sd_date_${i}`)?.value;
    if (!date) return;
    special_dates.push({
      date,
      desc: document.getElementById(`sd_desc_${i}`)?.value || '',
      from: document.getElementById(`sd_from_${i}`)?.value || '',
      to: document.getElementById(`sd_to_${i}`)?.value || '',
      closed: document.getElementById(`sd_closed_${i}`)?.classList.contains('on') || false,
    });
  });

  await api('PATCH', '/settings', {
    store_name: v('cfg-name'),
    store_whatsapp_number: v('cfg-wa').replace(/\D/g, ''),
    pix_key: v('cfg-pix'),
    logo_url: v('cfg-logo'),
    banner_image_url: v('cfg-banner'),
    primary_color: v('cfg-color'),
    business_hours,
    special_dates,
    kiosk_idle_seconds: parseInt(v('cfg-idle')) || 60,
  });
  toast('Configurações salvas!');
}

  const isAdmin = CURRENT_USER.role === 'admin';

  document.querySelectorAll('#sidebar-nav .nav-btn').forEach(btn => {

// ── Templates ─────────────────────────────────────────────────────
async function pageTemplates() {
  document.getElementById('content').innerHTML = '<p style="color:var(--muted)">Carregando...</p>';
  let list = [];
  try { list = await api('GET', '/templates'); _templatesCache = list; } catch(e) { toast('Erro ao carregar templates', true); }
  document.getElementById('content').innerHTML = `
    <div style="display:flex;justify-content:flex-end;margin-bottom:16px">
      <button class="btn btn-primary" onclick="modalNovoTemplate()">+ Novo Template</button>
    </div>
    <div id="templates-list">
      ${list.length === 0
        ? '<div class="card" style="text-align:center;color:var(--muted)">Nenhum template criado ainda.</div>'
        : list.map(t => templateCard(t)).join('')}
    </div>`;
}

function templateCard(t) {
  return `
    <div class="card" style="margin-bottom:12px">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:8px">
        <div>
          <h3 style="margin:0 0 8px">${t.name}</h3>
          <div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px">
            ${t.items.map(item => `<span style="background:var(--input-bg);border:1px solid var(--border);border-radius:20px;padding:4px 12px;font-size:.82rem">${item}</span>`).join('')}
          </div>
          <div style="font-size:.75rem;color:var(--muted)">
            📅 ${(!t.active_days || t.active_days.length === 0) ? 'Todos os dias' : t.active_days.map(v => DAYS_WEEK.find(d=>d.v===v)?.l||v).join(', ')}
          </div>
        </div>
        <div style="display:flex;gap:8px;flex-shrink:0">
          <button class="btn btn-primary btn-sm" onclick="usarTemplate('${t.id}')">⚡ Criar produtos</button>
          <button class="btn btn-secondary btn-sm" onclick="modalAplicarExistentes('${t.id}')">🔗 Aplicar a existentes</button>
          <button class="btn btn-secondary btn-sm" onclick="modalEditarTemplate('${t.id}')">✏️</button>
          <button class="btn btn-danger btn-sm" onclick="excluirTemplate('${t.id}')">🗑</button>
        </div>
      </div>
    </div>`;
}

function modalNovoTemplate() {
  openModal('Novo Template', templateForm(), async () => {
    const name = v('tpl-name').trim();
    if (!name) throw new Error('Informe o nome do template');
    const items = v('tpl-items').split('\n').map(s => s.trim()).filter(Boolean);
    if (items.length === 0) throw new Error('Adicione ao menos um item');
    await api('POST', '/templates', { name, items, active_days: getTplActiveDays() });
    toast('Template criado!'); closeModal(); pageTemplates();
  });
}

async function modalEditarTemplate(id) {
  let t;
  try { const list = await api('GET', '/templates'); t = list.find(x => x.id === id); } catch {}
  if (!t) return;
  openModal('Editar Template', templateForm(t), async () => {
    const name = v('tpl-name').trim();
    if (!name) throw new Error('Informe o nome do template');
    const items = v('tpl-items').split('\n').map(s => s.trim()).filter(Boolean);
    if (items.length === 0) throw new Error('Adicione ao menos um item');
    await api('PATCH', `/templates/${id}`, { name, items, active_days: getTplActiveDays() });
    toast('Template atualizado!'); closeModal(); pageTemplates();
  });
}

async function excluirTemplate(id) {
  if (!confirm('Excluir este template?')) return;
  await api('DELETE', `/templates/${id}`);
  pageTemplates();
}

function tplActiveDaysHtml(selected = null) {
  const all = selected === null || (Array.isArray(selected) && selected.length === 0);
  return `<div>
    <label>Dias ativos no cardápio</label>
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
      <input type="checkbox" id="tpl-alldays" ${all?'checked':''} onchange="
        document.querySelectorAll('.tpl-day-cb').forEach(c=>c.disabled=this.checked);
        if(this.checked) document.querySelectorAll('.tpl-day-cb').forEach(c=>c.checked=false);">
      <span style="font-size:.85rem;color:var(--muted)">Todos os dias</span>
    </div>
    <div style="display:flex;gap:8px;flex-wrap:wrap">
      ${DAYS_WEEK.map(d => `<label style="display:flex;align-items:center;gap:4px;font-size:.82rem;cursor:pointer">
        <input type="checkbox" class="tpl-day-cb" value="${d.v}" ${!all&&(selected||[]).includes(d.v)?'checked':''} ${all?'disabled':''}>
        ${d.l}</label>`).join('')}
    </div>
  </div>`;
}

function getTplActiveDays() {
  if (document.getElementById('tpl-alldays')?.checked) return [];
  return Array.from(document.querySelectorAll('.tpl-day-cb:checked')).map(c => parseInt(c.value));
}

function templateForm(t = {}) {
  return `
    <div class="form-grid">
      <div><label>Nome do template</label><input id="tpl-name" value="${t.name || ''}" placeholder="Ex: Croissant doce" /></div>
      <div>
        <label>Itens (um por linha)</label>
        <textarea id="tpl-items" rows="6" style="width:100%;background:var(--input-bg);color:var(--text);border:1px solid var(--border);border-radius:6px;padding:8px;font-size:.9rem;resize:vertical" placeholder="Croissant de chocolate\nCroissant de pistache\nCroissant de doce de leite">${(t.items || []).join('\n')}</textarea>
      </div>
      ${tplActiveDaysHtml(t.active_days ?? null)}
    </div>`;
}

async function modalAplicarExistentes(id) {
  let t;
  try { const list = await api('GET', '/templates'); t = list.find(x => x.id === id); } catch {}
  if (!t) return;
  if (!t) return;

  // Carrega todos os produtos se ainda não carregados
  if (!produtos || produtos.length === 0) {
    try { produtos = await api('GET', '/menu/admin').then(cats => cats.flatMap(c => c.products.map(p => ({...p, category_name: c.name, category_id: c.id})))); }
    catch(e) { toast('Erro ao carregar produtos', true); return; }
  }

  // Busca produtos cujo nome contenha o nome do template ou qualquer item
  const keywords = [t.name, ...t.items].map(s => s.toLowerCase());
  const matches = produtos.filter(p => keywords.some(kw => p.name.toLowerCase().includes(kw.split(' ')[0])));

  const daysLabel = (!t.active_days || t.active_days.length === 0)
    ? 'Todos os dias'
    : t.active_days.map(v => DAYS_WEEK.find(d=>d.v===v)?.l||v).join(', ');

  if (matches.length === 0) {
    toast('Nenhum produto encontrado com nome similar ao template', true);
    return;
  }

  openModal(`🔗 Aplicar template — ${t.name}`, `
    <p style="color:var(--muted);margin-bottom:12px">Selecione os produtos que receberão os dias: <strong>${daysLabel}</strong></p>
    <div style="display:flex;gap:8px;margin-bottom:10px">
      <button class="btn btn-secondary btn-sm" onclick="document.querySelectorAll('.aplic-cb').forEach(c=>c.checked=true)">Selecionar todos</button>
      <button class="btn btn-secondary btn-sm" onclick="document.querySelectorAll('.aplic-cb').forEach(c=>c.checked=false)">Desmarcar todos</button>
    </div>
    <div style="display:flex;flex-direction:column;gap:6px;max-height:300px;overflow-y:auto">
      ${matches.map(p => `
        <label style="display:flex;align-items:center;gap:10px;padding:8px;background:var(--input-bg);border:1px solid var(--border);border-radius:6px;cursor:pointer">
          <input type="checkbox" class="aplic-cb" value="${p.id}" checked>
          <span style="font-size:.88rem">${p.name}</span>
          <span style="font-size:.75rem;color:var(--muted);margin-left:auto">${p.category_name}</span>
        </label>`).join('')}
    </div>`, async () => {
    const selected = Array.from(document.querySelectorAll('.aplic-cb:checked')).map(c => c.value);
    if (selected.length === 0) throw new Error('Selecione ao menos um produto');
    let ok = 0, erros = 0;
    for (const pid of selected) {
      try {
        await api('PATCH', `/menu/products/${pid}`, { active_days: t.active_days || [] });
        ok++;
      } catch { erros++; }
    }
    toast(`✅ ${ok} produto(s) atualizado(s)${erros ? ` — ${erros} erro(s)` : ''}`);
    closeModal();
  });
}

async function usarTemplate(id) {
  let t;
  try { const list = await api('GET', '/templates'); t = list.find(x => x.id === id); } catch {}
  if (!t) return;
  if (!t) return;
  // Navega para Produtos e abre um modal de criação em lote
  showPage('produtos', document.querySelector('[data-page="produtos"]'));
  // Aguarda renderização
  setTimeout(() => modalCriarEmLote(t), 400);
}

function modalCriarEmLote(t) {
  const catOptions = categorias.map(c => `<option value="${c.id}">${c.name}</option>`).join('');
  const rows = t.items.map((item, i) => `
    <tr>
      <td><input id="lote-nome-${i}" value="${item}" style="width:100%;background:var(--input-bg);color:var(--text);border:1px solid var(--border);border-radius:4px;padding:4px 8px" /></td>
      <td><input id="lote-preco-${i}" type="number" step="0.01" placeholder="0,00" style="width:80px;background:var(--input-bg);color:var(--text);border:1px solid var(--border);border-radius:4px;padding:4px 8px" /></td>
      <td><select id="lote-cat-${i}" style="background:var(--input-bg);color:var(--text);border:1px solid var(--border);border-radius:4px;padding:4px">${catOptions}</select></td>
    </tr>`).join('');

  openModal(`⚡ Criar produtos — ${t.name}`, `
    <p style="color:var(--muted);margin-bottom:12px">Preencha preço e categoria para cada item e clique em Salvar.</p>
    <div style="overflow-x:auto">
      <table style="width:100%;border-collapse:collapse">
        <tr style="font-size:.8rem;color:var(--muted)"><th style="text-align:left;padding:4px 8px">Nome</th><th style="text-align:left;padding:4px 8px">Preço (R$)</th><th style="text-align:left;padding:4px 8px">Categoria</th></tr>
        ${rows}
      </table>
    </div>`, async () => {
    const erros = [];
    for (let i = 0; i < t.items.length; i++) {
      const nome = document.getElementById(`lote-nome-${i}`)?.value?.trim();
      const preco = parseFloat(document.getElementById(`lote-preco-${i}`)?.value);
      const cat = document.getElementById(`lote-cat-${i}`)?.value;
      if (!nome || isNaN(preco) || preco <= 0 || !cat) { erros.push(nome || `Item ${i+1}`); continue; }
      try {
        await api('POST', '/menu/products', { name: nome, price: preco, category_id: cat, active_days: t.active_days || [] });
      } catch(e) { erros.push(nome); }
    }
    if (erros.length) toast(`⚠️ Alguns itens falharam: ${erros.join(', ')}`, true);
    else toast('Todos os produtos criados!');
    closeModal(); pageProdutos();
  });
}
